// LEVEL GEN
function gL(n){
  const len=60+n*8,rn=[],d=n/50;let se=n*31337+7;
  function r(){se=(se*16807)%2147483647;return(se-1)/2147483646;}
  function s(){return[SO,SO,SO];}
  function e(){return[EM,EM,EM];}
  function pu(t,ch,ms){let rm=0;const mx=COLS-ms;for(let c=0;c<COLS;c++)if(r()<ch&&rm<mx){t[c]=EM;rm++;}return t;}

  // Safe start
  for(let i=0;i<6;i++)rn.push({b:s(),l:s(),t:s(),r:s()});

  // ============================================================
  // FORCED ROTATION PLANNER
  // Pre-plan where mandatory wall-run sections go.

  let forcedSections = []; // [{start, end, face}]

  const numForced = n < 3 ? 0 : Math.min(8, 1 + Math.floor(n / 5));

  for(let f = 0; f < numForced; f++){

    const start = earliest + Math.floor(r() * Math.max(1, zoneLen - 15));
    // Duration: 5-15 rings, longer at higher levels
    const dur = 5 + Math.floor(r() * (4 + d * 10));
    const end = Math.min(len - 8, start + dur);

    // Pick which wall: left(1), right(3), or ceiling(2) at high levels
    let face;
    if(n < 10) face = r() < 0.5 ? 1 : 3;         // Early: left or right only
    else if(n < 25) face = r() < 0.4 ? 1 : (r() < 0.7 ? 3 : 2); // Mid: mostly walls, sometimes ceiling
    else face = [1, 3, 2, 1, 3][Math.floor(r() * 5)]; // Late: all three

    // Multi-face rotation for very hard levels: switch wall mid-section
    let face2 = -1;
    if(n >= 20 && dur > 8 && r() < 0.3 + d * 0.3){
      // Halfway through, switch to a different wall
      face2 = face === 1 ? 3 : (face === 3 ? (r()<0.5?1:2) : (r()<0.5?1:3));
    }

    if(start < len - 10) forcedSections.push({start, end, face, face2, mid: Math.floor((start+end)/2)});
  }

  // ============================================================
  // GENERATE RINGS
  // ============================================================
  let lastGap = 0;

  for(let i=6;i<len;i++){
    let b=s(),l=s(),t=s(),ri=s();

    // Check if this ring is inside a forced rotation section
    let inForced = null;
    for(const fs of forcedSections){
      if(i >= fs.start && i <= fs.end){ inForced = fs; break; }
    }

    if(inForced){
      const fs = inForced;
      const isTransIn = (i === fs.start);      // First ring: transition IN
      const isTransOut = (i === fs.end);        // Last ring: transition OUT
      const switchMid = (fs.face2 >= 0 && i === fs.mid); // Mid-section wall swap

      // Determine active face for this ring
      let activeFace = fs.face;
      if(fs.face2 >= 0 && i >= fs.mid) activeFace = fs.face2;

      if(isTransIn){
        // TRANSITION IN: floor narrows to one edge tile near the target wall
        // This gives the player a visual cue to move toward the wall

          b = [EM, EM, SO];
          l = s(); // Left wall fully solid as landing zone
        }else if(activeFace === 3){ // Right wall: keep only left-edge floor tile
          b = [SO, EM, EM];
          ri = s();
        }else{                       // Ceiling: keep one floor tile, left wall solid as bridge
          b = [EM, SO, EM];
          l = s();
        }
        // Other walls get holes for visual variety
        if(activeFace !== 1) pu(l, 0.3, 0);
        if(activeFace !== 3) pu(ri, 0.3, 0);
        pu(t, 0.25, 0);

      }else if(isTransOut){
        // TRANSITION OUT: wall section ends, floor comes back with edge tile
        if(activeFace === 1){       b = [EM, EM, SO]; l = s(); }
        else if(activeFace === 3){  b = [SO, EM, EM]; ri = s(); }
        else{                        b = [EM, SO, EM]; l = s(); }
        if(activeFace !== 1) pu(l, 0.3, 0);
        if(activeFace !== 3) pu(ri, 0.3, 0);
        pu(t, 0.25, 0);

      }else if(switchMid){
        // MID-SECTION WALL SWAP: one wall ends, other begins
        // Both walls solid for this ring so player can transition
        b = e();
        l = s(); ri = s(); t = s();
        // Punch holes in non-active walls
        pu(t, 0.4, 0);

      }else{
        // CORE FORCED SECTION: floor completely gone, only active wall has tiles
        b = e(); // NO FLOOR AT ALL

        // Active wall: mostly solid with some gameplay gaps
        let wf = s();
        pu(wf, 0.12 + d * 0.25, 1); // Gaps but always at least 1 tile
        if(n >= 6) aC(wf, 0.06 + d * 0.15); // Some crumble tiles

        // Apply to the correct face
        if(activeFace === 1){ l = wf; pu(ri, 0.5, 0); pu(t, 0.4, 0); }
        else if(activeFace === 3){ ri = wf; pu(l, 0.5, 0); pu(t, 0.4, 0); }
        else{ t = wf; pu(l, 0.5, 0); pu(ri, 0.5, 0); }
      }

    }else{
      // ============================================================
      // NORMAL FLOOR SECTION (not in a forced rotation)
      // ============================================================

      // Holes in walls and ceiling
      pu(l, 0.12+d*0.35, 0);
      pu(ri, 0.12+d*0.35, 0);
      pu(t, 0.10+d*0.30, 0);

      // Floor gaps
      const gc = 0.25 + d * 0.35;
      if(r() < gc){
        lastGap = 0;
        if(r() < 0.15 + d * 0.30){
          b = e(); b[Math.floor(r()*3)] = SO; // Stepping stone
        }else if(r() < 0.3 + d * 0.2){

        }else{

        }
      }else{ lastGap++; }

      // Extra gaps after safe stretches
      if(n > 3 && lastGap > 2 && r() < 0.15 + d * 0.25){
        const g = Math.floor(r()*3); b[g] = EM;
        if(r() < 0.5 + d * 0.2) b[(g+1)%3] = EM;
        if(!b.some(x=>x)) b[Math.floor(r()*3)] = SO;
        lastGap = 0;
      }

      // Crumble tiles
      if(n >= 3) aC(b, 0.06 + d * 0.25);
    }

    rn.push({b, l, t, r:ri});
  }

  // Safe end zone
  for(let i=0;i<4;i++)rn.push({b:s(),l:s(),t:s(),r:s()});
  return rn;
}

// UPDATE
function upd(dt){
  if(!P.al){dT-=dt;if(dT<=0)rsp();return;}
  const sp=fast?RSF:RS;lTm+=dt;P.z+=sp*dt;uCr(dt);
  rFT+=dt;if(rFT>0.06){rFT=0;rF=(rF+1)%RF.length;}
  if(!P.gn){jFT+=dt;if(jFT>0.09){jFT=0;jF=(jF+1)%JF.length;}}else{jF=0;jFT=0;}
  if(P.z>=(lv.length-2)*TL){state='WIN';const ms=Math.floor(lTm*1000);const k='L'+lev;if(!bst[k]||ms<bst[k]){bst[k]=ms;sB();}if(lev>=mxU){mxU=Math.min(50,lev+1);sU();}mS=0;return;}
  let cF;if(P.fc===BT||P.fc===TP)cF=Math.cos(tR)>=0?1:-1;else cF=-Math.sin(tR)>=0?1:-1;
  const sL2=ky['ArrowLeft']||ky['KeyA'],sR2=ky['ArrowRight']||ky['KeyD'];const s=gS();
  let vx=0,lL=false,lR=false;
  if(sL2||s==='l'){vx=-PS*cF;if(cF>0)lL=true;else lR=true;}
  if(sR2||s==='r'){vx=PS*cF;if(cF>0)lR=true;else lL=true;}
  P.x+=vx*dt;const edge=TW-0.15;
  if(P.x<-edge&&lL){if(!tSw(-1))P.x=-edge;}else if(P.x>edge&&lR){if(!tSw(1))P.x=edge;}
  P.x=Math.max(-TW+0.1,Math.min(TW-0.1,P.x));
  const wj=pr('Space')||pr('ArrowUp')||pr('KeyW')||s==='u'||s==='tap';
  if(wj&&P.gn){P.vy=JV;P.gn=false;P.falling=false;}

  // === CONTINUOUS GROUND CHECK ===
  // Every frame while grounded, verify the tile below still exists.
  // If it's a gap, immediately start falling. This prevents "skating" over holes.
  if(P.gn){
    const col=x2c(P.x);
    const tv=gT(P.fc,P.z,col);
    if(tv>=SO){
      // Still on solid ground - trigger crumble if needed
      if(tv===CR)tCr(P.fc,Math.floor(P.z/TL),col);
    }else{
      // Check if straddling adjacent tile
      const tw2=(TW*2)/COLS,lX=P.x+TW,f=(lX%tw2)/tw2;
      let onAdj=false,oC=-1;
      if(f<0.3&&col>0&&gTs(P.fc,P.z,col-1)){onAdj=true;oC=col-1;}
      if(f>0.7&&col<COLS-1&&gTs(P.fc,P.z,col+1)){onAdj=true;oC=col+1;}
      if(onAdj){
        if(oC>=0&&gT(P.fc,P.z,oC)===CR)tCr(P.fc,Math.floor(P.z/TL),oC);
      }else{
        // No ground! Start falling immediately
        P.gn=false;
        P.falling=true; // Mark as falling into a gap (can't re-ground)
      }
    }
  }

  // Gravity & vertical movement
  if(!P.gn){
    P.vy-=GR*dt;
    // Fall faster when falling into a gap (not from a jump)
    if(P.falling)P.vy-=GR*dt*0.5;
  }
  P.y+=P.vy*dt;

  // Landing check (only if NOT falling into a gap)
  if(P.y<=0&&!P.falling){
    const col=x2c(P.x);const tv=gT(P.fc,P.z,col);
    if(tv>=SO){P.y=0;P.vy=0;P.gn=true;if(tv===CR)tCr(P.fc,Math.floor(P.z/TL),col);}
    else{
      const tw2=(TW*2)/COLS,lX=P.x+TW,f=(lX%tw2)/tw2;let on=false,oC=-1;
      if(f<0.3&&col>0&&gTs(P.fc,P.z,col-1)){on=true;oC=col-1;}
      if(f>0.7&&col<COLS-1&&gTs(P.fc,P.z,col+1)){on=true;oC=col+1;}
      if(on){P.y=0;P.vy=0;P.gn=true;if(oC>=0&&gT(P.fc,P.z,oC)===CR)tCr(P.fc,Math.floor(P.z/TL),oC);}
      else{P.falling=true;} // Missed the ground, now falling for real
    }
  }

  // Death: fall into space
  if(P.y<-2&&P.falling)die();
  if(P.y<-12&&P.al)die();
}

  for(let i=0;i<50;i++){const l=i+1,c=i%cols,r=Math.floor(i/cols),x=sx+c*(tsz+gap),y=sy+r*(tsz+gap);
    const un=l<=mxU,dn=bst['L'+l]!=null,sl=l===lev;const t=TH[Math.min(4,Math.floor(i/10))];
    X.fillStyle=sl?'rgba(255,255,255,0.15)':(dn?'rgba(255,255,255,0.06)':'rgba(255,255,255,0.02)');X.fillRect(x,y,tsz,tsz);
    if(sl){X.strokeStyle=t.e;X.lineWidth=2;X.strokeRect(x,y,tsz,tsz);}
    X.font='bold '+tsz*0.35+'px "Courier New",monospace';X.fillStyle=un?(dn?t.g:'#ccc'):'#333';X.fillText(''+l,x+tsz/2,y+tsz*0.5);
    if(dn){X.font=tsz*0.17+'px "Courier New",monospace';X.fillStyle='#fa0';X.fillText((bst['L'+l]/1000).toFixed(1)+'s',x+tsz/2,y+tsz*0.78);}
    if(!un){X.font=tsz*0.22+'px sans-serif';X.fillStyle='#444';X.fillText('\uD83D\uDD12',x+tsz/2,y+tsz*0.7);}
  }
  X.font='11px "Courier New",monospace';X.fillStyle='#555';X.fillText('Arrows/Click Navigate \u2022 ENTER Play \u2022 ESC Back',W/2,H-12);
}

function dPause(){X.fillStyle='rgba(0,0,0,0.8)';X.fillRect(0,0,W,H);X.textAlign='center';X.font='bold 26px "Courier New",monospace';X.fillStyle='#fff';X.fillText('PAUSED',W/2,H*0.22);
  const items=['RESUME','RESTART','SPEED: '+(fast?'FAST':'NORMAL'),'LEVEL SELECT','MAIN MENU'];
  for(let i=0;i<items.length;i++){const y=H*0.34+i*38;dB(W/2-110,y-14,220,28,i===mS);X.font=i===mS?'bold 14px "Courier New",monospace':'12px "Courier New",monospace';X.fillStyle=i===mS?'#fff':'#777';X.fillText(items[i],W/2,y);}}

function dWin(){X.fillStyle='rgba(0,0,0,0.82)';X.fillRect(0,0,W,H);X.textAlign='center';const t=th();
  X.font='bold 28px "Courier New",monospace';X.fillStyle=t.g;X.fillText('LEVEL COMPLETE!',W/2,H*0.22);
  X.font='16px "Courier New",monospace';X.fillStyle='#ccc';X.fillText('Level '+lev,W/2,H*0.3);
  X.fillStyle='#aaa';X.fillText('Time: '+lTm.toFixed(2)+'s',W/2,H*0.37);
  const b=bst['L'+lev];if(b){X.fillStyle='#fa0';X.fillText('Best: '+(b/1000).toFixed(2)+'s',W/2,H*0.43);}
  if(dths>0){X.fillStyle='#e55';X.fillText('Deaths: '+dths,W/2,H*0.49);}
  const hn=lev<50;const items=hn?['NEXT LEVEL','RETRY','LEVEL SELECT','MENU']:['RETRY','LEVEL SELECT','MENU'];
  for(let i=0;i<items.length;i++){const y=H*0.6+i*36;dB(W/2-100,y-13,200,26,i===mS);X.font=i===mS?'bold 13px "Courier New",monospace':'12px "Courier New",monospace';X.fillStyle=i===mS?'#fff':'#777';X.fillText(items[i],W/2,y);}}

function dDead(){X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(0,0,W,H);X.textAlign='center';X.font='bold 18px "Courier New",monospace';X.fillStyle='#e55';X.fillText('FELL!',W/2,H/2);}

// MENU INPUT
function inBox(cx,cy,bx,by,bw,bh){return cx>=bx&&cx<=bx+bw&&cy>=by&&cy<=by+bh;}

function mI(){
  const s=gS();
  const clk=gClk(); // {x,y} or null

  if(state==='MENU'){
    const n=4;
    if(pr('ArrowUp')||pr('KeyW')||s==='u')mS=(mS+n-1)%n;
    if(pr('ArrowDown')||pr('KeyS')||s==='d')mS=(mS+1)%n;
    // Mouse: click on menu items
    const my=H*0.5;
    if(clk){for(let i=0;i<n;i++){if(inBox(clk.x,clk.y,W/2-120,my+i*42-16,240,30)){mS=i;break;}}}
    if(pr('Enter')||pr('Space')||s==='tap'||(clk&&inBox(clk.x,clk.y,W/2-120,my-16,240,30*4+42*3))){
      // Find which item was clicked
      let act=mS;
      if(clk){for(let i=0;i<n;i++){if(inBox(clk.x,clk.y,W/2-120,my+i*42-16,240,30)){act=i;break;}}}
      if(act===0)sL(lev);else if(act===1){state='CHARSEL';mS=0;}else if(act===2){state='LEVELS';mS=0;}else fast=!fast;
    }
  }
  else if(state==='CHARSEL'){
    if(pr('Escape')||pr('Backspace')){state='MENU';mS=1;return;}
    if(pr('ArrowRight')||pr('KeyD')||s==='r')selCh=(selCh+1)%CH.length;
    if(pr('ArrowLeft')||pr('KeyA')||s==='l')selCh=(selCh+CH.length-1)%CH.length;
    if(pr('ArrowDown')||pr('KeyS')||s==='d')selCh=Math.min(CH.length-1,selCh+4);
    if(pr('ArrowUp')||pr('KeyW')||s==='u')selCh=Math.max(0,selCh-4);
    // Mouse: click on character grid
    if(clk){
      const cols=4,bW=Math.min(110,(W-60)/cols),bH=bW+24,gap=10;
      const gW=cols*(bW+gap)-gap,sx=W/2-gW/2,sy=H/2-(2*(bH+gap))/2;
      for(let i=0;i<CH.length;i++){
        const c=i%cols,r=Math.floor(i/cols),bx=sx+c*(bW+gap),by=sy+r*(bH+gap);
        if(inBox(clk.x,clk.y,bx,by,bW,bH)){
          if(selCh===i){state='MENU';mS=0;} // Click same = confirm
          else selCh=i;
          break;
        }
      }
    }
    if(pr('Enter')||pr('Space')||s==='tap'){state='MENU';mS=0;}
  }
  else if(state==='LEVELS'){
    if(pr('Escape')||pr('Backspace')){state='MENU';mS=2;return;}
    if(pr('ArrowRight')||pr('KeyD')||s==='r')lev=Math.min(50,lev+1);
    if(pr('ArrowLeft')||pr('KeyA')||s==='l')lev=Math.max(1,lev-1);
    if(pr('ArrowDown')||pr('KeyS')||s==='d')lev=Math.min(50,lev+5);
    if(pr('ArrowUp')||pr('KeyW')||s==='u')lev=Math.max(1,lev-5);
    // Mouse: click on level tiles
    if(clk){
      const cols=5,tsz=Math.min(54,(W-80)/cols),gap=5,gw=cols*(tsz+gap),sx=W/2-gw/2,sy=65;
      for(let i=0;i<50;i++){
        const l=i+1,c=i%cols,r=Math.floor(i/cols),bx=sx+c*(tsz+gap),by=sy+r*(tsz+gap);
        if(inBox(clk.x,clk.y,bx,by,tsz,tsz)){
          lev=l;
          if(l<=mxU)sL(l); // Click unlocked level = start it
          break;
        }
      }
    }
    if(pr('Enter')||pr('Space')||s==='tap'){if(lev<=mxU)sL(lev);}
  }
  else if(state==='PLAYING'){
    if(pr('KeyP')||pr('Escape')){state='PAUSED';mS=0;}
    // Mouse click = jump while playing
    if(clk&&P.al&&P.gn){P.vy=JV;P.gn=false;P.falling=false;}
  }
  else if(state==='PAUSED'){
    const n=5;
    if(pr('ArrowUp')||pr('KeyW')||s==='u')mS=(mS+n-1)%n;
    if(pr('ArrowDown')||pr('KeyS')||s==='d')mS=(mS+1)%n;
    if(pr('KeyP')||pr('Escape')){state='PLAYING';return;}
    // Mouse: click on pause items
    let pClk=-1;
    if(clk){for(let i=0;i<n;i++){if(inBox(clk.x,clk.y,W/2-110,H*0.34+i*38-14,220,28)){pClk=i;mS=i;break;}}}
    if(pr('Enter')||pr('Space')||s==='tap'||pClk>=0){
      const act=pClk>=0?pClk:mS;
      if(act===0)state='PLAYING';else if(act===1){rsp();state='PLAYING';}else if(act===2)fast=!fast;else if(act===3){state='LEVELS';mS=0;}else{state='MENU';mS=0;}
    }
  }
  else if(state==='WIN'){
    const hn=lev<50,n=hn?4:3;
    if(pr('ArrowUp')||pr('KeyW')||s==='u')mS=(mS+n-1)%n;
    if(pr('ArrowDown')||pr('KeyS')||s==='d')mS=(mS+1)%n;
    // Mouse: click on win items
    let wClk=-1;
    if(clk){for(let i=0;i<n;i++){if(inBox(clk.x,clk.y,W/2-100,H*0.6+i*36-13,200,26)){wClk=i;mS=i;break;}}}
    if(pr('Enter')||pr('Space')||s==='tap'||wClk>=0){
      const act=wClk>=0?wClk:mS;
      if(hn){if(act===0)sL(lev+1);else if(act===1)sL(lev);else if(act===2){state='LEVELS';mS=0;}else{state='MENU';mS=0;}}
      else{if(act===0)sL(lev);else if(act===1){state='LEVELS';mS=0;}else{state='MENU';mS=0;}}
    }
  }
}

// MAIN LOOP
let lT=performance.now();
function loop(now){
  requestAnimationFrame(loop);let dt=(now-lT)/1000;lT=now;dt=Math.min(dt,0.05);fr++;
  const rd=tR-cR;if(Math.abs(rd)>0.001)cR+=rd*Math.min(1,dt*RTS);else cR=tR;
  mI();
  if(state==='MENU')dMenu();
  else if(state==='CHARSEL')dCS();
  else if(state==='LEVELS')dLvls();
  else if(state==='PLAYING'){upd(dt);dBg();dTun();dPl();dPt();dHUD();if(!P.al)dDead();}
  else if(state==='PAUSED'){dBg();dTun();dPl();dHUD();dPause();}
  else if(state==='WIN'){dBg();dTun();dPl();dWin();}
  cJP();
}
requestAnimationFrame(loop);
</script></body></html>
