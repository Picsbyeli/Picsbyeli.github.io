<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Timer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .game-area {
            flex: 1;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            transition: background-color 0.3s;
        }
        
        .bg-blue { background: #3b82f6; }
        .bg-red { background: #dc2626; }
        .bg-green { background: #16a34a; }
        .bg-yellow { background: #eab308; }
        .bg-purple { background: #9333ea; }
        .bg-pink { background: #ec4899; }
        .bg-indigo { background: #6366f1; }
        .bg-gray { background: #374151; }
        
        .content {
            text-align: center;
            color: white;
        }
        
        .icon {
            width: 96px;
            height: 96px;
            margin: 0 auto 24px;
            font-size: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .icon-pulse {
            animation: pulse 2s infinite;
        }
        
        .icon-bounce {
            animation: bounce 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 24px;
        }
        
        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 16px;
        }
        
        .instruction {
            font-size: 1.25rem;
        }
        
        .wait-text {
            font-size: 3.75rem;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        
        .wait-instruction {
            font-size: 1.25rem;
            margin-top: 16px;
        }
        
        .click-text {
            font-size: 4.375rem;
            font-weight: bold;
        }
        
        .result-time {
            font-size: 3.75rem;
            font-weight: bold;
        }
        
        .result-label {
            font-size: 1.875rem;
            margin-top: 16px;
        }
        
        .result-instruction {
            font-size: 1.25rem;
            margin-top: 16px;
        }
        
        .leaderboard {
            background: #1f2937;
            color: white;
            padding: 32px;
        }
        
        .leaderboard-container {
            max-width: 512px;
            margin: 0 auto;
        }
        
        .name-input {
            padding: 8px 16px;
            background: #374151;
            color: white;
            border-radius: 8px;
            border: 1px solid #4b5563;
            margin-bottom: 16px;
        }
        
        .name-input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .leaderboard-title {
            font-size: 1.875rem;
            font-weight: bold;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .trophy-icon {
            color: #fbbf24;
        }
        
        .leaderboard-entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        
        .entry-gold {
            background: linear-gradient(90deg, #d97706 0%, #b45309 100%);
        }
        
        .entry-normal {
            background: #374151;
        }
        
        .entry-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .entry-rank {
            font-size: 1.5rem;
            font-weight: bold;
            width: 32px;
        }
        
        .entry-name {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .entry-title {
            background: #7c3aed;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.875rem;
            font-weight: bold;
        }
        
        .entry-time {
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
        }
        
        .back-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            z-index: 1000;
        }

        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-modal.hidden {
            display: none;
        }

        .login-box {
            background: #1f2937;
            padding: 48px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            color: white;
            max-width: 400px;
            width: 90%;
        }

        .login-box h2 {
            font-size: 2rem;
            margin-bottom: 24px;
            color: #3b82f6;
        }

        .login-options {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .login-input {
            padding: 12px 16px;
            background: #374151;
            color: white;
            border: 2px solid #4b5563;
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
        }

        .login-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.3);
        }

        .login-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            margin: 16px 0;
            color: #6b7280;
            font-size: 0.875rem;
        }
    </style>
    <!-- Firebase setup for authentication and leaderboard storage -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
        import { getDatabase, ref, push, query, orderByChild, limitToFirst, get } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js';
        import { GameAuth } from '../js/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAQE2mo6RNgwG-WaooCpoZjQ9Z8G2MHvx8",
            authDomain: "profile-9e9f9.firebaseapp.com",
            databaseURL: "https://profile-9e9f9-default-rtdb.firebaseio.com",
            projectId: "profile-9e9f9",
            storageBucket: "profile-9e9f9.firebasestorage.app",
            messagingSenderId: "610449223815",
            appId: "1:610449223815:web:3cdb864b4314d2b901c822",
            measurementId: "G-7R4Z3ZSZ67"
        };

        // initialize firebase and make globals
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        window.firebaseApp = app;
        window.firebaseDatabase = database;
        window.firebaseRef = ref;
        window.firebasePush = push;
        window.firebaseQuery = query;
        window.firebaseOrderByChild = orderByChild;
        window.firebaseLimitToFirst = limitToFirst;
        window.firebaseGet = get;

        // authentication helper
        window.gameAuth = new GameAuth(app);

        // Wait for auth to initialize, then setup UI and init game
        window.gameAuth.onAuthStateChanged(() => {
            // trigger game init only after auth state settles
            if (typeof init === 'function') {
                init();
            }
        });

        // global function used in existing code (already present) but keep for consistency
        window.submitScore = async function(gameName, playerScore) {
            if (window.gameAuth && window.gameAuth.isLoggedIn()) {
                // store in RTDB under gameName key
                const user = window.gameAuth.getUser();
                const entry = { uid: user.uid, name: user.displayName || 'Anonymous', time: playerScore, ts: Date.now() };
                try {
                    await push(ref(database, `reaction_timer/${gameName}`), entry);
                } catch (err) {
                    console.error('failed to push score', err);
                }
            }
        };
    </script>
</head>
<body>
    <a href="../index.html" class="back-btn">← Back to Hub</a>
    
    <!-- Login/Name Modal -->
    <div id="loginModal" class="login-modal">
        <div class="login-box">
            <h2>⚡ Reaction Timer</h2>
            <p style="margin-bottom: 24px; color: #d1d5db; font-size: 0.95rem;">Sign in or enter your name to play</p>
            
            <div class="login-options">
                <input type="text" id="nameInput" class="login-input" placeholder="Enter your name" />
                <button class="login-btn" onclick="playAsGuest()">Play as Guest</button>
                
                <div class="divider">or</div>
                
                <button class="login-btn" style="background: linear-gradient(135deg, #10b981, #059669);" onclick="goToLogin()">Sign In / Register</button>
            </div>
        </div>
    </div>
    
    <div id="gameArea" class="game-area bg-blue" onclick="handleClick()" style="display: none;">
        <div class="content">
            <div id="waitingState">
                <div class="icon icon-pulse">⏰</div>
                <h1 class="title">Reaction Time Tester</h1>
                <p class="instruction">Click anywhere to start!</p>
            </div>
            
            <div id="readyState" class="hidden">
                <div class="wait-text">WAIT...</div>
                <p class="wait-instruction">Get ready for the color change</p>
            </div>
            
            <div id="goState" class="hidden">
                <div class="icon icon-bounce">⚡</div>
                <div class="click-text">CLICK NOW!</div>
            </div>
            
            <div id="resultState" class="hidden">
                <div class="icon">🏆</div>
                <div id="resultTime" class="result-time">0ms</div>
                <div id="resultLabel" class="result-label">Very Fast! 🔥</div>
                <p class="result-instruction">Click to try again</p>
            </div>
        </div>
    </div>
    
    <div class="leaderboard" style="display: none;" id="leaderboardSection">
        <div class="leaderboard-container">
            <!-- user info is populated from Firebase auth; no manual name entry to prevent fake scores -->
            <div id="userInfo" style="margin-bottom:16px;font-size:1rem;color:#ddd;"></div>

            <h2 class="leaderboard-title">
                <span class="trophy-icon">🏆</span>
                Leaderboard
            </h2>

            <div id="leaderboardEntries"></div>
            
            <button onclick="logout()" style="margin-top: 24px; padding: 10px 20px; background: #dc2626; color: white; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold;">Logout</button>
        </div>
    </div>
    
    <script>
        let state = 'waiting'; // waiting, ready, go, result
        let reactionTime = null;
        // leaderboard will be fetched from Firebase; fallback empty
        let leaderboard = [];
        let bgColor = 'bg-blue';
        let startTime = null;
        let timeout = null;
        let playerName = null; // Track current player
        
        const colors = [
            'bg-red', 'bg-green', 'bg-yellow', 
            'bg-purple', 'bg-pink', 'bg-indigo'
        ];
        
        // Check if player is already logged in on page load
        function checkPlayerStatus() {
            // First check localStorage for guest name
            const storedName = localStorage.getItem('reactionTimer_playerName');
            if (storedName) {
                playerName = storedName;
                startGame();
                return;
            }
            
            // Check Firebase auth
            if (window.gameAuth && window.gameAuth.isLoggedIn()) {
                const u = window.gameAuth.getUser();
                playerName = u.displayName || u.email || 'Anonymous';
                startGame();
                return;
            }
            
            // Show login modal if not logged in
            showLoginModal();
        }
        
        function showLoginModal() {
            const modal = document.getElementById('loginModal');
            modal.classList.remove('hidden');
            document.getElementById('nameInput').focus();
            document.getElementById('nameInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') playAsGuest();
            });
        }
        
        function playAsGuest() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) {
                alert('Please enter your name');
                return;
            }
            playerName = name;
            localStorage.setItem('reactionTimer_playerName', name);
            startGame();
        }
        
        function goToLogin() {
            window.location.href = '../auth.html?redirect=games/reaction-timer.html';
        }
        
        function logout() {
            if (window.gameAuth) {
                window.gameAuth.logout();
            }
            localStorage.removeItem('reactionTimer_playerName');
            playerName = null;
            location.reload();
        }
        
        function startGame() {
            const modal = document.getElementById('loginModal');
            modal.classList.add('hidden');
            document.getElementById('gameArea').style.display = 'flex';
            document.getElementById('leaderboardSection').style.display = 'block';
            updateDisplay();
            updateLeaderboard();
            
            const userInfo = document.getElementById('userInfo');
            if (window.gameAuth && window.gameAuth.isLoggedIn()) {
                const u = window.gameAuth.getUser();
                playerName = u.displayName || u.email;
                userInfo.innerHTML = `<strong>✓ Logged in as ${playerName}</strong> <button onclick="logout()" style="margin-left: 12px; padding: 4px 12px; background: #dc2626; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.875rem;">Logout</button>`;
            } else {
                userInfo.innerHTML = `<strong>Playing as: ${playerName}</strong> | <a href="../auth.html" style="color: #3b82f6; text-decoration: none; cursor: pointer;">Sign in for persistent scores</a>`;
            }
            loadLeaderboard();
        }
        
        async function init() {
            try {
                checkPlayerStatus();
            } catch (err) {
                console.error('init error:', err);
            }
        }
        
        function getSpeedLabel(time) {
            if (time < 200) return 'Lightning Fast! ⚡';
            if (time < 250) return 'Very Fast! 🔥';
            if (time < 300) return 'Fast! 👍';
            if (time < 400) return 'Average 😐';
            return 'Slow... 🐌';
        }

        function updateDisplay() {
            const gameArea = document.getElementById('gameArea');
            gameArea.className = `game-area ${bgColor}`;

            // Hide all states
            document.getElementById('waitingState').classList.add('hidden');
            document.getElementById('readyState').classList.add('hidden');
            document.getElementById('goState').classList.add('hidden');
            document.getElementById('resultState').classList.add('hidden');

            // Show current state
            if (state === 'waiting') {
                document.getElementById('waitingState').classList.remove('hidden');
            } else if (state === 'ready') {
                document.getElementById('readyState').classList.remove('hidden');
            } else if (state === 'go') {
                document.getElementById('goState').classList.remove('hidden');
            } else if (state === 'result') {
                document.getElementById('resultState').classList.remove('hidden');
                document.getElementById('resultTime').textContent = `${reactionTime}ms`;
                document.getElementById('resultLabel').textContent = getSpeedLabel(reactionTime);
            }
        }

        function updateLeaderboard() {
            const entriesEl = document.getElementById('leaderboardEntries');
            entriesEl.innerHTML = '';

            leaderboard.forEach((entry, index) => {
                const entryEl = document.createElement('div');
                entryEl.className = `leaderboard-entry ${index === 0 ? 'entry-gold' : 'entry-normal'}`;

                entryEl.innerHTML = `
                    <div class="entry-info">
                        <span class="entry-rank">#${index + 1}</span>
                        <span class="entry-name">${entry.name}</span>
                        ${entry.title ? `<span class="entry-title">${entry.title}</span>` : ''}
                    </div>
                    <span class="entry-time">${entry.time}ms</span>
                `;

                entriesEl.appendChild(entryEl);
            });
        }
        
        function startTest() {
            state = 'ready';
            bgColor = 'bg-red';
            updateDisplay();
            
            const delay = Math.random() * 3000 + 2000; // 2-5 seconds
            
            timeout = setTimeout(() => {
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                bgColor = randomColor;
                state = 'go';
                startTime = Date.now();
                updateDisplay();
            }, delay);
        }
        
        // wrapper so onclick can be sync; inner async handles errors
        function handleClick() {
            console.log('handleClick invoked, state=', state);
            (async () => {
                if (state === 'waiting') {
                    console.log('starting test');
                    startTest();
                } else if (state === 'ready') {
                    // Too early!
                    clearTimeout(timeout);
                    state = 'waiting';
                    bgColor = 'bg-blue';
                    updateDisplay();
                    // show non-blocking message
                    console.log('Clicked too early');
                    const infoEl = document.getElementById('resultLabel');
                    if (infoEl) {
                        infoEl.textContent = 'Too early! Try again.';
                        // clear message after 1.5s
                        setTimeout(() => { infoEl.textContent = ''; }, 1500);
                    }
                } else if (state === 'go') {
                    console.log('user clicked GO, time calculation');
                    const time = Date.now() - startTime;
                    reactionTime = time;
                    state = 'result';
                    bgColor = 'bg-gray';
                    updateDisplay();
                    
                    // Save score to Firebase if logged in
                    if (window.gameAuth && window.gameAuth.isLoggedIn()) {
                        const u = window.gameAuth.getUser();
                        const entry = { uid: u.uid, name: playerName || u.displayName || u.email || 'Anonymous', time, ts: Date.now() };
                        try {
                            await window.firebasePush(window.firebaseRef(window.firebaseDatabase, 'reaction_timer'), entry);
                            console.log('Score saved to Firebase:', entry);
                        } catch (err) { 
                            console.error('Firebase push error:', err);
                        }
                    }
                    
                    // Always save to localStorage as backup
                    try {
                        const saved = localStorage.getItem('gameLeaderboard') || '{}';
                        const leaderboardData = JSON.parse(saved);
                        if (!leaderboardData['Reaction Timer']) {
                            leaderboardData['Reaction Timer'] = [];
                        }
                        leaderboardData['Reaction Timer'].push({
                            name: playerName,
                            time: time,
                            date: new Date().toISOString()
                        });
                        // Keep only top 10
                        leaderboardData['Reaction Timer'] = leaderboardData['Reaction Timer']
                            .sort((a, b) => a.time - b.time)
                            .slice(0, 10);
                        localStorage.setItem('gameLeaderboard', JSON.stringify(leaderboardData));
                        console.log('Score saved to localStorage');
                    } catch (err) {
                        console.error('localStorage save error:', err);
                    }
                    
                    // refresh leaderboard display
                    await loadLeaderboard();
                } else if (state === 'result') {
                    reactionTime = null;
                    state = 'waiting';
                    bgColor = 'bg-blue';
                    updateDisplay();
                }
            })().catch(err => {
                console.error('handleClick error:', err);
            });
        }

        async function loadLeaderboard() {
            // First try Firebase
            let fbScores = [];
            if (window.firebaseDatabase) {
                try {
                    const dbRef = window.firebaseRef(window.firebaseDatabase, 'reaction_timer');
                    const snap = await window.firebaseGet(dbRef);
                    const data = snap.val() || {};
                    fbScores = Object.values(data)
                        .sort((a, b) => a.time - b.time)
                        .slice(0, 5);
                    console.log('Loaded from Firebase:', fbScores);
                } catch (err) {
                    console.error('Failed to load from Firebase:', err);
                }
            }
            
            // If Firebase is empty, try localStorage
            if (fbScores.length === 0) {
                try {
                    const saved = localStorage.getItem('gameLeaderboard') || '{}';
                    const leaderboardData = JSON.parse(saved);
                    fbScores = (leaderboardData['Reaction Timer'] || [])
                        .sort((a, b) => a.time - b.time)
                        .slice(0, 5);
                    console.log('Loaded from localStorage:', fbScores);
                } catch (err) {
                    console.error('Failed to load from localStorage:', err);
                }
            }
            
            // Update display
            leaderboard = fbScores.map((e, idx) => ({ 
                name: e.name, 
                time: e.time, 
                title: idx === 0 ? 'Sigma 67er' : '' 
            }));
            updateLeaderboard();
            
            // Sync to localStorage
            if (fbScores.length > 0) {
                try {
                    const saved = localStorage.getItem('gameLeaderboard') || '{}';
                    const leaderboardData = JSON.parse(saved);
                    leaderboardData['Reaction Timer'] = fbScores.map(e => ({
                        name: e.name,
                        time: e.time,
                        date: new Date(e.ts || Date.now()).toISOString()
                    }));
                    localStorage.setItem('gameLeaderboard', JSON.stringify(leaderboardData));
                } catch (err) {
                    console.warn('Failed to sync to localStorage:', err);
                }
            }
        }
        
        // Add hidden class to CSS
        const style = document.createElement('style');
        style.textContent = '.hidden { display: none !important; }';
        document.head.appendChild(style);

        // init() is called by auth state listener, not here
        // This prevents page reloads when auth state changes
    </script>
</body>
</html>
