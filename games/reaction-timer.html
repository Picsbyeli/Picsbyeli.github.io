<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Timer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .game-area {
            flex: 1;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            transition: background-color 0.3s;
        }
        
        .bg-blue { background: #3b82f6; }
        .bg-red { background: #dc2626; }
        .bg-green { background: #16a34a; }
        .bg-yellow { background: #eab308; }
        .bg-purple { background: #9333ea; }
        .bg-pink { background: #ec4899; }
        .bg-indigo { background: #6366f1; }
        .bg-gray { background: #374151; }
        
        .content {
            text-align: center;
            color: white;
        }
        
        .icon {
            width: 96px;
            height: 96px;
            margin: 0 auto 24px;
            font-size: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .icon-pulse {
            animation: pulse 2s infinite;
        }
        
        .icon-bounce {
            animation: bounce 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 24px;
        }
        
        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 16px;
        }
        
        .instruction {
            font-size: 1.25rem;
        }
        
        .wait-text {
            font-size: 3.75rem;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        
        .wait-instruction {
            font-size: 1.25rem;
            margin-top: 16px;
        }
        
        .click-text {
            font-size: 4.375rem;
            font-weight: bold;
        }
        
        .result-time {
            font-size: 3.75rem;
            font-weight: bold;
        }
        
        .result-label {
            font-size: 1.875rem;
            margin-top: 16px;
        }
        
        .result-instruction {
            font-size: 1.25rem;
            margin-top: 16px;
        }
        
        .leaderboard {
            background: #1f2937;
            color: white;
            padding: 32px;
        }
        
        .leaderboard-container {
            max-width: 512px;
            margin: 0 auto;
        }
        
        .name-input {
            padding: 8px 16px;
            background: #374151;
            color: white;
            border-radius: 8px;
            border: 1px solid #4b5563;
            margin-bottom: 16px;
        }
        
        .name-input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .leaderboard-title {
            font-size: 1.875rem;
            font-weight: bold;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .trophy-icon {
            color: #fbbf24;
        }
        
        .leaderboard-entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        
        .entry-gold {
            background: linear-gradient(90deg, #d97706 0%, #b45309 100%);
        }
        
        .entry-normal {
            background: #374151;
        }
        
        .entry-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .entry-rank {
            font-size: 1.5rem;
            font-weight: bold;
            width: 32px;
        }
        
        .entry-name {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .entry-title {
            background: #7c3aed;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.875rem;
            font-weight: bold;
        }
        
        .entry-time {
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
        }
        
        .back-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            z-index: 1000;
        }
    </style>
    <!-- Firebase setup for authentication and leaderboard storage -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
        import { getDatabase, ref, push, query, orderByChild, limitToFirst, get } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js';
        import { GameAuth } from '../js/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAQE2mo6RNgwG-WaooCpoZjQ9Z8G2MHvx8",
            authDomain: "profile-9e9f9.firebaseapp.com",
            databaseURL: "https://profile-9e9f9-default-rtdb.firebaseio.com",
            projectId: "profile-9e9f9",
            storageBucket: "profile-9e9f9.firebasestorage.app",
            messagingSenderId: "610449223815",
            appId: "1:610449223815:web:3cdb864b4314d2b901c822",
            measurementId: "G-7R4Z3ZSZ67"
        };

        // initialize firebase and make globals
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        window.firebaseApp = app;
        window.firebaseDatabase = database;
        window.firebaseRef = ref;
        window.firebasePush = push;
        window.firebaseQuery = query;
        window.firebaseOrderByChild = orderByChild;
        window.firebaseLimitToFirst = limitToFirst;
        window.firebaseGet = get;

        // authentication helper
        window.gameAuth = new GameAuth(app);

        // Wait for auth to initialize, then setup UI and init game
        window.gameAuth.onAuthStateChanged(() => {
            // trigger game init only after auth state settles
            if (typeof init === 'function') {
                init();
            }
        });

        // global function used in existing code (already present) but keep for consistency
        window.submitScore = async function(gameName, playerScore) {
            if (window.gameAuth && window.gameAuth.isLoggedIn()) {
                // store in RTDB under gameName key
                const user = window.gameAuth.getUser();
                const entry = { uid: user.uid, name: user.displayName || 'Anonymous', time: playerScore, ts: Date.now() };
                try {
                    await push(ref(database, `reaction_timer/${gameName}`), entry);
                } catch (err) {
                    console.error('failed to push score', err);
                }
            }
        };
    </script>
</head>
<body>
    <a href="../index.html" class="back-btn">← Back to Hub</a>
    
    <div id="gameArea" class="game-area bg-blue" onclick="handleClick()">
        <div class="content">
            <div id="waitingState">
                <div class="icon icon-pulse">⏰</div>
                <h1 class="title">Reaction Time Tester</h1>
                <p class="instruction">Click anywhere to start!</p>
            </div>
            
            <div id="readyState" class="hidden">
                <div class="wait-text">WAIT...</div>
                <p class="wait-instruction">Get ready for the color change</p>
            </div>
            
            <div id="goState" class="hidden">
                <div class="icon icon-bounce">⚡</div>
                <div class="click-text">CLICK NOW!</div>
            </div>
            
            <div id="resultState" class="hidden">
                <div class="icon">🏆</div>
                <div id="resultTime" class="result-time">0ms</div>
                <div id="resultLabel" class="result-label">Very Fast! 🔥</div>
                <p class="result-instruction">Click to try again</p>
            </div>
        </div>
    </div>
    
    <div class="leaderboard">
        <div class="leaderboard-container">
            <!-- user info is populated from Firebase auth; no manual name entry to prevent fake scores -->
            <div id="userInfo" style="margin-bottom:16px;font-size:1rem;color:#ddd;"></div>

            <h2 class="leaderboard-title">
                <span class="trophy-icon">🏆</span>
                Leaderboard
            </h2>

            <div id="leaderboardEntries"></div>
        </div>
    </div>
    
    <script>
        let state = 'waiting'; // waiting, ready, go, result
        let reactionTime = null;
        // leaderboard will be fetched from Firebase; fallback empty
        let leaderboard = [];
        let bgColor = 'bg-blue';
        let startTime = null;
        let timeout = null;
        
        const colors = [
            'bg-red', 'bg-green', 'bg-yellow', 
            'bg-purple', 'bg-pink', 'bg-indigo'
        ];
        
        function init() {
            updateDisplay();
            updateLeaderboard();
            
            // display current auth status
            const userInfo = document.getElementById('userInfo');
            if (window.gameAuth && window.gameAuth.isLoggedIn()) {
                const u = window.gameAuth.getUser();
                userInfo.textContent = `Logged in as ${u.displayName || u.email}`;
            } else {
                userInfo.innerHTML = `Not logged in. <a href="../auth.html">Login</a>`;
            }
            // load leaderboard from database
            loadLeaderboard();
        }
        
        function getSpeedLabel(time) {
            if (time < 200) return 'Lightning Fast! ⚡';
            if (time < 250) return 'Very Fast! 🔥';
            if (time < 300) return 'Fast! 👍';
            if (time < 400) return 'Average 😐';
            return 'Slow... 🐌';
        }
        
        function startTest() {
            state = 'ready';
            bgColor = 'bg-red';
            updateDisplay();
            
            const delay = Math.random() * 3000 + 2000; // 2-5 seconds
            
            timeout = setTimeout(() => {
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                bgColor = randomColor;
                state = 'go';
                startTime = Date.now();
                updateDisplay();
            }, delay);
        }
        
        async function handleClick() {
            if (state === 'waiting') {
                startTest();
            } else if (state === 'ready') {
                // Too early!
                clearTimeout(timeout);
                state = 'waiting';
                bgColor = 'bg-blue';
                updateDisplay();
                alert('Too early! Wait for the color change!');
            } else if (state === 'go') {
                const time = Date.now() - startTime;
                reactionTime = time;
                state = 'result';
                bgColor = 'bg-gray';
                updateDisplay();
                
                // Update leaderboard
                // create entry for Firebase (only if logged in)
                if (window.gameAuth && window.gameAuth.isLoggedIn()) {
                    const u = window.gameAuth.getUser();
                    const entry = { uid: u.uid, name: u.displayName || u.email || 'Anonymous', time, ts: Date.now() };
                    // push to database under reaction_timer collection
                    try {
                        await window.firebasePush(window.firebaseRef(window.firebaseDatabase, 'reaction_timer'), entry);
                    } catch (err) { console.error('firebase push error', err); }
                }
                // refresh local leaderboard display from database
                loadLeaderboard();
            } else if (state === 'result') {
                reactionTime = null;
                state = 'waiting';
                bgColor = 'bg-blue';
                updateDisplay();
            }
        }
        
        function updateDisplay() {
            const gameArea = document.getElementById('gameArea');
            gameArea.className = `game-area ${bgColor}`;
            
            // Hide all states
            document.getElementById('waitingState').classList.add('hidden');
            document.getElementById('readyState').classList.add('hidden');
            document.getElementById('goState').classList.add('hidden');
            document.getElementById('resultState').classList.add('hidden');
            
            // Show current state
            if (state === 'waiting') {
                document.getElementById('waitingState').classList.remove('hidden');
            } else if (state === 'ready') {
                document.getElementById('readyState').classList.remove('hidden');
            } else if (state === 'go') {
                document.getElementById('goState').classList.remove('hidden');
            } else if (state === 'result') {
                document.getElementById('resultState').classList.remove('hidden');
                document.getElementById('resultTime').textContent = `${reactionTime}ms`;
                document.getElementById('resultLabel').textContent = getSpeedLabel(reactionTime);
            }
        }
        
        function updateLeaderboard() {
            const entriesEl = document.getElementById('leaderboardEntries');
            entriesEl.innerHTML = '';
            
            leaderboard.forEach((entry, index) => {
                const entryEl = document.createElement('div');
                entryEl.className = `leaderboard-entry ${index === 0 ? 'entry-gold' : 'entry-normal'}`;
                
                entryEl.innerHTML = `
                    <div class="entry-info">
                        <span class="entry-rank">#${index + 1}</span>
                        <span class="entry-name">${entry.name}</span>
                        ${entry.title ? `<span class="entry-title">${entry.title}</span>` : ''}
                    </div>
                    <span class="entry-time">${entry.time}ms</span>
                `;
                
                entriesEl.appendChild(entryEl);
            });
        }

        async function loadLeaderboard() {
            // fetch top 5 lowest reaction times from Firebase
            if (!window.firebaseDatabase) return;
            try {
                const dbRef = window.firebaseRef(window.firebaseDatabase, 'reaction_timer');
                const q = window.firebaseQuery(dbRef, window.firebaseOrderByChild('time'), window.firebaseLimitToFirst(5));
                const snap = await window.firebaseGet(q);
                const data = snap.val() || {};
                const arr = Object.values(data).sort((a, b) => a.time - b.time).slice(0, 5);
                leaderboard = arr.map((e, idx) => ({ name: e.name, time: e.time, title: idx === 0 ? 'Sigma 67er' : '' }));
                updateLeaderboard();
            } catch (err) {
                console.error('failed loading leaderboard', err);
            }
        }
        
        // Add hidden class to CSS
        const style = document.createElement('style');
        style.textContent = '.hidden { display: none !important; }';
        document.head.appendChild(style);
        
        // init() is called by auth state listener, not here
        // This prevents page reloads when auth state changes
    </script>
</body>
</html>
