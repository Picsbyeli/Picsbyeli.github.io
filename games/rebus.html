// ═══ ANSWER CHECKER ═══
function checkAnswer(guess, puzzle) {
  const n = s => s.toLowerCase().replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ").trim();
  const g = n(guess);
  if (!g) return false;
  const check = a => {
    const x = n(a);
    return g === x || (x.includes(g) && g.length > x.length * 0.6) || g.includes(x);
  };
  if (check(puzzle.answer)) return true;
  for (const alt of (puzzle.alt || [])) if (check(alt)) return true;
  return false;
}

// ═══ GAME STATE ═══
const S = {
  screen: "menu", p1Name: "", p2Name: "", category: "all", difficulty: "normal",
  gameMode: "solo", puzzleOrder: [], currentIndex: 0, timeLeft: 30,
  feedback: null, showHint: false, results: [], leaderboard: loadLeaderboard(),
  guess: "", score: 0, streak: 0, hintUsed: false,
  p1Score: 0, p2Score: 0, buzzerPhase: "waiting", buzzedPlayer: null,
  otherHadChance: false, buzzerGuess: "", hintGiven: false,
};

let timerInterval = null;
const p1c = "#60a5fa", p2c = "#f44";

function getPuzzleCount() { return S.difficulty==="easy"?10:S.difficulty==="normal"?20:PUZZLES.length; }
function getTimePerPuzzle() { return S.difficulty==="easy"?45:S.difficulty==="normal"?30:18; }
function escHtml(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ═══ TIMER — ONLY updates timer bar + text, never calls render() ═══
function updateTimerDisplay() {
  var tpp = S.gameMode === "buzzer" ? 10 : getTimePerPuzzle();
  var pct = Math.max(0, (S.timeLeft / tpp) * 100);
  var color = S.gameMode === "solo"
    ? (S.timeLeft > 15 ? "#4ade80" : S.timeLeft > 7 ? "#fbbf24" : "#f44")
    : (S.timeLeft > 10 ? "#4ade80" : S.timeLeft > 5 ? "#fbbf24" : "#f44");

  var bar = document.getElementById("timer-bar");
  if (bar) { bar.style.width = pct + "%"; bar.style.background = color; }
  var txt = document.getElementById("timer-text");
  if (txt) { txt.textContent = S.timeLeft; txt.style.color = color; }
}

function startTimer() {
  clearInterval(timerInterval);
  if (S.gameMode === "solo") {
    timerInterval = setInterval(function() {
      if (S.feedback) return;
      S.timeLeft--;
      if (S.timeLeft <= 0) { clearInterval(timerInterval); soloTimeout(); return; }
      updateTimerDisplay();
    }, 1000);
  } else {
    timerInterval = setInterval(function() {
      if (S.buzzerPhase==="done"||S.buzzerPhase==="buzzed"||S.buzzerPhase==="answering"||S.buzzerPhase==="wrong-other") return;
      S.timeLeft--;
      if (S.timeLeft <= 0) {
        clearInterval(timerInterval);
        if (!S.hintGiven) { S.hintGiven=true; S.showHint=true; S.timeLeft=10; render(); startTimer(); return; }
        else { buzzerSkip(); return; }
      }
      updateTimerDisplay();
    }, 1000);
  }
}

// ═══ GAME LOGIC ═══
function startGame() {
  if (!S.p1Name.trim()) return;
  if (S.gameMode==="buzzer" && !S.p2Name.trim()) return;
  var pool = S.category==="all" ? PUZZLES : PUZZLES.filter(function(p){return p.cat===S.category;});
  var shuffled = pool.slice().sort(function(){return Math.random()-0.5;}).slice(0, Math.min(getPuzzleCount(), pool.length));
  S.puzzleOrder=shuffled; S.currentIndex=0; S.guess=""; S.score=0; S.streak=0;
  S.p1Score=0; S.p2Score=0; S.hintUsed=false; S.showHint=false;
  S.timeLeft = S.gameMode==="buzzer"?10:getTimePerPuzzle();
  S.feedback=null; S.results=[]; S.buzzerPhase="waiting"; S.buzzedPlayer=null;
  S.otherHadChance=false; S.buzzerGuess=""; S.hintGiven=false; S.screen="game";
  render();
  startTimer();
  setTimeout(function(){ var inp=document.getElementById("guess-input"); if(inp) inp.focus(); }, 50);
}

function soloTimeout() {
  var p=S.puzzleOrder[S.currentIndex]; if(!p) return;
  S.streak=0; S.feedback={type:"timeout",answer:p.answer};
  S.results.push({correct:false,answer:p.answer,playerAnswer:"Time's up",cat:p.cat});
  render();
}

function soloCheck() {
  if (!S.guess.trim() || (S.feedback && S.feedback.type!=="wrong")) return;
  var p=S.puzzleOrder[S.currentIndex];
  if (checkAnswer(S.guess,p)) {
    clearInterval(timerInterval);
    var pts=Math.max(200+Math.floor(S.timeLeft*2)+S.streak*50+(S.hintUsed?-100:0),50);
    S.score+=pts; S.streak++;
    S.feedback={type:"correct",points:pts};
    S.results.push({correct:true,answer:p.answer,playerAnswer:S.guess,cat:p.cat});
    render();
  } else {
    // Just shake the input — no re-render needed
    var inp = document.getElementById("guess-input");
    if (inp) { inp.classList.remove("shake"); void inp.offsetWidth; inp.classList.add("shake"); }
  }
}

function soloSkip() {
  if (S.feedback && (S.feedback.type==="correct"||S.feedback.type==="timeout")) return;
  clearInterval(timerInterval);
  var p=S.puzzleOrder[S.currentIndex];
  S.streak=0; S.feedback={type:"skip",answer:p.answer};
  S.results.push({correct:false,answer:p.answer,playerAnswer:"Skipped",cat:p.cat});
  render();
}

function soloHint() {
  S.hintUsed=true; S.showHint=true; render();
  setTimeout(function(){ var inp=document.getElementById("guess-input"); if(inp) inp.focus(); }, 50);
}

function buzz(player) {
  if (S.buzzerPhase !== "waiting") return;
  clearInterval(timerInterval);
  S.buzzedPlayer=player; S.buzzerPhase="buzzed"; S.buzzerGuess="";
  render();
  setTimeout(function(){
    S.buzzerPhase="answering"; render();
    setTimeout(function(){ var inp=document.getElementById("buzzer-input"); if(inp) inp.focus(); },50);
  },800);
}

function buzzerSubmit() {
  if (!S.buzzerGuess.trim()) return;
  var p=S.puzzleOrder[S.currentIndex];
  if (checkAnswer(S.buzzerGuess,p)) {
    if(S.buzzedPlayer===1) S.p1Score+=200; else S.p2Score+=200;
    S.buzzerPhase="done"; S.feedback={type:"correct",player:S.buzzedPlayer};
    S.results.push({correct:true,answer:p.answer,playerAnswer:S.buzzerGuess,cat:p.cat,player:S.buzzedPlayer});
  } else {
    if (S.otherHadChance) {
      S.buzzerPhase="done"; S.feedback={type:"skip",answer:p.answer};
      S.results.push({correct:false,answer:p.answer,playerAnswer:"Both wrong",cat:p.cat});
    } else {
      S.otherHadChance=true; S.buzzerPhase="wrong-other";
    }
  }
  render();
}

function buzzerOtherTry() {
  S.buzzedPlayer = S.buzzedPlayer===1?2:1;
  S.buzzerGuess=""; S.buzzerPhase="answering";
  render();
  setTimeout(function(){ var inp=document.getElementById("buzzer-input"); if(inp) inp.focus(); },50);
}

function buzzerSkip() {
  var p=S.puzzleOrder[S.currentIndex];
  S.buzzerPhase="done"; S.feedback={type:"skip",answer:p.answer};
  S.results.push({correct:false,answer:p.answer,playerAnswer:"Skipped",cat:p.cat});
  render();
}

function nextPuzzle() {
  if (S.currentIndex+1 >= S.puzzleOrder.length) { finishGame(); return; }
  S.currentIndex++; S.guess=""; S.hintUsed=false; S.showHint=false;
  S.timeLeft = S.gameMode==="buzzer"?10:getTimePerPuzzle();
  S.feedback=null; S.buzzerPhase="waiting"; S.buzzedPlayer=null;
  S.otherHadChance=false; S.buzzerGuess=""; S.hintGiven=false;
  render();
  startTimer();
  if (S.gameMode==="solo") setTimeout(function(){ var inp=document.getElementById("guess-input"); if(inp) inp.focus(); },50);
}

function finishGame() {
  clearInterval(timerInterval);
  var entries=[];
  if (S.gameMode==="solo") {
    entries.push({name:S.p1Name,score:S.score,correct:S.results.filter(function(r){return r.correct;}).length,total:S.puzzleOrder.length,difficulty:S.difficulty,category:S.category,mode:"solo",date:new Date().toLocaleDateString()});
  } else {
    entries.push({name:S.p1Name,score:S.p1Score,correct:S.results.filter(function(r){return r.correct&&r.player===1;}).length,total:S.puzzleOrder.length,difficulty:S.difficulty,category:S.category,mode:"buzzer",date:new Date().toLocaleDateString()});
    entries.push({name:S.p2Name,score:S.p2Score,correct:S.results.filter(function(r){return r.correct&&r.player===2;}).length,total:S.puzzleOrder.length,difficulty:S.difficulty,category:S.category,mode:"buzzer",date:new Date().toLocaleDateString()});
  }
  var newLb=S.leaderboard.concat(entries).sort(function(a,b){return b.score-a.score;}).slice(0,30);
  S.leaderboard=newLb; saveLeaderboard(newLb);
  S.screen="results"; render();
}

// Buzzer keyboard shortcuts
document.addEventListener("keydown", function(e) {
  if (S.screen!=="game"||S.gameMode!=="buzzer"||S.buzzerPhase!=="waiting") return;
  var k=e.key.toLowerCase();
  if (k==="q"||k==="a") buzz(1);
  if (k==="p"||k==="l") buzz(2);
});

// ═══ RENDER — rebuilds DOM only on state changes, NOT on timer ticks ═══
var app = document.getElementById("app");
var catLabel = {all:"All",phrase:"Phrases",movie:"Movies"};
var catIcon = {all:"&#127922;",phrase:"&#128172;",movie:"&#127916;"};

function render() {
  // Save input value and cursor position before rebuild
  var guessInput = document.getElementById("guess-input");
  var buzzerInput = document.getElementById("buzzer-input");
  var savedGuess = guessInput ? guessInput.value : S.guess;
  var savedBuzzerGuess = buzzerInput ? buzzerInput.value : S.buzzerGuess;
  // Sync state with live input values
  if (guessInput) S.guess = savedGuess;
  if (buzzerInput) S.buzzerGuess = savedBuzzerGuess;

  var html = "";
  var headerSize = S.screen==="menu"?48:26;
  html += '<div style="text-align:center;margin-bottom:'+(S.screen==="menu"?16:10)+'px;">' +
    '<h1 onclick="S.screen=\'menu\';clearInterval(timerInterval);render();" style="font-family:\'Playfair Display\',Georgia,serif;font-size:'+headerSize+'px;font-weight:900;background:linear-gradient(135deg,#f44 0%,#ff8844 50%,#ffd700 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0;letter-spacing:2px;cursor:pointer;">REBUS</h1>' +
    (S.screen==="menu"?'<p style="color:#888;font-size:13px;margin-top:4px;letter-spacing:4px;text-transform:uppercase;">Decode the Visual &middot; '+PUZZLES.length+' Puzzles</p>':"") +
  '</div>';

  if (S.screen==="menu") html += renderMenu();
  else if (S.screen==="game"&&S.gameMode==="solo") html += renderSoloGame();
  else if (S.screen==="game"&&S.gameMode==="buzzer") html += renderBuzzerGame();
  else if (S.screen==="results") html += renderResults();
  else if (S.screen==="leaderboard") html += renderLeaderboard();

  app.innerHTML = html;

  // Restore focus to inputs after DOM rebuild
  if (S.screen === "game") {
    var gi = document.getElementById("guess-input");
    if (gi && document.activeElement !== gi) {
      gi.focus();
      try { gi.setSelectionRange(gi.value.length, gi.value.length); } catch(e) {}
    }
    var bi = document.getElementById("buzzer-input");
    if (bi && document.activeElement !== bi) {
      bi.focus();
      try { bi.setSelectionRange(bi.value.length, bi.value.length); } catch(e) {}
    }
  }
}

  return '<div style="width:100%;max-width:500px;">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">' +
      '<div style="text-align:center;"><div style="color:'+p1c+';font-size:13px;font-weight:700;">'+escHtml(S.p1Name)+'</div><div style="color:'+p1c+';font-size:22px;font-weight:900;font-family:\'JetBrains Mono\',monospace;">'+S.p1Score+'</div></div>' +
      '<div style="text-align:center;"><span style="color:#666;font-size:12px;">'+(S.currentIndex+1)+'/'+S.puzzleOrder.length+'</span><div id="timer-text" style="color:'+timerColor+';font-size:28px;font-weight:900;font-family:\'JetBrains Mono\',monospace;">'+S.timeLeft+'</div></div>' +
      '<div style="text-align:center;"><div style="color:'+p2c+';font-size:13px;font-weight:700;">'+escHtml(S.p2Name)+'</div><div style="color:'+p2c+';font-size:22px;font-weight:900;font-family:\'JetBrains Mono\',monospace;">'+S.p2Score+'</div></div>' +
    '</div>' +
    '<div style="width:100%;height:4px;background:#1a1a2e;border-radius:2px;margin-bottom:12px;overflow:hidden;">' +
      '<div id="timer-bar" style="width:'+timerPct+'%;height:100%;background:'+timerColor+';border-radius:2px;transition:width 1s linear;"></div>' +
    '</div>' +
    '<div class="pop" style="width:100%;height:180px;border-radius:14px;overflow:hidden;border:2px solid #2a2a3e;margin-bottom:8px;">'+renderPuzzleVisual(puzzle)+'</div>' +
    '<div style="text-align:center;margin-bottom:8px;">' +
      '<span style="display:inline-block;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;background:'+(puzzle.cat==="movie"?"#ff884420":"#4ade8020")+';color:'+(puzzle.cat==="movie"?"#ff8844":"#4ade80")+';text-transform:uppercase;">'+(puzzle.cat==="movie"?"&#127916; Movie":"&#128172; Phrase")+'</span>' +
    '</div>' +
    (S.showHint?'<div class="slide-up" style="padding:6px 12px;background:#1a1a2e;border-radius:8px;margin-bottom:8px;border:1px solid #fbbf2440;font-size:12px;color:#fbbf24;text-align:center;">&#128161; '+escHtml(puzzle.hint)+'</div>':"") +
    phaseHtml +
  '</div>';
}

function renderResults() {
  var res=S.results;
  var header="";
  if (S.gameMode==="buzzer") {
    var winner=S.p1Score>S.p2Score?S.p1Name:S.p2Score>S.p1Score?S.p2Name:null;
    var wColor=S.p1Score>S.p2Score?p1c:S.p2Score>S.p1Score?p2c:"#ffd700";
    header='<div style="text-align:center;margin-bottom:20px;">' +
      '<div style="font-size:44px;margin-bottom:6px;">'+(winner?"&#127942;":"&#129309;")+'</div>' +
      '<div style="font-family:\'Playfair Display\',Georgia,serif;font-size:26px;font-weight:900;color:'+wColor+';">'+(winner?escHtml(winner)+' Wins!':'Tie!')+'</div>' +
      '<div style="display:flex;justify-content:center;gap:28px;margin-top:10px;">' +
        '<div style="text-align:center;"><div style="color:'+p1c+';font-weight:700;font-size:13px;">'+escHtml(S.p1Name)+'</div><div style="color:'+p1c+';font-size:26px;font-weight:900;font-family:\'JetBrains Mono\',monospace;">'+S.p1Score+'</div></div>' +
        '<div style="color:#333;font-size:24px;font-weight:900;align-self:center;">vs</div>' +
        '<div style="text-align:center;"><div style="color:'+p2c+';font-weight:700;font-size:13px;">'+escHtml(S.p2Name)+'</div><div style="color:'+p2c+';font-size:26px;font-weight:900;font-family:\'JetBrains Mono\',monospace;">'+S.p2Score+'</div></div>' +
      '</div>' +
    '</div>';
  } else {
    header='<div style="text-align:center;margin-bottom:20px;">' +
      '<div style="font-size:44px;margin-bottom:6px;">&#127942;</div>' +
      '<div style="font-family:\'Playfair Display\',Georgia,serif;font-size:36px;font-weight:900;color:#ffd700;">'+S.score+'</div>' +
      '<div style="color:#888;font-size:13px;margin-top:2px;">'+res.filter(function(r){return r.correct;}).length+'/'+res.length+' correct</div>' +
    '</div>';
  }
  var rows=res.map(function(r){return '<div style="display:flex;align-items:center;gap:6px;padding:5px 10px;background:#1a1a2e;border-radius:6px;border-left:3px solid '+(r.correct?"#4ade80":"#f44")+';">' +
    '<span style="font-size:12px;">'+(r.cat==="movie"?"&#127916;":"&#128172;")+'</span>' +
    '<span style="font-size:13px;">'+(r.correct?"&#10003;":"&#10007;")+'</span>' +
    '<span style="flex:1;color:#ccc;font-size:11px;">'+escHtml(r.answer)+'</span>' +
    (r.correct&&r.player?'<span style="font-size:9px;color:'+(r.player===1?p1c:p2c)+';font-weight:700;">'+escHtml(r.player===1?S.p1Name:S.p2Name)+'</span>':"") +
  '</div>';}).join("");

  return '<div style="width:100%;max-width:460px;animation:slideUp .4s ease-out;">' +
    header +
    '<div style="display:flex;flex-direction:column;gap:3px;margin-bottom:16px;max-height:240px;overflow-y:auto;">'+rows+'</div>' +
    '<div style="display:flex;gap:8px;">' +
      '<button class="btn" onclick="startGame();" style="flex:1;padding:12px;font-size:14px;font-weight:700;background:linear-gradient(135deg,#f44,#ff8844);color:#fff;border-radius:10px;">Play Again</button>' +
      '<button class="btn" onclick="S.screen=\'leaderboard\';render();" style="flex:1;padding:12px;font-size:14px;font-weight:700;background:#1a1a2e;color:#ffd700;border-radius:10px;border:1px solid #ffd70040;">Leaderboard</button>' +
    '</div>' +
    '<button class="btn" onclick="S.screen=\'menu\';render();" style="width:100%;padding:9px;font-size:12px;font-weight:600;background:transparent;color:#666;border-radius:10px;border:1px solid #2a2a3e;margin-top:6px;">Menu</button>' +
  '</div>';
}

function renderLeaderboard() {
  var lb=S.leaderboard;
  var rows=lb.length===0?'<div style="text-align:center;color:#666;padding:40px;font-size:14px;">No scores yet!</div>':
    '<div style="display:flex;flex-direction:column;gap:4px;max-height:400px;overflow-y:auto;">' +
      lb.map(function(e,i){return '<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:'+(i<3?"#1a1a2e":"#12121e")+';border-radius:10px;border:'+(i===0?"1px solid #ffd70030":"1px solid transparent")+';">' +
        '<span style="font-size:15px;font-weight:900;width:26px;text-align:center;color:'+(i===0?"#ffd700":i===1?"#c0c0c0":i===2?"#cd7f32":"#555")+';">'+(i===0?"&#129351;":i===1?"&#129352;":i===2?"&#129353;":"#"+(i+1))+'</span>' +
        '<div style="flex:1;"><div style="color:#e8e4dc;font-weight:700;font-size:13px;">'+escHtml(e.name)+'</div><div style="color:#666;font-size:9px;">'+e.correct+'/'+e.total+' &middot; '+e.difficulty+' &middot; '+(catLabel[e.category]||"All")+' &middot; '+(e.mode||"solo")+' &middot; '+e.date+'</div></div>' +
        '<span style="color:#ffd700;font-weight:900;font-family:\'JetBrains Mono\',monospace;font-size:15px;">'+e.score+'</span>' +
      '</div>';}).join("") +
    '</div>';

  return '<div style="width:100%;max-width:440px;animation:slideUp .4s ease-out;">' +
    '<h2 style="font-family:\'Playfair Display\',Georgia,serif;font-size:28px;font-weight:900;color:#ffd700;text-align:center;margin:0 0 14px;">Leaderboard</h2>' +
    rows +
    '<div style="display:flex;gap:8px;margin-top:14px;">' +
      '<button class="btn" onclick="S.screen=\'menu\';render();" style="flex:1;padding:12px;font-size:14px;font-weight:700;background:linear-gradient(135deg,#f44,#ff8844);color:#fff;border-radius:10px;">Back to Menu</button>' +
      (lb.length>0?'<button class="btn" onclick="S.leaderboard=[];saveLeaderboard([]);render();" style="padding:12px 14px;font-size:11px;font-weight:600;background:#1a1a2e;color:#f44;border-radius:10px;border:1px solid #f4444030;">Reset</button>':"") +
    '</div>' +
  '</div>';
}

// ═══ INIT ═══
render();
</script>
</body>
</html>
