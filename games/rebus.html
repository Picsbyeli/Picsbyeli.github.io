// ═══ ANSWER CHECKER ═══
function checkAnswer(guess, puzzle) {
  const n = s => s.toLowerCase().replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ").trim();
  const g = n(guess);
  if (!g) return false;
  const check = a => {
    const x = n(a);
    return g === x || (x.includes(g) && g.length > x.length * 0.6) || g.includes(x);
  };
  if (check(puzzle.answer)) return true;
  for (const alt of (puzzle.alt || [])) if (check(alt)) return true;
  return false;
}

// ═══ GAME STATE ═══
const state = {
  screen: "menu",
  p1Name: "",
  p2Name: "",
  category: "all",
  difficulty: "normal",
  gameMode: "solo",
  puzzleOrder: [],
  currentIndex: 0,
  timeLeft: 30,
  feedback: null,
  showHint: false,
  results: [],
  leaderboard: loadLeaderboard(),
  guess: "",
  score: 0,
  streak: 0,
  hintUsed: false,
  // Buzzer
  p1Score: 0,
  p2Score: 0,
  buzzerPhase: "waiting",
  buzzedPlayer: null,
  otherHadChance: false,
  buzzerGuess: "",
  hintGiven: false,
};

let timerInterval = null;
const p1c = "#60a5fa", p2c = "#f44";

function getPuzzleCount() {
  return state.difficulty === "easy" ? 10 : state.difficulty === "normal" ? 20 : PUZZLES.length;
}
function getTimePerPuzzle() {
  return state.difficulty === "easy" ? 45 : state.difficulty === "normal" ? 30 : 18;
}

// ═══ GAME LOGIC ═══
function startGame() {
  if (!state.p1Name.trim()) return;
  if (state.gameMode === "buzzer" && !state.p2Name.trim()) return;
  const pool = state.category === "all" ? PUZZLES : PUZZLES.filter(p => p.cat === state.category);
  const shuffled = [...pool].sort(() => Math.random() - 0.5).slice(0, Math.min(getPuzzleCount(), pool.length));
  Object.assign(state, {
    puzzleOrder: shuffled, currentIndex: 0, guess: "", score: 0, streak: 0,
    p1Score: 0, p2Score: 0, hintUsed: false, showHint: false,
    timeLeft: state.gameMode === "buzzer" ? 10 : getTimePerPuzzle(),
    feedback: null, results: [], buzzerPhase: "waiting", buzzedPlayer: null,
    otherHadChance: false, buzzerGuess: "", hintGiven: false, screen: "game"
  });
  startTimer();
  render();
  setTimeout(() => {
    const inp = document.getElementById("guess-input");
    if (inp) inp.focus();
  }, 100);
}

function startTimer() {
  clearInterval(timerInterval);
  if (state.gameMode === "solo") {
    timerInterval = setInterval(() => {
      if (state.feedback) return;
      state.timeLeft--;
      if (state.timeLeft <= 0) {
        clearInterval(timerInterval);
        soloTimeout();
      }
      render();
    }, 1000);
  } else {
    timerInterval = setInterval(() => {
      if (state.buzzerPhase === "done" || state.buzzerPhase === "buzzed" || state.buzzerPhase === "answering" || state.buzzerPhase === "wrong-other") return;
      state.timeLeft--;
      if (state.timeLeft <= 0) {
        clearInterval(timerInterval);
        if (!state.hintGiven) {
          state.hintGiven = true;
          state.showHint = true;
          state.timeLeft = 10;
          startTimer();
        } else {
          buzzerSkip();
        }
      }
      render();
    }, 1000);
  }
}

// Solo
function soloTimeout() {
  const p = state.puzzleOrder[state.currentIndex];
  if (!p) return;
  state.streak = 0;
  state.feedback = { type: "timeout", answer: p.answer };
  state.results.push({ correct: false, answer: p.answer, playerAnswer: "⏱ Time's up", cat: p.cat });
  render();
}

function soloCheck() {
  if (!state.guess.trim() || (state.feedback && state.feedback.type !== "wrong")) return;
  const p = state.puzzleOrder[state.currentIndex];
  if (checkAnswer(state.guess, p)) {
    clearInterval(timerInterval);
    const pts = Math.max(200 + Math.floor(state.timeLeft * 2) + state.streak * 50 + (state.hintUsed ? -100 : 0), 50);
    state.score += pts;
    state.streak++;
    state.feedback = { type: "correct", points: pts };
    state.results.push({ correct: true, answer: p.answer, playerAnswer: state.guess, cat: p.cat });
  } else {
    state.feedback = { type: "wrong" };
    render();
    setTimeout(() => {
      state.feedback = null;
      render();
    }, 800);
    return;
  }
  render();
}

function soloSkip() {
  if (state.feedback && (state.feedback.type === "correct" || state.feedback.type === "timeout")) return;
  clearInterval(timerInterval);
  const p = state.puzzleOrder[state.currentIndex];
  state.streak = 0;
  state.feedback = { type: "skip", answer: p.answer };
  state.results.push({ correct: false, answer: p.answer, playerAnswer: "Skipped", cat: p.cat });
  render();
}

// Buzzer
function buzz(player) {
  clearInterval(timerInterval);
  state.buzzedPlayer = player;
  state.buzzerPhase = "buzzed";
  state.buzzerGuess = "";
  render();
  setTimeout(() => {
    state.buzzerPhase = "answering";
    render();
    setTimeout(() => {
      const inp = document.getElementById("buzzer-input");
      if (inp) inp.focus();
    }, 50);
  }, 800);
}

function buzzerSubmit() {
  if (!state.buzzerGuess.trim()) return;
  const p = state.puzzleOrder[state.currentIndex];
  if (checkAnswer(state.buzzerGuess, p)) {
    if (state.buzzedPlayer === 1) state.p1Score += 200; else state.p2Score += 200;
    state.buzzerPhase = "done";
    state.feedback = { type: "correct", player: state.buzzedPlayer };
    state.results.push({ correct: true, answer: p.answer, playerAnswer: state.buzzerGuess, cat: p.cat, player: state.buzzedPlayer });
  } else {
    if (state.otherHadChance) {
      state.buzzerPhase = "done";
      state.feedback = { type: "skip", answer: p.answer };
      state.results.push({ correct: false, answer: p.answer, playerAnswer: "Both wrong", cat: p.cat });
    } else {
      state.otherHadChance = true;
      state.buzzerPhase = "wrong-other";
    }
  }
  render();
}

function buzzerOtherTry() {
  state.buzzedPlayer = state.buzzedPlayer === 1 ? 2 : 1;
  state.buzzerGuess = "";
  state.buzzerPhase = "answering";
  render();
  setTimeout(() => {
    const inp = document.getElementById("buzzer-input");
    if (inp) inp.focus();
  }, 50);
}

function buzzerSkip() {
  const p = state.puzzleOrder[state.currentIndex];
  state.buzzerPhase = "done";
  state.feedback = { type: "skip", answer: p.answer };
  state.results.push({ correct: false, answer: p.answer, playerAnswer: "Skipped", cat: p.cat });
  render();
}

function nextPuzzle() {
  if (state.currentIndex + 1 >= state.puzzleOrder.length) {
    finishGame();
    return;
  }
  state.currentIndex++;
  state.guess = "";
  state.hintUsed = false;
  state.showHint = false;
  state.timeLeft = state.gameMode === "buzzer" ? 10 : getTimePerPuzzle();
  state.feedback = null;
  state.buzzerPhase = "waiting";
  state.buzzedPlayer = null;
  state.otherHadChance = false;
  state.buzzerGuess = "";
  state.hintGiven = false;
  startTimer();
  render();
  if (state.gameMode === "solo") {
    setTimeout(() => {
      const inp = document.getElementById("guess-input");
      if (inp) inp.focus();
    }, 100);
  }
}

function finishGame() {
  clearInterval(timerInterval);
  const entries = [];
  if (state.gameMode === "solo") {
    entries.push({ name: state.p1Name, score: state.score, correct: state.results.filter(r => r.correct).length, total: state.puzzleOrder.length, difficulty: state.difficulty, category: state.category, mode: "solo", date: new Date().toLocaleDateString() });
  } else {
    entries.push({ name: state.p1Name, score: state.p1Score, correct: state.results.filter(r => r.correct && r.player === 1).length, total: state.puzzleOrder.length, difficulty: state.difficulty, category: state.category, mode: "buzzer", date: new Date().toLocaleDateString() });
    entries.push({ name: state.p2Name, score: state.p2Score, correct: state.results.filter(r => r.correct && r.player === 2).length, total: state.puzzleOrder.length, difficulty: state.difficulty, category: state.category, mode: "buzzer", date: new Date().toLocaleDateString() });
  }
  const newLb = [...state.leaderboard, ...entries].sort((a, b) => b.score - a.score).slice(0, 30);
  state.leaderboard = newLb;
  saveLeaderboard(newLb);
  state.screen = "results";
  render();
}

// Keyboard handler for buzzer
function handleBuzzerKeys(e) {
  if (state.screen !== "game" || state.gameMode !== "buzzer" || state.buzzerPhase !== "waiting") return;
  const k = e.key.toLowerCase();
  if (k === "q" || k === "a") buzz(1);
  if (k === "p" || k === "l") buzz(2);
}

document.addEventListener("keydown", handleBuzzerKeys);

      <span style="display:inline-block;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;background:${puzzle.cat === "movie" ? "#ff884420" : "#4ade8020"};color:${puzzle.cat === "movie" ? "#ff8844" : "#4ade80"};text-transform:uppercase;">${puzzle.cat === "movie" ? "🎬 Movie" : "💬 Phrase"}</span>
    </div>
    ${state.showHint ? `<div class="slide-up" style="padding:6px 12px;background:#1a1a2e;border-radius:8px;margin-bottom:8px;border:1px solid #fbbf2440;font-size:12px;color:#fbbf24;text-align:center;">💡 ${escHtml(puzzle.hint)}</div>` : ""}
    ${phaseHtml}
  </div>`;
}

function renderResults() {
  const res = state.results;
  let header = "";
  if (state.gameMode === "buzzer") {
    const winner = state.p1Score > state.p2Score ? state.p1Name : state.p2Score > state.p1Score ? state.p2Name : null;
    const wColor = state.p1Score > state.p2Score ? p1c : state.p2Score > state.p1Score ? p2c : "#ffd700";
    header = `<div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:44px;margin-bottom:6px;">${winner ? "🏆" : "🤝"}</div>
      <div style="font-family:'Playfair Display',Georgia,serif;font-size:26px;font-weight:900;color:${wColor};">${winner ? `${escHtml(winner)} Wins!` : "Tie!"}</div>
      <div style="display:flex;justify-content:center;gap:28px;margin-top:10px;">
        <div style="text-align:center;"><div style="color:${p1c};font-weight:700;font-size:13px;">${escHtml(state.p1Name)}</div><div style="color:${p1c};font-size:26px;font-weight:900;font-family:'JetBrains Mono',monospace;">${state.p1Score}</div></div>
        <div style="color:#333;font-size:24px;font-weight:900;align-self:center;">vs</div>
        <div style="text-align:center;"><div style="color:${p2c};font-weight:700;font-size:13px;">${escHtml(state.p2Name)}</div><div style="color:${p2c};font-size:26px;font-weight:900;font-family:'JetBrains Mono',monospace;">${state.p2Score}</div></div>
      </div>
    </div>`;
  } else {
    header = `<div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:44px;margin-bottom:6px;">🏆</div>
      <div style="font-family:'Playfair Display',Georgia,serif;font-size:36px;font-weight:900;color:#ffd700;">${state.score}</div>
      <div style="color:#888;font-size:13px;margin-top:2px;">${res.filter(r => r.correct).length}/${res.length} correct</div>
    </div>`;
  }

  const rows = res.map((r, i) => `
    <div style="display:flex;align-items:center;gap:6px;padding:5px 10px;background:#1a1a2e;border-radius:6px;border-left:3px solid ${r.correct ? "#4ade80" : "#f44"};">
      <span style="font-size:12px;">${r.cat === "movie" ? "🎬" : "💬"}</span>
      <span style="font-size:13px;">${r.correct ? "✓" : "✗"}</span>
      <span style="flex:1;color:#ccc;font-size:11px;">${escHtml(r.answer)}</span>
      ${r.correct && r.player ? `<span style="font-size:9px;color:${r.player === 1 ? p1c : p2c};font-weight:700;">${escHtml(r.player === 1 ? state.p1Name : state.p2Name)}</span>` : ""}
    </div>`).join("");

  return `<div style="width:100%;max-width:460px;animation:slideUp .4s ease-out;">
    ${header}
    <div style="display:flex;flex-direction:column;gap:3px;margin-bottom:16px;max-height:240px;overflow-y:auto;">${rows}</div>
    <div style="display:flex;gap:8px;">
      <button class="btn" onclick="startGame();" style="flex:1;padding:12px;font-size:14px;font-weight:700;background:linear-gradient(135deg,#f44,#ff8844);color:#fff;border-radius:10px;">Play Again</button>
      <button class="btn" onclick="state.screen='leaderboard';render();" style="flex:1;padding:12px;font-size:14px;font-weight:700;background:#1a1a2e;color:#ffd700;border-radius:10px;border:1px solid #ffd70040;">Leaderboard</button>
    </div>
    <button class="btn" onclick="state.screen='menu';render();" style="width:100%;padding:9px;font-size:12px;font-weight:600;background:transparent;color:#666;border-radius:10px;border:1px solid #2a2a3e;margin-top:6px;">Menu</button>
  </div>`;
}

function renderLeaderboard() {
  const lb = state.leaderboard;
  const rows = lb.length === 0 ? `<div style="text-align:center;color:#666;padding:40px;font-size:14px;">No scores yet!</div>` :
    `<div style="display:flex;flex-direction:column;gap:4px;max-height:400px;overflow-y:auto;">
      ${lb.map((e, i) => `
        <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:${i < 3 ? "#1a1a2e" : "#12121e"};border-radius:10px;border:${i === 0 ? "1px solid #ffd70030" : "1px solid transparent"};">
          <span style="font-size:15px;font-weight:900;width:26px;text-align:center;color:${i === 0 ? "#ffd700" : i === 1 ? "#c0c0c0" : i === 2 ? "#cd7f32" : "#555"};">${i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "#" + (i + 1)}</span>
          <div style="flex:1;"><div style="color:#e8e4dc;font-weight:700;font-size:13px;">${escHtml(e.name)}</div><div style="color:#666;font-size:9px;">${e.correct}/${e.total} · ${e.difficulty} · ${catLabel[e.category] || "All"} · ${e.mode || "solo"} · ${e.date}</div></div>
          <span style="color:#ffd700;font-weight:900;font-family:'JetBrains Mono',monospace;font-size:15px;">${e.score}</span>
        </div>`).join("")}
    </div>`;

  return `<div style="width:100%;max-width:440px;animation:slideUp .4s ease-out;">
    <h2 style="font-family:'Playfair Display',Georgia,serif;font-size:28px;font-weight:900;color:#ffd700;text-align:center;margin:0 0 14px;">Leaderboard</h2>
    ${rows}
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn" onclick="state.screen='menu';render();" style="flex:1;padding:12px;font-size:14px;font-weight:700;background:linear-gradient(135deg,#f44,#ff8844);color:#fff;border-radius:10px;">Back to Menu</button>
      ${lb.length > 0 ? `<button class="btn" onclick="state.leaderboard=[];saveLeaderboard([]);render();" style="padding:12px 14px;font-size:11px;font-weight:600;background:#1a1a2e;color:#f44;border-radius:10px;border:1px solid #f4444030;">Reset</button>` : ""}
    </div>
  </div>`;
}

// ═══ EVENT BINDING ═══
function bindEvents() {
  // Menu inputs
  const p1Input = document.getElementById("p1-name");
  if (p1Input) {
    p1Input.addEventListener("input", e => { state.p1Name = e.target.value; });
    p1Input.addEventListener("keydown", e => { if (e.key === "Enter") startGame(); });
  }
  const p2Input = document.getElementById("p2-name");
  if (p2Input) {
    p2Input.addEventListener("input", e => { state.p2Name = e.target.value; });
    p2Input.addEventListener("keydown", e => { if (e.key === "Enter") startGame(); });
  }

  // Solo guess input
  const guessInput = document.getElementById("guess-input");
  if (guessInput) {
    guessInput.addEventListener("input", e => { state.guess = e.target.value; });
    guessInput.addEventListener("keydown", e => { if (e.key === "Enter") soloCheck(); });
    // Preserve cursor position
    const pos = guessInput.value.length;
    guessInput.setSelectionRange(pos, pos);
  }

  // Buzzer input
  const buzzerInput = document.getElementById("buzzer-input");
  if (buzzerInput) {
    buzzerInput.addEventListener("input", e => { state.buzzerGuess = e.target.value; });
    buzzerInput.addEventListener("keydown", e => { if (e.key === "Enter") buzzerSubmit(); });
    const pos = buzzerInput.value.length;
    buzzerInput.setSelectionRange(pos, pos);
  }
}

function escHtml(s) {
  return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ═══ INIT ═══
render();
</script>
</body>
</html>
