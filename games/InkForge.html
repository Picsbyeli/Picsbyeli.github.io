      {TABS.map(t=>(<button key={t.id} className="tab-btn" onClick={()=>setTab(t.id)} title={t.label} style={{background:tab===t.id?`${accent}15`:'transparent',outline:tab===t.id?`1px solid ${accent}40`:'none'}}><span style={{fontSize:20}}>{t.icon}</span><span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:tab===t.id?accent:C.inkDim,letterSpacing:.5}}>{t.label}</span>{t.id==='world'&&story.loreSummary&&<div style={{position:'absolute',top:7,right:7,width:6,height:6,borderRadius:'50%',background:C.green,boxShadow:`0 0 6px ${C.green}`}}/>}</button>))}
      <div style={{marginTop:'auto',marginBottom:10,display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
        <button onClick={exportStory} title="Export" style={{width:36,height:36,borderRadius:9,border:`1px solid ${C.border}`,background:'transparent',color:C.inkDim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,transition:'all .18s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=C.teal;e.currentTarget.style.color=C.teal;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.inkDim;}}>📤</button>
        {story.loreSummary&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}><div style={{width:6,height:6,borderRadius:'50%',background:C.green,animation:'pulse 2.5s ease infinite'}}/><span style={{fontSize:8,color:C.green,fontFamily:"'JetBrains Mono',monospace",textTransform:'uppercase',textAlign:'center',lineHeight:1.4}}>lore{'\n'}on</span></div>}
      </div>
    </div>

    {tab==='write'&&(<>
      <div style={{width:195,background:C.surface,borderRight:`1px solid ${C.border}`,padding:'14px 10px',display:'flex',flexDirection:'column',gap:4,overflowY:'auto',flexShrink:0}}>
        <div style={{...lbl,marginBottom:4}}><span style={{color:accent}}>✦</span> {story.title}</div>
        <div style={{...lbl,marginBottom:6}}>Chapters</div>
        {story.chapters.map(ch=>(<div key={ch.id} style={{display:'flex',alignItems:'center',gap:4}}>
          <div onClick={()=>setActiveChap(ch.id)} style={{flex:1,padding:'9px 11px',borderRadius:8,cursor:'pointer',transition:'all .18s',borderLeft:`2px solid ${activeChap===ch.id?accent:'transparent'}`,background:activeChap===ch.id?`${accent}0e`:'transparent'}}>
            {editingTitle===ch.id?(<input autoFocus defaultValue={ch.title} onBlur={e=>{upd({chapters:story.chapters.map(c=>c.id===ch.id?{...c,title:e.target.value||ch.title}:c)});setEditingTitle(null);}} onKeyDown={e=>e.key==='Enter'&&e.target.blur()} style={{background:'transparent',border:'none',outline:'none',color:C.ink,fontSize:13,width:'100%',fontFamily:"'Crimson Pro',serif"}} onClick={e=>e.stopPropagation()}/>):(<div style={{fontSize:13,color:activeChap===ch.id?accent:C.inkMuted,fontFamily:"'Crimson Pro',serif"}} onDoubleClick={e=>{e.stopPropagation();setEditingTitle(ch.id);}}>{ch.title}</div>)}
            <div style={{fontSize:11,color:C.inkDim,marginTop:3,fontFamily:"'JetBrains Mono',monospace"}}>{wc(ch.content)>0?`${wc(ch.content)} w`:'empty'}</div>
          </div>
          {story.chapters.length>1&&<button onClick={()=>setConfirmDelChap(ch)} title="Delete" style={{background:'transparent',border:'none',color:'transparent',cursor:'pointer',fontSize:11,padding:'2px 4px',borderRadius:4,transition:'all .15s',flexShrink:0}} onMouseEnter={e=>e.target.style.color=C.red} onMouseLeave={e=>e.target.style.color='transparent'}>✕</button>}
        </div>))}
        <button onClick={addChap} style={{marginTop:8,padding:'7px 11px',background:'transparent',border:`1px dashed ${C.border}`,borderRadius:8,color:C.inkDim,cursor:'pointer',fontSize:13,fontFamily:"'Crimson Pro',serif",transition:'all .18s'}} onMouseEnter={e=>{e.target.style.borderColor=accent;e.target.style.color=accent;}} onMouseLeave={e=>{e.target.style.borderColor=C.border;e.target.style.color=C.inkDim;}}>+ Chapter</button>
        <div style={{marginTop:'auto',paddingTop:12,borderTop:`1px solid ${C.border}`}}><div style={{...lbl,marginBottom:4}}>Story Total</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,color:accent,fontWeight:500}}>{totalWC.toLocaleString()} <span style={{fontSize:11,color:C.inkDim}}>words</span></div></div>
      </div>

      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
        <div style={{height:54,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 24px',gap:8,background:C.surface,flexShrink:0,overflowX:'auto'}}>
          <span style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:C.ink,fontStyle:'italic',marginRight:'auto',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:80}}>{curChap?.title}</span>
          {story.loreSummary&&<span style={{fontSize:10,color:C.green,fontFamily:"'JetBrains Mono',monospace",flexShrink:0}}>✦ {story.loreSummary.title}</span>}
          <button className="ghost-btn" style={{borderColor:`${accent}35`,color:accent,fontSize:13,padding:'6px 12px'}} onClick={()=>runAI('continue')}>✨ Continue</button>
          <button className="ghost-btn" style={{fontSize:13,padding:'6px 12px'}} onClick={()=>runAI('humanize')}>🔄 Humanize</button>
          <button className="ghost-btn" style={{fontSize:13,padding:'6px 12px'}} onClick={()=>runAI('next')}>🎯 What Next</button>
          <button className="ghost-btn" style={{fontSize:13,padding:'6px 12px'}} onClick={()=>runAI('synopsis')}>📋 Synopsis</button>
          <button className="ghost-btn" style={{fontSize:13,padding:'6px 12px'}} onClick={()=>runAI('outline')}>🗺 Outline</button>
          <div style={{width:1,height:24,background:C.border,flexShrink:0}}/>
          <button className="ghost-btn" style={{fontSize:13,padding:'6px 12px',borderColor:readerOpen?`${accent}40`:undefined,color:readerOpen?accent:undefined}} onClick={()=>{setReaderOpen(p=>!p);if(!readerOpen)setAiMode(null);}}>🔊 Read</button>
        </div>
        <div style={{flex:1,overflow:'auto',padding:'42px 72px'}}><textarea className="ink-editor" style={{caretColor:accent}} placeholder={"Begin writing here…\n\nTip: Use the toolbar above to get AI help — Continue your story, Humanize the tone, or brainstorm What Comes Next."} value={curChap?.content||''} onChange={e=>setContent(e.target.value)} onMouseUp={()=>setSelTxt(window.getSelection()?.toString()||'')} onKeyUp={()=>setSelTxt(window.getSelection()?.toString()||'')}/></div>
        <div style={{height:38,borderTop:`1px solid ${C.border}`,background:C.surface,display:'flex',alignItems:'center',padding:'0 72px',gap:18,flexShrink:0}}><span style={{fontSize:12,color:C.inkDim,fontFamily:"'JetBrains Mono',monospace"}}>{wc(curChap?.content)} words</span>{selTxt&&<span style={{fontSize:12,color:accent,fontFamily:"'JetBrains Mono',monospace"}}>✦ {wc(selTxt)} selected — Humanize uses selection</span>}<span style={{fontSize:11,color:C.inkDim,marginLeft:'auto',fontFamily:"'JetBrains Mono',monospace"}}>double-click chapter to rename</span></div>
      </div>

      {aiMode&&(<div className="slide-in" style={{width:360,background:C.panel,borderLeft:`1px solid ${C.border}`,display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
        <div style={{padding:'15px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:accent,fontWeight:700}}>{{continue:'✨ Continuation',humanize:'🔄 Humanized',next:'🎯 Story Directions',synopsis:'📋 Synopsis',outline:'🗺 Plot Outline'}[aiMode]}</span>
          {story.loreSummary&&<span style={{fontSize:10,color:C.green,fontFamily:"'JetBrains Mono',monospace"}}>✦ lore</span>}
          <button onClick={()=>{setAiMode(null);setAiOut('');}} style={{marginLeft:'auto',background:'none',border:'none',color:C.inkDim,cursor:'pointer',fontSize:22,lineHeight:1,transition:'color .15s'}} onMouseEnter={e=>e.target.style.color=C.red} onMouseLeave={e=>e.target.style.color=C.inkDim}>×</button>
        </div>
        <div style={{flex:1,overflow:'auto',padding:20}}>{aiLoading?<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:200,gap:16}}><Spinner color={accent} size={24}/><span style={{color:C.inkMuted,fontStyle:'italic',fontSize:15,animation:'pulse 1.5s ease infinite'}}>{{continue:'Continuing your story…',humanize:'Rewriting naturally…',next:'Brainstorming paths…',synopsis:'Crafting synopsis…',outline:'Building outline…'}[aiMode]}</span></div>:<div className="fade-in" style={{fontFamily:"'Crimson Pro',serif",fontSize:16,lineHeight:1.95,color:C.ink,whiteSpace:'pre-wrap'}}>{aiOut}</div>}</div>
        {aiOut&&!aiLoading&&(<div style={{padding:14,borderTop:`1px solid ${C.border}`,display:'flex',gap:8,flexWrap:'wrap'}}>
          {(aiMode==='continue'||aiMode==='humanize'||aiMode==='synopsis')&&<button className="gold-btn" onClick={()=>{if(aiMode==='synopsis'){upd({description:aiOut});}else{setContent(((curChap.content||'')+'\n\n'+aiOut).trim());}setAiOut('');setAiMode(null);setToast({msg:aiMode==='synopsis'?'Synopsis saved!':'Added to story!',type:'success'});}} style={{flex:1}}>{aiMode==='synopsis'?'Save Synopsis':'+ Add to Story'}</button>}
          <button className="ghost-btn" onClick={()=>{navigator.clipboard?.writeText(aiOut);setToast({msg:'Copied!',type:'info'});}}>Copy</button>
          <button className="ghost-btn" onClick={()=>runAI(aiMode)}>↻ Redo</button>
        </div>)}
      </div>)}
      {readerOpen&&!aiMode&&<ReadAloudPanel text={selTxt||curChap?.content||''} accent={accent} onClose={()=>setReaderOpen(false)}/>}
    </>)}

    {tab==='ideas'&&(<div style={{flex:1,overflow:'auto',padding:'42px 52px'}}><div style={{maxWidth:780,margin:'0 auto'}}>
      <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:34,fontWeight:700,color:C.ink,marginBottom:6}}>Story Ideas</h2>
      <p style={{color:C.inkMuted,fontSize:16,fontFamily:"'Crimson Pro',serif",marginBottom:loreTxt?6:26,lineHeight:1.7}}>Generate fresh concepts that feel like they came from a real creative mind.</p>
      {loreTxt&&<p style={{color:C.green,fontSize:12,marginBottom:22,fontFamily:"'JetBrains Mono',monospace"}}>✦ Ideas shaped by your world context</p>}
      <div style={{marginBottom:18}}><div style={lbl}>Format</div><div style={{display:'flex',flexWrap:'wrap',gap:8}}>{GENRES.map(g=><button key={g} onClick={()=>upd({genre:g})} style={{padding:'7px 18px',borderRadius:24,cursor:'pointer',fontFamily:"'Playfair Display',serif",fontWeight:600,fontSize:13,transition:'all .2s',border:`1px solid ${story.genre===g?accent:C.border}`,background:story.genre===g?accent:'transparent',color:story.genre===g?'#080605':C.inkMuted}}>{g}</button>)}</div></div>
      <div style={{marginBottom:22}}><div style={lbl}>Theme / Mood (optional)</div><Input value={themeInput} onChange={e=>setThemeInput(e.target.value)} placeholder="e.g. revenge, slow-burn romance, betrayal, redemption arc, cosmic horror…"/></div>
      <button className="gold-btn" onClick={generateIdeas} disabled={ideasLoading} style={{fontSize:15,padding:'13px 30px'}}>{ideasLoading?<><Spinner color="#080605" size={15}/>Generating…</>:'✨ Generate 3 Ideas'}</button>
      {story.ideas?.length>0&&(<div style={{marginTop:34,display:'flex',flexDirection:'column',gap:18}} className="fade-in">
        {story.ideas.map((idea,i)=>(<div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:24,transition:'all .25s'}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.borderLight} onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}><h3 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:accent,fontStyle:'italic',lineHeight:1.3}}>{idea.title}</h3><span style={{...chip(C.purple),flexShrink:0,marginLeft:14}}>{idea.tone}</span></div>
          <p style={{fontSize:17,color:C.inkSoft,fontStyle:'italic',marginBottom:14,lineHeight:1.75,fontFamily:"'Crimson Pro',serif",borderLeft:`2px solid ${accent}40`,paddingLeft:16}}>"{idea.hook}"</p>
          <p style={{fontSize:15,color:C.ink,lineHeight:1.85,marginBottom:16,fontFamily:"'Crimson Pro',serif"}}>{idea.premise}</p>
          <div style={{display:'flex',gap:16,flexWrap:'wrap',marginBottom:16}}><div style={{flex:1,minWidth:140}}><div style={lbl}>Protagonist</div><p style={{color:C.inkMuted,fontSize:14,lineHeight:1.65}}>{idea.protagonist}</p></div><div style={{flex:1,minWidth:140}}><div style={lbl}>The Twist</div><p style={{color:C.teal,fontSize:14,lineHeight:1.65}}>{idea.twist}</p></div></div>
          <button className="ghost-btn" style={{borderColor:`${accent}35`,color:accent}} onClick={()=>useIdea(idea)}>→ Start Writing This</button>
        </div>))}
      </div>)}
    </div></div>)}

    {tab==='characters'&&<CharactersPanel characters={story.characters} setCharacters={c=>upd({characters:c})} loreTxt={loreTxt} accent={accent}/>}
    {tab==='world'&&<WorldTab loreRaw={story.loreRaw} setLoreRaw={v=>upd({loreRaw:v})} loreSummary={story.loreSummary} setLoreSummary={v=>upd({loreSummary:v})} accent={accent} story={story} onSetTab={setTab} onRoute={(type,data)=>{
      if(type==='chapters'){
        // Add each detected chapter to the story
        const newChaps=data.map((ch,i)=>{const newId=Math.max(0,...story.chapters.map(c=>c.id))+1+i;return{id:newId,title:ch.title||`Imported Chapter ${i+1}`,content:ch.content||''};});
        upd({chapters:[...story.chapters,...newChaps]});
        setActiveChap(newChaps[0].id);
        setToast({msg:`${newChaps.length} chapter${newChaps.length>1?'s':''} added to Write!`,type:'success'});
        setTimeout(()=>setTab('write'),800);
      } else if(type==='characters'){
        // Add each detected character to the cast
        const newChars=data.map((c,i)=>({id:Date.now()+i,name:c.name||'Unknown',role:c.role||'Supporting',age:c.age||'',personality:c.personality||'',backstory:c.backstory||'',speech:c.speech||'',voiceSample:''}));
        upd({characters:[...story.characters,...newChars]});
        setToast({msg:`${newChars.length} character${newChars.length>1?'s':''} added to Cast!`,type:'success'});
      } else if(type==='outline'){
        // Add outline as a special chapter with notes
        const newId=Math.max(0,...story.chapters.map(c=>c.id))+1;
        upd({chapters:[...story.chapters,{id:newId,title:'Plot Outline',content:`── PLOT OUTLINE ──\n\n${data}\n\n──────────────\n\n`}]});
        setToast({msg:'Plot outline added as a chapter!',type:'success'});
      }
    }}/>}

    {tab==='chat'&&(<div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'20px 28px',borderBottom:`1px solid ${C.border}`,background:C.surface,flexShrink:0}}><div style={{display:'flex',alignItems:'center',gap:10}}><h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:C.ink,fontStyle:'italic'}}>Writing Coach</h2>{story.loreSummary&&<span style={{fontSize:11,color:C.green,fontFamily:"'JetBrains Mono',monospace"}}>✦ knows your world</span>}{story.characters.length>0&&<span style={{fontSize:11,color:C.purple,fontFamily:"'JetBrains Mono',monospace"}}>✦ knows {story.characters.length} characters</span>}</div><p style={{fontSize:14,color:C.inkMuted,marginTop:4,fontFamily:"'Crimson Pro',serif"}}>Ask about pacing, structure, dialogue, plot holes, genre rules, or get ideas for scenes.</p></div>
      <div style={{flex:1,overflow:'auto',padding:'24px 28px',display:'flex',flexDirection:'column',gap:14}}>
        {chatMsgs.length===0&&(<div style={{textAlign:'center',paddingTop:48,color:C.inkMuted}} className="fade-in"><div style={{fontSize:52,marginBottom:18,animation:'float 3s ease-in-out infinite'}}>📖</div><p style={{fontStyle:'italic',fontSize:20,marginBottom:28,fontFamily:"'Playfair Display',serif",color:C.inkSoft}}>What are you working on?</p><div style={{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center',maxWidth:600,margin:'0 auto'}}>{PROMPTS.map(p=><button key={p} className="ghost-btn" onClick={()=>setChatIn(p)} style={{fontSize:14}}>{p}</button>)}</div></div>)}
        {chatMsgs.map((m,i)=>(<div key={i} className="fade-in" style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}><div style={{maxWidth:'80%',padding:'13px 18px',lineHeight:1.8,fontSize:16,fontFamily:"'Crimson Pro',serif",...(m.role==='user'?{background:`${accent}10`,border:`1px solid ${accent}20`,borderRadius:'14px 14px 4px 14px',color:C.ink}:{background:C.card,border:`1px solid ${C.border}`,borderRadius:'14px 14px 14px 4px',color:C.ink,whiteSpace:'pre-wrap'})}}>{m.content}</div></div>))}
        {chatLoading&&<div style={{display:'flex'}}><div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:'14px 14px 14px 4px',padding:'13px 18px',display:'flex',alignItems:'center',gap:10}}><Spinner size={16}/><span style={{color:C.inkMuted,fontStyle:'italic',fontSize:15}}>Thinking…</span></div></div>}
        <div ref={chatEndRef}/>
      </div>
      <div style={{padding:'14px 28px',borderTop:`1px solid ${C.border}`,background:C.surface,display:'flex',gap:10,flexShrink:0}}>
        <textarea value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}} placeholder="Ask your writing coach anything… (Enter to send)" rows={2} style={{flex:1,padding:'11px 15px',background:C.card,border:`1px solid ${C.border}`,borderRadius:10,color:C.ink,fontSize:16,outline:'none',resize:'none',minHeight:48,maxHeight:120,fontFamily:"'Crimson Pro',serif",transition:'border-color .25s'}}/>
        <button className="gold-btn" onClick={sendChat} disabled={chatLoading||!chatIn.trim()} style={{alignSelf:'flex-end'}}>{chatLoading?<Spinner color="#080605" size={15}/>:'Send'}</button>
      </div>
    </div>)}
  </div>);
}

function App(){
  const[hasKey,setHasKey]=useState(true);const[showKeyModal,setShowKeyModal]=useState(false);
  const[stories,setStories]=useState(()=>{try{return JSON.parse(localStorage.getItem('inkforge_stories')||'[]');}catch{return[];}});
  const[activeId,setActiveId]=useState(null);
  useEffect(()=>{try{localStorage.setItem('inkforge_stories',JSON.stringify(stories));}catch(e){console.error(e);}},[stories]);
  const saveKey=(key)=>{setShowKeyModal(false);};
  const activeStory=stories.find(s=>s.id===activeId)||null;
  const create=(title,accent,genre)=>{const s=newStory(title,accent);s.genre=genre;setStories(p=>[...p,s]);setActiveId(s.id);};
  const update=(id,patch)=>setStories(p=>p.map(s=>s.id===id?{...s,...patch}:s));
  const del=(id)=>{setStories(p=>p.filter(s=>s.id!==id));if(activeId===id)setActiveId(null);};
  const rename=(id,title)=>setStories(p=>p.map(s=>s.id===id?{...s,title,updatedAt:Date.now()}:s));
  if(!hasKey)return<ApiKeyScreen onSave={saveKey}/>;
  return(<div style={{display:'flex',height:'100vh',background:C.bg,overflow:'hidden'}}>
    {showKeyModal&&<Modal onClose={()=>setShowKeyModal(false)}><div style={{padding:'38px 40px',width:480}}><h2 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:C.ink,marginBottom:22,fontStyle:'italic'}}>Update API Key</h2><div style={{marginBottom:18}}><div style={lbl}>New Anthropic API Key</div><input type="password" placeholder="sk-ant-..." onKeyDown={e=>{if(e.key==='Enter'&&e.target.value.trim())saveKey(e.target.value.trim());}} style={{width:'100%',padding:'13px 16px',background:C.card,border:`1px solid ${C.border}`,borderRadius:9,color:C.ink,fontFamily:"'JetBrains Mono',monospace",fontSize:14,outline:'none',transition:'border-color .25s'}} autoFocus onChange={e=>{}}/></div><p style={{color:C.inkDim,fontSize:12,fontFamily:"'JetBrains Mono',monospace",marginBottom:22}}>Press Enter to save. Stored only in this browser.</p><button className="ghost-btn" onClick={()=>setShowKeyModal(false)}>Cancel</button></div></Modal>}
    {activeStory?<StoryWorkspace story={activeStory} onUpdate={update} onBack={()=>setActiveId(null)}/>:<Dashboard stories={stories} onOpen={setActiveId} onCreate={create} onDelete={del} onRename={rename} onKeyChange={()=>setShowKeyModal(true)}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
