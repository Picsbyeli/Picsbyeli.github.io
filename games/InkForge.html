<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InkForge — Story Workshop</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;background:#09080a;overflow:hidden}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(13px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
.fade-in{animation:fadeIn .28s ease}
.slide-in{animation:slideIn .22s ease}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#272333;border-radius:2px}
.ink-editor{font-family:'Crimson Pro',Georgia,serif;font-size:19px;line-height:1.9;color:#f2ecdf;background:transparent;border:none;outline:none;resize:none;width:100%;min-height:68vh;letter-spacing:.01em}
.ink-editor::placeholder{color:#5c5870;font-style:italic}
.gold-btn{background:linear-gradient(135deg,#8a6a28,#c9a84c);color:#080605;border:none;border-radius:7px;padding:9px 18px;font-family:'Playfair Display',serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;letter-spacing:.4px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.gold-btn:hover:not(:disabled){filter:brightness(1.12);transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,168,76,.28)}
.gold-btn:disabled{opacity:.42;cursor:not-allowed;transform:none}
.ghost-btn{background:transparent;color:#9c96a8;border:1px solid #272333;border-radius:7px;padding:8px 14px;font-family:'Crimson Pro',serif;font-size:14px;cursor:pointer;transition:all .18s;white-space:nowrap}
.ghost-btn:hover{border-color:rgba(201,168,76,.55);color:#c9a84c;background:rgba(201,168,76,.04)}
.tab-btn{width:52px;height:52px;border-radius:12px;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all .18s;background:transparent;position:relative}
.story-card:hover{border-color:#3a3550 !important;transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
input::placeholder,textarea::placeholder{color:#5c5870}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useRef, useEffect} = React;

/* ─── Palette ─────────────────────────────────────────────────────────────── */
const C = {
  bg:'#09080a', surface:'#111018', panel:'#16141e', card:'#1c1926',
  border:'#272333', borderLight:'#3a3550',
  gold:'#c9a84c', goldDark:'#8a6a28',
  ink:'#f2ecdf', inkMuted:'#9c96a8', inkDim:'#5c5870',
  teal:'#3d9e88', purple:'#7c5fb5', green:'#4caf7a', red:'#c94c4c',
};

const STORY_ACCENTS = [
  '#c9a84c','#3d9e88','#7c5fb5','#c94c4c','#4c8fc9','#c97c4c','#4caf7a','#9e3d7c',
];

/* ─── Claude API ──────────────────────────────────────────────────────────── */
const CLAUDE_KEY_STORAGE = 'inkforge-claude-key';
function getApiKey(){ return localStorage.getItem(CLAUDE_KEY_STORAGE)||''; }
function setApiKey(k){ localStorage.setItem(CLAUDE_KEY_STORAGE,k); }

async function callClaude(system, userMessage, history=null, maxTokens=1000) {
  const key = getApiKey();
  if(!key) throw new Error('No API key set. Go to Settings to add your Claude API key.');
  const messages = history
    ? [...history, {role:'user',content:userMessage}]
    : [{role:'user',content:userMessage}];
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens,system,messages}),
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.content[0].text;
}

function withLore(base, loreTxt) {
  if(!loreTxt) return base;
  return base+'\n\n'+'━'.repeat(40)+'\nSTORY WORLD CONTEXT — treat as gospel:\n'+loreTxt+'\nNever contradict these established facts.\n'+'━'.repeat(40);
}

/* ─── System Prompts ─────────────────────────────────────────────────────── */
const BASE_WRITER = `You are an award-winning fiction author specializing in manga, light novels, and literary fiction.

BANNED clichés — never write these:
• "couldn't help but", "a small smile played", "nodded slowly", "let out a breath they didn't know they were holding"
• "heart pounding/racing/hammering", "eyes widened", "jaw dropped", "stomach churned"
• Over-explaining emotions; generic words: "beautiful","amazing","incredible","stunning"
• Weak transitions: "Meanwhile...","Suddenly...","Just then..."

INSTEAD: specific sensory details · action over emotion-labels · distinct character voices · varied sentence rhythm · subtext and irony`;

const BASE_COACH = BASE_WRITER+'\n\nYou are also a sharp practical writing coach. Give specific actionable feedback — not generic advice. Identify exact patterns to fix. Be direct like a good editor, not a cheerleader.';

/* ─── Shared UI ──────────────────────────────────────────────────────────── */
const lbl = {fontSize:11,color:C.inkDim,letterSpacing:2,textTransform:'uppercase',fontFamily:"'JetBrains Mono',monospace",marginBottom:6};
const chip = (color)=>({display:'inline-block',padding:'3px 10px',borderRadius:20,fontFamily:"'JetBrains Mono',monospace",fontSize:10,letterSpacing:1,textTransform:'uppercase',background:color+'18',color,border:'1px solid '+color+'40'});

function Spinner({color=C.gold,size=20}){
  return React.createElement('div',{style:{width:size,height:size,border:'2px solid '+color+'30',borderTop:'2px solid '+color,borderRadius:'50%',animation:'spin .8s linear infinite',flexShrink:0}});
}

function Input({value,onChange,placeholder,multiline=false,rows=4,style={}}){
  const base={width:'100%',padding:'11px 14px',background:C.card,border:'1px solid '+C.border,borderRadius:8,color:C.ink,fontFamily:"'Crimson Pro',serif",fontSize:16,outline:'none',transition:'border-color .2s',...style};
  const focus=e=>e.target.style.borderColor=C.gold+'70';
  const blur=e=>e.target.style.borderColor=C.border;
  return multiline
    ? React.createElement('textarea',{value,onChange,placeholder,rows,style:{...base,resize:'vertical'},onFocus:focus,onBlur:blur})
    : React.createElement('input',{value,onChange,placeholder,style:base,onFocus:focus,onBlur:blur});
}

/* ─── Default story shape ────────────────────────────────────────────────── */
function newStory(title='Untitled Story', accent=STORY_ACCENTS[0]) {
  return {
    id: Date.now(), title, accent,
    genre:'Manga', description:'',
    updatedAt: Date.now(),
    chapters:[{id:1,title:'Chapter 1',content:''}],
    characters:[],
    loreRaw:'', loreSummary:null,
    ideas:[],
  };
}

/* ─── localStorage persistence ───────────────────────────────────────────── */
const STORAGE_KEY = 'inkforge-stories';
function loadStories(){
  try{ const d=localStorage.getItem(STORAGE_KEY); return d?JSON.parse(d):[]; }
  catch{ return []; }
}
function saveStories(stories){
  try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(stories)); } catch{}
}

/* ─── Stories Dashboard ──────────────────────────────────────────────────── */
function Dashboard({stories, onOpen, onCreate, onDelete, onRename}){
  const [creating, setCreating]=useState(false);
  const [newTitle, setNewTitle]=useState('');
  const [newAccent, setNewAccent]=useState(STORY_ACCENTS[0]);
  const [newGenre, setNewGenre]=useState('Manga');
  const [renaming, setRenaming]=useState(null);
  const [renameVal, setRenameVal]=useState('');
  const [confirmDel, setConfirmDel]=useState(null);

  const GENRES=['Manga','Novel','Light Novel','Webtoon','Short Story','Screenplay'];
  const totalWords = s => s.chapters.reduce((a,c)=>(a+(c.content||'').split(/\s+/).filter(Boolean).length),0);
  const fmt = n => n>=1000?(n/1000).toFixed(1)+'k':n.toString();
  const timeAgo = t => {
    const d=(Date.now()-t)/1000;
    if(d<60) return 'just now';
    if(d<3600) return Math.floor(d/60)+'m ago';
    if(d<86400) return Math.floor(d/3600)+'h ago';
    return Math.floor(d/86400)+'d ago';
  };

  const submit=()=>{
    if(!newTitle.trim()) return;
    onCreate(newTitle.trim(), newAccent, newGenre);
    setCreating(false); setNewTitle(''); setNewAccent(STORY_ACCENTS[0]); setNewGenre('Manga');
  };

  return (
    <div style={{flex:1,overflow:'auto',padding:'52px 60px',maxWidth:1100,margin:'0 auto',width:'100%'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:48,flexWrap:'wrap',gap:16}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:10}}>
            <div style={{width:42,height:42,borderRadius:12,background:'linear-gradient(135deg,'+C.goldDark+','+C.gold+')',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,boxShadow:'0 0 24px '+C.gold+'35'}}>🖋</div>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:42,fontWeight:700,color:C.ink,fontStyle:'italic'}}>InkForge</h1>
          </div>
          <p style={{color:C.inkMuted,fontSize:17,fontFamily:"'Crimson Pro',serif"}}>Your stories. All in one place.</p>
        </div>
        <button className="gold-btn" onClick={()=>setCreating(true)} style={{fontSize:15,padding:'12px 26px'}}>+ New Story</button>
      </div>

      {/* Create modal */}
      {creating && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={()=>setCreating(false)}>
          <div className="fade-in" style={{background:C.panel,border:'1px solid '+C.borderLight,borderRadius:16,padding:36,width:520,maxWidth:'92vw'}} onClick={e=>e.stopPropagation()}>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,color:C.ink,marginBottom:24,fontStyle:'italic'}}>New Story</h2>
            <div style={{marginBottom:16}}>
              <div style={lbl}>Title</div>
              <Input value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder="Give your story a name…"/>
            </div>
            <div style={{marginBottom:16}}>
              <div style={lbl}>Format</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
                {GENRES.map(g=>(
                  <button key={g} onClick={()=>setNewGenre(g)} style={{padding:'6px 16px',borderRadius:20,cursor:'pointer',fontFamily:"'Playfair Display',serif",fontWeight:600,fontSize:13,transition:'all .18s',border:'1px solid '+(newGenre===g?C.gold:C.border),background:newGenre===g?C.gold:'transparent',color:newGenre===g?'#080605':C.inkMuted}}>{g}</button>
                ))}
              </div>
            </div>
            <div style={{marginBottom:28}}>
              <div style={lbl}>Color</div>
              <div style={{display:'flex',gap:8}}>
                {STORY_ACCENTS.map(a=>(
                  <div key={a} onClick={()=>setNewAccent(a)} style={{width:28,height:28,borderRadius:'50%',background:a,cursor:'pointer',boxSizing:'border-box',border:newAccent===a?'3px solid '+C.ink:'3px solid transparent',transition:'all .15s'}}/>
                ))}
              </div>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="gold-btn" onClick={submit} disabled={!newTitle.trim()} style={{flex:1,justifyContent:'center',fontSize:15,padding:'12px'}}>Create Story</button>
              <button className="ghost-btn" onClick={()=>setCreating(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Confirm delete modal */}
      {confirmDel && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={()=>setConfirmDel(null)}>
          <div className="fade-in" style={{background:C.panel,border:'1px solid '+C.red+'40',borderRadius:14,padding:32,width:400,maxWidth:'92vw',textAlign:'center'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:36,marginBottom:12}}>🗑</div>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.ink,marginBottom:8}}>Delete "{confirmDel.title}"?</h3>
            <p style={{color:C.inkMuted,fontSize:15,marginBottom:24,fontFamily:"'Crimson Pro',serif"}}>This will permanently remove all chapters, characters, and world data. This cannot be undone.</p>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              <button onClick={()=>{onDelete(confirmDel.id);setConfirmDel(null);}} style={{background:C.red,color:'#fff',border:'none',borderRadius:7,padding:'10px 24px',cursor:'pointer',fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14}}>Delete</button>
              <button className="ghost-btn" onClick={()=>setConfirmDel(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Story grid */}
      {stories.length===0 ? (
        <div style={{textAlign:'center',paddingTop:80}}>
          <div style={{fontSize:64,marginBottom:20}}>📖</div>
          <p style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:C.inkMuted,fontStyle:'italic',marginBottom:10}}>No stories yet</p>
          <p style={{color:C.inkDim,fontSize:16,fontFamily:"'Crimson Pro',serif"}}>Create your first story to get started.</p>
        </div>
      ) : (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:20}}>
          {stories.map(s=>(
            <div key={s.id} className="story-card" style={{background:C.card,border:'1px solid '+C.border,borderRadius:14,overflow:'hidden',cursor:'pointer',transition:'all .2s',position:'relative'}} onClick={()=>onOpen(s.id)}>
              <div style={{height:5,background:'linear-gradient(90deg,'+s.accent+','+s.accent+'88)'}}/>
              <div style={{padding:'20px 22px 18px'}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:6,gap:8}}>
                  {renaming===s.id ? (
                    <input autoFocus value={renameVal}
                      onChange={e=>setRenameVal(e.target.value)}
                      onBlur={()=>{if(renameVal.trim())onRename(s.id,renameVal.trim());setRenaming(null);}}
                      onKeyDown={e=>{if(e.key==='Enter')e.target.blur();if(e.key==='Escape')setRenaming(null);}}
                      onClick={e=>e.stopPropagation()}
                      style={{flex:1,background:'transparent',border:'1px solid '+s.accent,borderRadius:5,color:C.ink,fontFamily:"'Playfair Display',serif",fontSize:18,fontStyle:'italic',fontWeight:700,padding:'2px 7px',outline:'none'}}
                    />
                  ) : (
                    <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:19,color:C.ink,fontStyle:'italic',fontWeight:700,lineHeight:1.3,flex:1}}>{s.title}</h3>
                  )}
                  <div style={{display:'flex',gap:4,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                    <button title="Rename" onClick={()=>{setRenaming(s.id);setRenameVal(s.title);}} style={{background:'transparent',border:'none',color:C.inkDim,cursor:'pointer',fontSize:15,padding:'2px 5px',borderRadius:4,transition:'color .15s'}} onMouseEnter={e=>e.target.style.color=C.gold} onMouseLeave={e=>e.target.style.color=C.inkDim}>✎</button>
                    <button title="Delete" onClick={()=>setConfirmDel(s)} style={{background:'transparent',border:'none',color:C.inkDim,cursor:'pointer',fontSize:15,padding:'2px 5px',borderRadius:4,transition:'color .15s'}} onMouseEnter={e=>e.target.style.color=C.red} onMouseLeave={e=>e.target.style.color=C.inkDim}>✕</button>
                  </div>
                </div>
                <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
                  <span style={chip(s.accent)}>{s.genre}</span>
                  {s.loreSummary && <span style={chip(C.green)}>✦ world</span>}
                  {s.characters.length>0 && <span style={chip(C.purple)}>{s.characters.length} chars</span>}
                </div>
                <div style={{display:'flex',gap:20}}>
                  <div>
                    <div style={{...lbl,marginBottom:2}}>Words</div>
                    <div style={{color:C.ink,fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:500}}>{fmt(totalWords(s))}</div>
                  </div>
                  <div>
                    <div style={{...lbl,marginBottom:2}}>Chapters</div>
                    <div style={{color:C.ink,fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:500}}>{s.chapters.length}</div>
                  </div>
                  <div style={{marginLeft:'auto',textAlign:'right'}}>
                    <div style={{...lbl,marginBottom:2}}>Edited</div>
                    <div style={{color:C.inkDim,fontFamily:"'JetBrains Mono',monospace",fontSize:13}}>{timeAgo(s.updatedAt)}</div>
                  </div>
                </div>
              </div>
              <div style={{padding:'10px 22px',borderTop:'1px solid '+C.border,background:C.surface+'80',display:'flex',alignItems:'center',gap:8}}>
                <span style={{color:s.accent,fontSize:13,fontFamily:"'JetBrains Mono',monospace",letterSpacing:.5}}>→ Open Story</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── Characters Panel ────────────────────────────────────────────────────── */
function CharactersPanel({characters,setCharacters,loreTxt,accent}){
  const [creating,setCreating]=useState(false);
  const [selected,setSelected]=useState(null);
  const [form,setForm]=useState({name:'',role:'Protagonist',age:'',personality:'',backstory:'',speech:''});
  const [voiceSample,setVoiceSample]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const ROLES=['Protagonist','Antagonist','Mentor','Love Interest','Rival','Supporting'];

  const generate=async()=>{
    setLoading(true); setErr('');
    try{
      const txt=await callClaude(withLore(BASE_WRITER,loreTxt),
        'Generate a compelling '+form.role+' character.\nName hint: '+(form.name||'create a unique name')+'\nPersonality hint: '+(form.personality||'any — make it interesting')+'\n'+(loreTxt?'Fit naturally into the established world.':'')+'\n\nReturn ONLY valid JSON (no markdown):\n{"name":"...","age":"...","role":"'+form.role+'","personality":"3-4 specific contrasting traits","backstory":"2 vivid sentences","speech":"their exact way of talking — tics, vocabulary, what they avoid","voice_sample":"3-4 lines of dialogue that captures them perfectly"}');
      const c=JSON.parse(txt.replace(/```json|```/g,'').trim());
      setForm({name:c.name,role:c.role,age:c.age,personality:c.personality,backstory:c.backstory,speech:c.speech});
      setVoiceSample(c.voice_sample);
    }catch(e){setErr(e.message);console.error(e);}
    setLoading(false);
  };

  const save=()=>{
    if(!form.name.trim()) return;
    const ch={...form,id:Date.now(),voiceSample};
    setCharacters(p=>[...p,ch]);
    setSelected(ch); setCreating(false);
    setForm({name:'',role:'Protagonist',age:'',personality:'',backstory:'',speech:''}); setVoiceSample('');
  };

  return(
    <div style={{flex:1,display:'flex',overflow:'hidden'}}>
      <div style={{width:210,background:C.surface,borderRight:'1px solid '+C.border,padding:'14px 8px',overflowY:'auto',display:'flex',flexDirection:'column',gap:6}}>
        <div style={lbl}>Cast</div>
        {characters.map(c=>(
          <div key={c.id} onClick={()=>{setSelected(c);setCreating(false);}} style={{padding:'10px 12px',borderRadius:8,cursor:'pointer',transition:'all .15s',background:selected?.id===c.id?accent+'15':C.card,border:'1px solid '+(selected?.id===c.id?accent+'55':C.border)}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:C.ink}}>{c.name}</div>
            <div style={{fontSize:12,color:accent,marginTop:3}}>{c.role}</div>
          </div>
        ))}
        <button className="ghost-btn" onClick={()=>{setCreating(true);setSelected(null);setVoiceSample('');setForm({name:'',role:'Protagonist',age:'',personality:'',backstory:'',speech:''});setErr('');}} style={{marginTop:8}}>+ New Character</button>
      </div>
      <div style={{flex:1,overflow:'auto',padding:'32px 44px'}}>
        {!creating&&!selected&&(
          <div style={{textAlign:'center',paddingTop:80,color:C.inkMuted}}>
            <div style={{fontSize:52,marginBottom:16}}>👤</div>
            <p style={{fontStyle:'italic',fontSize:18,fontFamily:"'Playfair Display',serif"}}>Your cast will appear here</p>
          </div>
        )}
        {selected&&!creating&&(
          <div className="fade-in" style={{maxWidth:580}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:6}}>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:30,color:C.ink,fontStyle:'italic'}}>{selected.name}</h2>
              <button className="ghost-btn" style={{fontSize:12,padding:'5px 12px'}} onClick={()=>{setForm({name:selected.name,role:selected.role,age:selected.age,personality:selected.personality,backstory:selected.backstory,speech:selected.speech});setVoiceSample(selected.voiceSample||'');setCreating(true);setSelected(null);}}>Edit</button>
              <button className="ghost-btn" style={{fontSize:12,padding:'5px 12px',color:C.red,borderColor:C.red+'40'}} onClick={()=>{setCharacters(p=>p.filter(c=>c.id!==selected.id));setSelected(null);}}>Remove</button>
            </div>
            <div style={{display:'flex',gap:8,marginBottom:24}}>
              <span style={chip(accent)}>{selected.role}</span>
              {selected.age&&<span style={chip(C.inkDim)}>Age {selected.age}</span>}
            </div>
            {[['Personality',selected.personality],['Backstory',selected.backstory],['Speech Style',selected.speech]].map(([label,val])=>(
              <div key={label} style={{marginBottom:18}}>
                <div style={lbl}>{label}</div>
                <p style={{color:C.ink,fontSize:16,lineHeight:1.8,fontFamily:"'Crimson Pro',serif"}}>{val}</p>
              </div>
            ))}
            {selected.voiceSample&&(
              <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:10,padding:18,marginTop:4}}>
                <div style={{...lbl,color:accent,marginBottom:10}}>Voice Sample</div>
                <p style={{color:C.ink,fontStyle:'italic',fontSize:16,lineHeight:1.9,whiteSpace:'pre-wrap',fontFamily:"'Crimson Pro',serif"}}>{selected.voiceSample}</p>
              </div>
            )}
          </div>
        )}
        {creating&&(
          <div className="fade-in" style={{maxWidth:580}}>
            <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:24,flexWrap:'wrap'}}>

              {loreTxt&&<span style={{fontSize:11,color:C.green,fontFamily:"'JetBrains Mono',monospace"}}>✦ world aware</span>}

            {err&&<p style={{color:C.red,fontSize:13,marginBottom:12,fontFamily:"'JetBrains Mono',monospace"}}>{err}</p>}

              </div>
            </div>
            {[{k:'name',ph:'Name…'},{k:'age',ph:'Age or range…'},{k:'personality',ph:'Key traits and internal conflicts…'},{k:'backstory',ph:'Their history…'},{k:'speech',ph:'How they talk, verbal tics…'}].map(f=>(
              <div key={f.k} style={{marginBottom:12}}>

                <Input value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph}/>

            {voiceSample&&(
              <div style={{background:C.card,border:'1px solid '+accent+'40',borderRadius:10,padding:16,marginBottom:18}}>
                <div style={{...lbl,color:accent,marginBottom:8}}>Generated Voice Sample</div>
                <p style={{color:C.ink,fontStyle:'italic',fontSize:16,lineHeight:1.9,whiteSpace:'pre-wrap',fontFamily:"'Crimson Pro',serif"}}>{voiceSample}</p>
              </div>

              <button className="gold-btn" onClick={save} style={{fontSize:15,padding:'11px 24px'}}>Save Character</button>
              <button className="ghost-btn" onClick={()=>{setCreating(false);setVoiceSample('');setErr('');}}>Cancel</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── World Tab ──────────────────────────────────────────────────────────── */
function WorldTab({loreRaw,setLoreRaw,loreSummary,setLoreSummary,accent}){
  const [scanning,setScanning]=useState(false);
  const [draft,setDraft]=useState(loreRaw);
  const [err,setErr]=useState('');

  const scan=async()=>{
    if(!draft.trim()) return;
    setScanning(true); setErr('');
    try{
      const r=await callClaude(
        'You are a story analyst. Extract a complete structured understanding of the story world from any raw notes.',
        'Read this reference material and extract everything relevant. Be thorough — names, rules, relationships, tone, plot.\n\nReturn ONLY valid JSON (no markdown):\n{"title":"...","genre":"...","tone":"...","setting":"...","characters":[{"name":"...","role":"...","key_traits":"...","relationships":"..."}],"world_rules":["..."],"themes":["..."],"plot_known":"...","tone_notes":"...","raw_digest":"3-4 sentence plain-English brief for an AI writing assistant"}\n\nMATERIAL:\n'+draft,
        null,1500
      );
      setLoreSummary(JSON.parse(r.replace(/```json|```/g,'').trim()));
      setLoreRaw(draft);
    }catch(e){setErr('Parse failed — try again. '+e.message);console.error(e);}
    setScanning(false);
  };

  return(
    <div style={{flex:1,overflow:'auto',padding:'40px 48px'}}>

            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:700,color:C.ink}}>Story World</h2>
            <p style={{color:C.inkMuted,fontSize:16,marginTop:5,lineHeight:1.7,fontFamily:"'Crimson Pro',serif"}}>Paste any reference material — lore, outlines, character sheets, research, inspiration. The AI reads it and uses it in <em style={{color:C.ink}}>every</em> feature of this story.</p>
          </div>
          {loreSummary&&<span style={{...chip(C.green),padding:'5px 14px',fontSize:11,flexShrink:0,marginTop:6}}>✦ active</span>}

        <div style={{marginTop:24}}>
          <div style={{display:'flex',alignItems:'center',marginBottom:6}}>
            <div style={lbl}>Reference Material</div>
            <span style={{fontSize:11,color:C.inkDim,marginLeft:'auto',fontFamily:"'JetBrains Mono',monospace"}}>{draft.length.toLocaleString()} chars</span>
          </div>
          <textarea value={draft} onChange={e=>setDraft(e.target.value)}
            placeholder={"Paste anything:\n• Character notes — \"Kael is a 19-year-old disgraced fire mage…\"\n• World rules — \"Magic requires a blood cost…\"\n• Plot outline — \"Chapter 1 — Kael wakes in ruins…\"\n• Tone reference — \"Should feel like Chainsaw Man meets Berserk…\"\n• Research, lore dumps, anything"}
            style={{width:'100%',minHeight:260,padding:'18px 20px',background:C.card,border:'1px solid '+C.border,borderRadius:10,color:C.ink,fontSize:16,lineHeight:1.85,outline:'none',resize:'vertical',fontFamily:"'Crimson Pro',serif",transition:'border-color .2s'}}
            onFocus={e=>e.target.style.borderColor=accent+'70'}
            onBlur={e=>e.target.style.borderColor=C.border}/>
        </div>
        {err&&<p style={{color:C.red,fontSize:13,marginTop:8,fontFamily:"'JetBrains Mono',monospace"}}>{err}</p>}
        <div style={{display:'flex',gap:10,marginTop:16,flexWrap:'wrap'}}>
          <button className="gold-btn" onClick={scan} disabled={scanning||!draft.trim()} style={{fontSize:15,padding:'12px 28px'}}>
            {scanning?<React.Fragment><Spinner color="#080605" size={15}/>Scanning…</React.Fragment>:'🔍 Scan & Understand'}
          </button>
          {loreSummary&&<button className="ghost-btn" onClick={scan} disabled={scanning}>↻ Re-scan</button>}
          {loreSummary&&<button className="ghost-btn" onClick={()=>{setLoreSummary(null);setLoreRaw('');setDraft('');}} style={{color:C.red,borderColor:C.red+'40'}}>✕ Clear</button>}
        </div>

        {loreSummary&&(
          <div className="fade-in" style={{marginTop:36,display:'flex',flexDirection:'column',gap:14}}>
            <div style={{borderBottom:'1px solid '+C.border,paddingBottom:14}}>
              <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:6}}>
                <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:accent,fontStyle:'italic'}}>{loreSummary.title||'Your World'}</h3>
                <span style={chip(C.purple)}>{loreSummary.genre}</span>
                <span style={chip(C.teal)}>{loreSummary.tone}</span>
              </div>
            </div>
            <div style={{background:accent+'0c',border:'1px solid '+accent+'25',borderRadius:10,padding:'14px 18px'}}>
              <div style={{...lbl,color:accent,marginBottom:8}}>AI Understanding</div>
              <p style={{color:C.ink,fontSize:16,lineHeight:1.9,fontFamily:"'Crimson Pro',serif"}}>{loreSummary.raw_digest}</p>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              {loreSummary.setting&&<div style={{background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'12px 15px'}}><div style={lbl}>Setting</div><p style={{color:C.inkMuted,fontSize:14,lineHeight:1.7,fontFamily:"'Crimson Pro',serif"}}>{loreSummary.setting}</p></div>}
              {loreSummary.tone_notes&&<div style={{background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'12px 15px'}}><div style={lbl}>Tone Notes</div><p style={{color:C.inkMuted,fontSize:14,lineHeight:1.7,fontFamily:"'Crimson Pro',serif"}}>{loreSummary.tone_notes}</p></div>}
            </div>
            {loreSummary.characters?.length>0&&(
              <div>
                <div style={lbl}>Characters Detected ({loreSummary.characters.length})</div>
                <div style={{display:'flex',flexDirection:'column',gap:7}}>
                  {loreSummary.characters.map((c,i)=>(
                    <div key={i} style={{background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'10px 14px',display:'flex',gap:10,alignItems:'flex-start',flexWrap:'wrap'}}>
                      <span style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:C.ink,fontWeight:700,minWidth:100}}>{c.name}</span>
                      <span style={{...chip(accent),alignSelf:'flex-start'}}>{c.role}</span>
                      <span style={{color:C.inkMuted,fontSize:14,lineHeight:1.6,flex:1,fontFamily:"'Crimson Pro',serif"}}>{c.key_traits}{c.relationships?' — '+c.relationships:''}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {loreSummary.world_rules?.length>0&&(
              <div>
                <div style={lbl}>World Rules</div>
                {loreSummary.world_rules.map((r,i)=>(
                  <div key={i} style={{display:'flex',gap:10,marginBottom:6}}><span style={{color:accent,marginTop:4,fontSize:10,flexShrink:0}}>◆</span><span style={{color:C.inkMuted,fontSize:15,lineHeight:1.7,fontFamily:"'Crimson Pro',serif"}}>{r}</span></div>
                ))}
              </div>
            )}
            {loreSummary.themes?.length>0&&(
              <div><div style={lbl}>Themes</div><div style={{display:'flex',flexWrap:'wrap',gap:8}}>{loreSummary.themes.map((t,i)=><span key={i} style={chip(C.purple)}>{t}</span>)}</div></div>
            )}
            {loreSummary.plot_known&&<div style={{background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'12px 15px'}}><div style={lbl}>Established Plot</div><p style={{color:C.inkMuted,fontSize:15,lineHeight:1.75,fontFamily:"'Crimson Pro',serif"}}>{loreSummary.plot_known}</p></div>}
            <div style={{background:C.green+'0c',border:'1px solid '+C.green+'30',borderRadius:8,padding:'11px 16px'}}>
              <p style={{color:C.green,fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>✦ Active — Write, Ideas, Cast, and Coach all know this world.</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── Story Workspace ─────────────────────────────────────────────────────── */
function StoryWorkspace({story, onUpdate, onBack}){
  const [tab,setTab]=useState('write');
  const [aiMode,setAiMode]=useState(null);
  const [aiOut,setAiOut]=useState('');
  const [aiLoading,setAiLoading]=useState(false);
  const [aiErr,setAiErr]=useState('');
  const [selTxt,setSelTxt]=useState('');
  const [themeInput,setThemeInput]=useState('');
  const [ideasLoading,setIdeasLoading]=useState(false);
  const [chatMsgs,setChatMsgs]=useState([]);
  const [chatIn,setChatIn]=useState('');
  const [chatLoading,setChatLoading]=useState(false);
  const [activeChap,setActiveChap]=useState(story.chapters[0]?.id||1);
  const [editingTitle,setEditingTitle]=useState(null);
  const chatEndRef=useRef(null);

  const accent=story.accent||C.gold;

  const upd=(patch)=>onUpdate(story.id,{...story,...patch,updatedAt:Date.now()});

  const loreTxt=story.loreSummary
    ? 'TITLE:'+story.loreSummary.title+'\nGENRE:'+story.loreSummary.genre+'\nTONE:'+story.loreSummary.tone+'\nSETTING:'+story.loreSummary.setting+'\nCHARACTERS:\n'+(story.loreSummary.characters||[]).map(c=>'- '+c.name+'('+c.role+'):'+c.key_traits+(c.relationships?'. '+c.relationships:'')).join('\n')+'\nWORLD RULES:\n'+(story.loreSummary.world_rules||[]).map(r=>'- '+r).join('\n')+'\nTHEMES:'+(story.loreSummary.themes||[]).join(',')+'\nPLOT:'+(story.loreSummary.plot_known||'N/A')+'\nTONE NOTES:'+(story.loreSummary.tone_notes||'N/A')
    : null;

  const curChap=story.chapters.find(c=>c.id===activeChap)||story.chapters[0];
  const setContent=val=>upd({chapters:story.chapters.map(c=>c.id===activeChap?{...c,content:val}:c)});
  const wc=txt=>(txt||'').split(/\s+/).filter(Boolean).length;
  const totalWC=story.chapters.reduce((a,c)=>a+wc(c.content),0);

  const addChap=()=>{
    const newId=Math.max(...story.chapters.map(c=>c.id))+1;
    const chapters=[...story.chapters,{id:newId,title:'Chapter '+newId,content:''}];
    upd({chapters}); setActiveChap(newId);
  };

  const deleteChap=(chapId)=>{
    if(story.chapters.length<=1) return;
    const chapters=story.chapters.filter(c=>c.id!==chapId);
    upd({chapters});
    if(activeChap===chapId) setActiveChap(chapters[0].id);
  };

  const runAI=async(mode)=>{
    setAiMode(mode); setAiOut(''); setAiLoading(true); setAiErr('');
    const sys=withLore(BASE_WRITER,loreTxt);
    try{
      let p='';
      if(mode==='continue') p='Continue this story for 150-250 words. Match tone exactly.'+(loreTxt?' Stay consistent with the world.':'')+' Return ONLY the continuation:\n\n'+curChap.content;
      else if(mode==='humanize'){
        const t=selTxt||curChap.content;
        if(!t.trim()){setAiOut('Write something first.');setAiLoading(false);return;}
        p='Rewrite to sound like a skilled human author. Remove AI patterns, add specific details, vary rhythm.'+(loreTxt?' Keep consistent with world.':'')+' Return ONLY rewritten text:\n\n'+t;
      } else if(mode==='next'){
        p='Give 3 specific compelling options for what happens next. Each dramatically distinct.'+(loreTxt?' Must fit the world.':'')+'\n\nOPTION 1: [Title]\n[2-3 sentences]\n\nOPTION 2: [Title]\n[description]\n\nOPTION 3: [Title]\n[description]\n\nStory:\n'+curChap.content;
      }
      setAiOut(await callClaude(sys,p,null,1200));
    }catch(e){setAiErr(e.message);setAiOut('');}
    setAiLoading(false);
  };

  const generateIdeas=async()=>{
    setIdeasLoading(true);
    upd({ideas:[]});
    try{
      const r=await callClaude(
        withLore('You are a creative editor at a top manga/fiction publisher. Generate fresh specific concepts — not generic tropes.',loreTxt),
        'Generate 3 original '+story.genre+' story concepts.\nTheme/mood: '+(themeInput||'open')+'\n'+(loreTxt?'Ideas must fit the established world.':'')+'\n\nReturn ONLY a valid JSON array:\n[{"title":"...","hook":"one irresistible sentence","premise":"2-3 sentences","protagonist":"name + one defining trait","twist":"what makes it unique","tone":"genre tone"}]'
      );
      upd({ideas:JSON.parse(r.replace(/```json|```/g,'').trim())});
    }catch(e){console.error(e);}
    setIdeasLoading(false);
  };

  const useIdea=(idea)=>{
    const newId=Math.max(...story.chapters.map(c=>c.id))+1;
    const chapters=[...story.chapters,{id:newId,title:idea.title,content:'── STORY NOTES ──\n\nPREMISE\n'+idea.premise+'\n\nPROTAGONIST\n'+idea.protagonist+'\n\nHOOK\n'+idea.hook+'\n\nTWIST\n'+idea.twist+'\n\n──────────────\n\n'}];
    upd({chapters}); setActiveChap(newId); setTab('write');
  };

  const sendChat=async()=>{
    if(!chatIn.trim()) return;
    const msgs=[...chatMsgs,{role:'user',content:chatIn}];
    setChatMsgs(msgs); setChatIn(''); setChatLoading(true);
    try{
      const r=await callClaude(withLore(BASE_COACH,loreTxt),chatIn,chatMsgs.map(m=>({role:m.role,content:m.content})));
      setChatMsgs(p=>[...p,{role:'assistant',content:r}]);
      setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:'smooth'}),100);
    }catch(e){setChatMsgs(p=>[...p,{role:'assistant',content:'Error: '+e.message}]);}
    setChatLoading(false);
  };

  const TABS=[
    {id:'write',icon:'✍️',label:'Write'},
    {id:'ideas',icon:'💡',label:'Ideas'},
    {id:'characters',icon:'🎭',label:'Cast'},
    {id:'world',icon:'🌍',label:'World'},
    {id:'chat',icon:'📖',label:'Coach'},
  ];

  const PROMPTS=["How do I write a villain who feels genuinely threatening?","My pacing feels slow — what do I fix?","How do I write natural dialogue?","Give me a plot twist for a betrayal arc","How do I write a fight scene with emotional weight?"];
  const GENRES=['Manga','Novel','Light Novel','Webtoon','Short Story','Screenplay'];

  return(
    <div style={{flex:1,display:'flex',overflow:'hidden'}}>
      {/* Sidebar */}
      <div style={{width:68,background:C.surface,borderRight:'1px solid '+C.border,display:'flex',flexDirection:'column',alignItems:'center',paddingTop:12,gap:2,flexShrink:0}}>
        <button onClick={onBack} title="All Stories" style={{width:38,height:38,borderRadius:9,border:'1px solid '+C.border,background:'transparent',color:C.inkMuted,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginBottom:10,transition:'all .15s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=accent;e.currentTarget.style.color=accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.inkMuted;}}>←</button>
        <div style={{width:8,height:8,borderRadius:'50%',background:accent,marginBottom:10,boxShadow:'0 0 8px '+accent+'80'}}/>
        {TABS.map(t=>(
          <button key={t.id} className="tab-btn" onClick={()=>setTab(t.id)} title={t.label} style={{background:tab===t.id?accent+'18':'transparent',outline:tab===t.id?'1px solid '+accent+'50':'none',position:'relative'}}>
            <span style={{fontSize:19}}>{t.icon}</span>
            <span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:tab===t.id?accent:C.inkDim,letterSpacing:.5}}>{t.label}</span>
            {t.id==='world'&&story.loreSummary&&<div style={{position:'absolute',top:6,right:6,width:6,height:6,borderRadius:'50%',background:C.green,boxShadow:'0 0 5px '+C.green}}/>}
          </button>
        ))}
        {story.loreSummary&&(
          <div style={{marginTop:'auto',marginBottom:14,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:C.green,animation:'pulse 2.5s ease infinite'}}/>
            <span style={{fontSize:8,color:C.green,fontFamily:"'JetBrains Mono',monospace",textTransform:'uppercase',textAlign:'center',lineHeight:1.4}}>{'lore\non'}</span>
          </div>
        )}
      </div>

      {/* WRITE */}
      {tab==='write'&&(
        <React.Fragment>
          <div style={{width:188,background:C.surface,borderRight:'1px solid '+C.border,padding:'12px 8px',display:'flex',flexDirection:'column',gap:3,overflowY:'auto',flexShrink:0}}>
            <div style={{...lbl,marginBottom:8}}>
              <span style={{color:accent}}>✦</span> {story.title}
            </div>
            <div style={{...lbl,marginTop:4}}>Chapters</div>
            {story.chapters.map(ch=>(
              <div key={ch.id} onClick={()=>setActiveChap(ch.id)} style={{padding:'8px 10px',borderRadius:7,cursor:'pointer',transition:'all .15s',borderLeft:'2px solid '+(activeChap===ch.id?accent:'transparent'),background:activeChap===ch.id?accent+'0f':'transparent',display:'flex',alignItems:'flex-start',gap:4}}>
                <div style={{flex:1,minWidth:0}}>
                  {editingTitle===ch.id?(
                    <input autoFocus defaultValue={ch.title}
                      onBlur={e=>{upd({chapters:story.chapters.map(c=>c.id===ch.id?{...c,title:e.target.value||ch.title}:c)});setEditingTitle(null);}}
                      onKeyDown={e=>e.key==='Enter'&&e.target.blur()}
                      style={{background:'transparent',border:'none',outline:'none',color:C.ink,fontSize:13,width:'100%',fontFamily:"'Crimson Pro',serif"}}
                      onClick={e=>e.stopPropagation()}/>
                  ):(
                    <div style={{fontSize:13,color:activeChap===ch.id?accent:C.inkMuted,fontFamily:"'Crimson Pro',serif",overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} onDoubleClick={e=>{e.stopPropagation();setEditingTitle(ch.id);}}>{ch.title}</div>
                  )}
                  <div style={{fontSize:11,color:C.inkDim,marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>{wc(ch.content)>0?wc(ch.content)+' w':'empty'}</div>
                </div>
                {story.chapters.length>1&&<button onClick={e=>{e.stopPropagation();if(confirm('Delete "'+ch.title+'"?'))deleteChap(ch.id);}} style={{background:'transparent',border:'none',color:C.inkDim,cursor:'pointer',fontSize:11,padding:'0 2px',opacity:0.4,transition:'opacity .15s'}} onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=0.4} title="Delete chapter">✕</button>}
              </div>
            ))}
            <button onClick={addChap} style={{marginTop:6,padding:'6px 10px',background:'transparent',border:'1px dashed '+C.border,borderRadius:7,color:C.inkDim,cursor:'pointer',fontSize:13,fontFamily:"'Crimson Pro',serif"}}>+ Chapter</button>
            <div style={{marginTop:'auto',paddingTop:10,borderTop:'1px solid '+C.border}}>
              <div style={{...lbl,marginBottom:4}}>Story Total</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:16,color:accent}}>{totalWC.toLocaleString()} <span style={{fontSize:11,color:C.inkDim}}>words</span></div>
            </div>
          </div>

          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
            <div style={{height:52,borderBottom:'1px solid '+C.border,display:'flex',alignItems:'center',padding:'0 22px',gap:8,background:C.surface,flexShrink:0,flexWrap:'wrap'}}>
              <span style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:C.ink,fontStyle:'italic',marginRight:'auto',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{curChap?.title}</span>
              {story.loreSummary&&<span style={{fontSize:11,color:C.green,fontFamily:"'JetBrains Mono',monospace",flexShrink:0}}>✦ {story.loreSummary.title}</span>}
              <button className="ghost-btn" style={{borderColor:accent+'40',color:accent,padding:'5px 12px',fontSize:12}} onClick={()=>runAI('continue')}>✨ Continue</button>
              <button className="ghost-btn" style={{padding:'5px 12px',fontSize:12}} onClick={()=>runAI('humanize')}>🔄 Humanize</button>
              <button className="ghost-btn" style={{padding:'5px 12px',fontSize:12}} onClick={()=>runAI('next')}>🎯 What's Next</button>
            </div>
            <div style={{flex:1,overflow:'auto',padding:'40px 68px'}}>
              <textarea className="ink-editor"
                style={{caretColor:accent}}
                placeholder="Begin your story here…"
                value={curChap?.content||''}
                onChange={e=>setContent(e.target.value)}
                onMouseUp={()=>setSelTxt(window.getSelection()?.toString()||'')}
                onKeyUp={()=>setSelTxt(window.getSelection()?.toString()||'')}/>
            </div>
            <div style={{height:36,borderTop:'1px solid '+C.border,background:C.surface,display:'flex',alignItems:'center',padding:'0 22px',gap:18,flexShrink:0,flexWrap:'wrap'}}>
              <span style={{fontSize:12,color:C.inkDim,fontFamily:"'JetBrains Mono',monospace"}}>{wc(curChap?.content)} words</span>
              {selTxt&&<span style={{fontSize:12,color:accent,fontFamily:"'JetBrains Mono',monospace"}}>✦ {wc(selTxt)} selected</span>}
              <span style={{fontSize:11,color:C.inkDim,marginLeft:'auto',fontFamily:"'JetBrains Mono',monospace"}}>double-click chapter to rename</span>
            </div>
          </div>

          {aiMode&&(
            <div className="slide-in" style={{width:350,background:C.panel,borderLeft:'1px solid '+C.border,display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
              <div style={{padding:'14px 18px',borderBottom:'1px solid '+C.border,display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:accent,fontWeight:700}}>
                  {aiMode==='continue'?'✨ Continuation':aiMode==='humanize'?'🔄 Humanized':'🎯 Story Directions'}
                </span>
                {story.loreSummary&&<span style={{fontSize:10,color:C.green,fontFamily:"'JetBrains Mono',monospace"}}>✦ lore-aware</span>}
                <button onClick={()=>{setAiMode(null);setAiOut('');setAiErr('');}} style={{marginLeft:'auto',background:'none',border:'none',color:C.inkDim,cursor:'pointer',fontSize:22}}>×</button>
              </div>
              <div style={{flex:1,overflow:'auto',padding:18}}>
                {aiLoading
                  ?<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:180,gap:14}}><Spinner color={accent}/><span style={{color:C.inkMuted,fontStyle:'italic',fontSize:15,animation:'pulse 1.5s ease infinite'}}>Writing…</span></div>
                  :aiErr
                    ?<div className="fade-in" style={{color:C.red,fontSize:14,fontFamily:"'JetBrains Mono',monospace",lineHeight:1.7}}>{aiErr}</div>
                    :<div className="fade-in" style={{fontFamily:"'Crimson Pro',serif",fontSize:16,lineHeight:1.9,color:C.ink,whiteSpace:'pre-wrap'}}>{aiOut}</div>}
              </div>
              {aiOut&&!aiLoading&&(
                <div style={{padding:14,borderTop:'1px solid '+C.border,display:'flex',gap:8,flexWrap:'wrap'}}>
                  {aiMode!=='next'&&<button className="gold-btn" onClick={()=>{setContent((curChap.content+'\n\n'+aiOut).trim());setAiOut('');setAiMode(null);}} style={{flex:1}}>+ Add to Story</button>}
                  <button className="ghost-btn" onClick={()=>navigator.clipboard?.writeText(aiOut)}>Copy</button>
                  <button className="ghost-btn" onClick={()=>runAI(aiMode)}>↻ Redo</button>
                </div>
              )}
            </div>
          )}
        </React.Fragment>
      )}

      {/* IDEAS */}
      {tab==='ideas'&&(
        <div style={{flex:1,overflow:'auto',padding:'40px 48px'}}>
          <div style={{maxWidth:760,margin:'0 auto'}}>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:700,color:C.ink,marginBottom:4}}>Story Ideas</h2>
            <p style={{color:C.inkMuted,fontSize:16,fontFamily:"'Crimson Pro',serif",marginBottom:loreTxt?4:28}}>Generate fresh concepts that feel like they came from a real mind.</p>
            {loreTxt&&<p style={{color:C.green,fontSize:12,marginBottom:24,fontFamily:"'JetBrains Mono',monospace"}}>✦ Ideas shaped by your world context</p>}
            <div style={{marginBottom:18}}>
              <div style={lbl}>Format</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
                {GENRES.map(g=><button key={g} onClick={()=>upd({genre:g})} style={{padding:'7px 18px',borderRadius:24,cursor:'pointer',fontFamily:"'Playfair Display',serif",fontWeight:600,fontSize:13,transition:'all .18s',border:'1px solid '+(story.genre===g?accent:C.border),background:story.genre===g?accent:'transparent',color:story.genre===g?'#080605':C.inkMuted}}>{g}</button>)}
              </div>
            </div>
            <div style={{marginBottom:22}}>
              <div style={lbl}>Theme / Mood (optional)</div>
              <Input value={themeInput} onChange={e=>setThemeInput(e.target.value)} placeholder="e.g. revenge, slow-burn romance, betrayal, redemption arc…"/>
            </div>
            <button className="gold-btn" onClick={generateIdeas} disabled={ideasLoading} style={{fontSize:15,padding:'12px 28px'}}>
              {ideasLoading?<React.Fragment><Spinner color="#080605" size={15}/>Generating…</React.Fragment>:'✨ Generate 3 Ideas'}
            </button>
            {story.ideas?.length>0&&(
              <div style={{marginTop:36,display:'flex',flexDirection:'column',gap:16}} className="fade-in">
                {story.ideas.map((idea,i)=>(
                  <div key={i} style={{background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:22,transition:'border-color .2s'}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor=C.borderLight}
                    onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
                    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:10}}>
                      <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:21,color:accent,fontStyle:'italic',lineHeight:1.3}}>{idea.title}</h3>
                      <span style={{...chip(C.purple),flexShrink:0,marginLeft:12}}>{idea.tone}</span>
                    </div>
                    <p style={{fontSize:16,color:C.inkMuted,fontStyle:'italic',marginBottom:12,lineHeight:1.7,fontFamily:"'Crimson Pro',serif"}}>"{idea.hook}"</p>
                    <p style={{fontSize:15,color:C.ink,lineHeight:1.8,marginBottom:14,fontFamily:"'Crimson Pro',serif"}}>{idea.premise}</p>
                    <div style={{display:'flex',gap:14,flexWrap:'wrap',marginBottom:14}}>
                      <div style={{flex:1,minWidth:140}}><div style={lbl}>Protagonist</div><p style={{color:C.inkMuted,fontSize:14,lineHeight:1.6}}>{idea.protagonist}</p></div>
                      <div style={{flex:1,minWidth:140}}><div style={lbl}>The Twist</div><p style={{color:C.teal,fontSize:14,lineHeight:1.6}}>{idea.twist}</p></div>
                    </div>
                    <button className="ghost-btn" style={{borderColor:accent+'40',color:accent}} onClick={()=>useIdea(idea)}>→ Start Writing This</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {/* CAST */}
      {tab==='characters'&&<CharactersPanel characters={story.characters} setCharacters={c=>upd({characters:c})} loreTxt={loreTxt} accent={accent}/>}

      {/* WORLD */}
      {tab==='world'&&<WorldTab loreRaw={story.loreRaw} setLoreRaw={v=>upd({loreRaw:v})} loreSummary={story.loreSummary} setLoreSummary={v=>upd({loreSummary:v})} accent={accent}/>}

      {/* COACH */}
      {tab==='chat'&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <div style={{padding:'18px 26px',borderBottom:'1px solid '+C.border,background:C.surface,flexShrink:0}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.ink,fontStyle:'italic'}}>Writing Coach</h2>
              {story.loreSummary&&<span style={{fontSize:11,color:C.green,fontFamily:"'JetBrains Mono',monospace"}}>✦ knows your world</span>}
            </div>
            <p style={{fontSize:14,color:C.inkMuted,marginTop:3}}>Ask anything — pacing, structure, dialogue, plot holes, genre rules.</p>
          </div>
          <div style={{flex:1,overflow:'auto',padding:'22px 26px',display:'flex',flexDirection:'column',gap:12}}>
            {chatMsgs.length===0&&(
              <div style={{textAlign:'center',paddingTop:52,color:C.inkMuted}} className="fade-in">
                <div style={{fontSize:48,marginBottom:16}}>📖</div>
                <p style={{fontStyle:'italic',fontSize:18,marginBottom:24,fontFamily:"'Playfair Display',serif"}}>What are you working on?</p>
                <div style={{display:'flex',flexWrap:'wrap',gap:7,justifyContent:'center'}}>
                  {PROMPTS.map(p=><button key={p} className="ghost-btn" onClick={()=>setChatIn(p)} style={{fontSize:14}}>{p}</button>)}
                </div>
              </div>
            )}
            {chatMsgs.map((m,i)=>(
              <div key={i} className="fade-in" style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
                <div style={{maxWidth:'82%',padding:'11px 16px',lineHeight:1.75,fontSize:16,fontFamily:"'Crimson Pro',serif",...(m.role==='user'?{background:accent+'12',border:'1px solid '+accent+'25',borderRadius:'12px 12px 4px 12px',color:C.ink}:{background:C.card,border:'1px solid '+C.border,borderRadius:'12px 12px 12px 4px',color:C.ink,whiteSpace:'pre-wrap'})}}>{m.content}</div>
              </div>
            ))}
            {chatLoading&&<div style={{display:'flex'}}><div style={{background:C.card,border:'1px solid '+C.border,borderRadius:'12px 12px 12px 4px',padding:'11px 16px',display:'flex',alignItems:'center',gap:10}}><Spinner/><span style={{color:C.inkMuted,fontStyle:'italic',fontSize:15}}>Thinking…</span></div></div>}
            <div ref={chatEndRef}/>
          </div>
          <div style={{padding:'12px 26px',borderTop:'1px solid '+C.border,background:C.surface,display:'flex',gap:10,flexShrink:0}}>
            <textarea value={chatIn} onChange={e=>setChatIn(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}}
              placeholder="Ask your writing coach… (Enter to send)"
              rows={2} style={{flex:1,padding:'10px 13px',background:C.card,border:'1px solid '+C.border,borderRadius:9,color:C.ink,fontSize:16,outline:'none',resize:'none',minHeight:46,maxHeight:110,fontFamily:"'Crimson Pro',serif"}}/>
            <button className="gold-btn" onClick={sendChat} disabled={chatLoading||!chatIn.trim()}>
              {chatLoading?<Spinner color="#080605" size={15}/>:'Send'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── Root App ────────────────────────────────────────────────────────────── */
function App(){
  const [stories,setStories]=useState(()=>loadStories());
  const [activeId,setActiveId]=useState(null);
  const [showSettings,setShowSettings]=useState(false);

  // Auto-save to localStorage
  useEffect(()=>{saveStories(stories);},[stories]);

  // Show settings on first load if no API key
  useEffect(()=>{if(!getApiKey())setShowSettings(true);},[]);

  const activeStory=stories.find(s=>s.id===activeId)||null;

  const create=(title,accent,genre)=>{
    const s=newStory(title,accent);
    s.genre=genre;
    setStories(p=>[...p,s]);
    setActiveId(s.id);
  };

  const update=(id,patch)=>setStories(p=>p.map(s=>s.id===id?{...s,...patch}:s));
  const del=(id)=>{setStories(p=>p.filter(s=>s.id!==id));if(activeId===id)setActiveId(null);};
  const rename=(id,title)=>setStories(p=>p.map(s=>s.id===id?{...s,title,updatedAt:Date.now()}:s));

  return(
    <React.Fragment>
      {showSettings&&<SettingsPanel onClose={()=>setShowSettings(false)}/>}
      <div style={{display:'flex',height:'100vh',background:C.bg,overflow:'hidden',position:'relative'}}>
        {/* Settings gear - always visible */}
        <button onClick={()=>setShowSettings(true)} title="Settings" style={{position:'fixed',top:16,right:20,zIndex:50,width:34,height:34,borderRadius:8,border:'1px solid '+C.border,background:C.surface,color:C.inkDim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,transition:'all .15s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=C.gold;e.currentTarget.style.color=C.gold;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.inkDim;}}>⚙</button>
        {activeStory
          ?<StoryWorkspace story={activeStory} onUpdate={update} onBack={()=>setActiveId(null)}/>
          :<Dashboard stories={stories} onOpen={setActiveId} onCreate={create} onDelete={del} onRename={rename}/>
        }
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
