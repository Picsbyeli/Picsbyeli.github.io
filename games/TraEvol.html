const PoseStudio = ({ onCaptureRef }) => {
  const mountRef = useRef(null);
  const stateRef = useRef(null); // single ref holds ALL mutable 3D state
  const [selectedJoint, setSelectedJoint] = useState(null);
  const [hoveredJoint, setHoveredJoint] = useState(null);
  const [bodyScale, setBodyScale] = useState({shoulders:1.05,waist:0.8,hips:1.0,limbThick:1.0});
  const [activeProp, setActiveProp] = useState({left:"none",right:"none"});
  const [camUI, setCamUI] = useState({theta:0,phi:0.45,dist:5.5,targetY:2.0});
  const [showGrid, setShowGrid] = useState(true);
  const [capturedImage, setCapturedImage] = useState(null);
  const [anglesUI, setAnglesUI] = useState({...POSE_PRESETS.relaxed.joints});

  // Animation state
  const [keyframes, setKeyframes] = useState([]);
  const [totalFrames, setTotalFrames] = useState(60);
  const [animFps, setAnimFps] = useState(24);
  const [curFrame, setCurFrame] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [easeMode, setEaseMode] = useState("linear");
  const [loopMode, setLoopMode] = useState("loop");
  const [sideTab, setSideTab] = useState("pose");
  // Effects state
  const [activeFx, setActiveFx] = useState("none");
  const [fxAttach, setFxAttach] = useState("hips");
  const [fxIntensity, setFxIntensity] = useState(50);
  const [fxSz, setFxSz] = useState(50);
  const [fxSpd, setFxSpd] = useState(50);
  const [fxC1, setFxC1] = useState("#00e5d0");
  const [fxC2, setFxC2] = useState("#7c6cf0");
  const animRef = useRef({playDir:1,particles:[],fxGroup:null});


  // ── Build entire 3D system once on mount ──
  useEffect(() => {
    const container = mountRef.current;
    if (!container) return;

    // ── Core Three.js objects ──
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x181c24);
    const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
    const renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true, alpha:false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);
    const cvs = renderer.domElement;
    cvs.style.display = "block";
    cvs.style.width = "100%";
    cvs.style.height = "100%";

    // Sizing
    const resize = () => {
      const w = container.clientWidth, h = container.clientHeight;
      if (w < 1 || h < 1) return;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h, false);
    };
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(container);

    // Lights
    scene.add(new THREE.AmbientLight(0x99aabb, 0.8));
    const key = new THREE.DirectionalLight(0xffeedd, 1.0);
    key.position.set(4, 7, 5);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0x8899cc, 0.4);
    fill.position.set(-3, 4, -3);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xaabbcc, 0.25);
    rim.position.set(0, 2, -6);
    scene.add(rim);

    // Ground + grid
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(14, 14),
      new THREE.MeshPhongMaterial({color:0x1a1e2b})
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);
    const grid = new THREE.GridHelper(14, 28, 0x2a2f3d, 0x2a2f3d);
    grid.position.y = 0.005;
    scene.add(grid);

    // ── Build mannequin ──
    const bodyMat = () => new THREE.MeshPhongMaterial({color:0x8899aa, shininess:30});
    const jointMat = () => new THREE.MeshPhongMaterial({color:0x667788, shininess:40});
    const joints = {};   // name → mesh
    const parts = {};    // name → mesh (limbs/boxes for scale)
    const jMeshes = [];  // flat list for raycasting

    const mkJ = (name, r, pos, parent) => {
      const m = new THREE.Mesh(new THREE.SphereGeometry(r, 16, 12), jointMat());
      m.position.set(pos[0], pos[1], pos[2]);
      m.userData = {isJoint:true, jointName:name};
      parent.add(m);
      joints[name] = m;
      jMeshes.push(m);
      return m;
    };
    const mkCyl = (name, rt, rb, h, pos, parent) => {
      const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, 10), bodyMat());
      m.position.set(pos[0], pos[1], pos[2]);
      parent.add(m);
      parts[name] = m;
      return m;
    };
    const mkBox = (name, sx, sy, sz, pos, parent) => {
      const m = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), bodyMat());
      m.position.set(pos[0], pos[1], pos[2]);
      parent.add(m);
      parts[name] = m;
      return m;
    };

    const root = new THREE.Group();
    scene.add(root);

    // HIPS at y=2.15 (center of body)
    const hips   = mkJ("hips",    0.14, [0, 2.15, 0], root);
    mkBox("hipBlock", 0.55, 0.22, 0.22, [0, 0.05, 0], hips);

    const spine  = mkJ("spine",   0.12, [0, 0.48, 0], hips);
    mkCyl("torsoLow", 0.15, 0.19, 0.38, [0, -0.17, 0], spine);

    const chest  = mkJ("chest",   0.13, [0, 0.40, 0], spine);
    mkBox("ribcage", 0.56, 0.35, 0.24, [0, 0, 0], chest);

    const neck   = mkJ("neck",    0.065,[0, 0.26, 0], chest);
    mkCyl("neckCyl", 0.045, 0.055, 0.14, [0, 0.09, 0], neck);

    const head   = mkJ("head",    0.19, [0, 0.30, 0], neck);
    // Nose so you see facing direction
    const noseMat = new THREE.MeshPhongMaterial({color:0x99aabb});
    const nose = new THREE.Mesh(new THREE.CylinderGeometry(0, 0.035, 0.09, 6), noseMat);
    nose.rotation.x = Math.PI / 2;
    nose.position.set(0, -0.02, 0.18);
    head.add(nose);

    // ARMS
    const lSh = mkJ("lShoulder", 0.10, [-0.36, 0.15, 0], chest);
    mkCyl("lUpArm", 0.058, 0.065, 0.46, [0, -0.26, 0], lSh);
    const lEl = mkJ("lElbow",    0.07, [0, -0.50, 0], lSh);
    mkCyl("lFoArm", 0.048, 0.058, 0.40, [0, -0.23, 0], lEl);
    const lHa = mkJ("lHand",     0.055,[0, -0.46, 0], lEl);

    const rSh = mkJ("rShoulder", 0.10, [0.36, 0.15, 0], chest);
    mkCyl("rUpArm", 0.058, 0.065, 0.46, [0, -0.26, 0], rSh);
    const rEl = mkJ("rElbow",    0.07, [0, -0.50, 0], rSh);
    mkCyl("rFoArm", 0.048, 0.058, 0.40, [0, -0.23, 0], rEl);
    const rHa = mkJ("rHand",     0.055,[0, -0.46, 0], rEl);

    // LEGS
    const lHi = mkJ("lHip",  0.10, [-0.17, -0.14, 0], hips);
    mkCyl("lThigh", 0.078, 0.088, 0.60, [0, -0.33, 0], lHi);
    const lKn = mkJ("lKnee", 0.078,[0, -0.66, 0], lHi);
    mkCyl("lShin",  0.058, 0.068, 0.56, [0, -0.31, 0], lKn);
    const lFt = mkJ("lFoot", 0.048,[0, -0.61, 0], lKn);
    mkBox("lFootBox", 0.10, 0.05, 0.22, [0, -0.01, 0.06], lFt);

    const rHi = mkJ("rHip",  0.10, [0.17, -0.14, 0], hips);
    mkCyl("rThigh", 0.078, 0.088, 0.60, [0, -0.33, 0], rHi);
    const rKn = mkJ("rKnee", 0.078,[0, -0.66, 0], rHi);
    mkCyl("rShin",  0.058, 0.068, 0.56, [0, -0.31, 0], rKn);
    const rFt = mkJ("rFoot", 0.048,[0, -0.61, 0], rKn);
    mkBox("rFootBox", 0.10, 0.05, 0.22, [0, -0.01, 0.06], rFt);

    // ── PROPS — children of hand joints, correct local orientation ──
    // Hand local space: Y-axis points along forearm (toward shoulder = +Y, toward fingers = -Y)
    // Z = forward (palm faces -Z in rest), X = side
    const pMat = (c=0xbb8855) => new THREE.MeshPhongMaterial({color:c, shininess:20});

    const buildHandProps = (handJoint) => {
      const set = {};

      // SWORD — blade extends down from grip (along -Y, continuing forearm line)
      const sword = new THREE.Group();
      sword.add((() => { const m = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.14, 6), pMat(0x553322)); m.position.y = 0; return m; })());  // grip at hand
      sword.add((() => { const m = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.025, 0.035), pMat()); m.position.y = -0.08; return m; })());  // guard
      sword.add((() => { const m = new THREE.Mesh(new THREE.BoxGeometry(0.035, 0.70, 0.012), pMat(0xaaaacc)); m.position.y = -0.45; return m; })());  // blade
      sword.add((() => { const m = new THREE.Mesh(new THREE.SphereGeometry(0.025, 6, 4), pMat()); m.position.y = 0.095; return m; })());  // pommel
      sword.visible = false;
      handJoint.add(sword);
      set.sword = sword;

      // SHIELD — flat disc on the back of the forearm (faces +Z = forward)
      const shield = new THREE.Group();
      shield.add((() => { const m = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.26, 0.03, 16), pMat()); m.rotation.x = Math.PI/2; return m; })());
      shield.add((() => { const m = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 6), pMat()); m.position.z = 0.025; return m; })());
      shield.position.set(0, 0.15, 0.18); // offset up forearm and forward
      shield.visible = false;
      handJoint.add(shield);
      set.shield = shield;

      // STAFF — long pole, hand grips middle, extends both up and down along Y
      const staff = new THREE.Group();
      staff.add((() => { const m = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.028, 1.6, 6), pMat(0x664422)); return m; })());
      staff.add((() => { const m = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 6), new THREE.MeshPhongMaterial({color:0x4488ff,emissive:0x223366})); m.position.y = 0.84; return m; })());
      staff.position.y = -0.2; // shift so hand is at upper third
      staff.visible = false;
      handJoint.add(staff);
      set.staff = staff;

      // CUP — held sideways by arm, opening faces outward (+Z)
      const cup = new THREE.Group();
      cup.add((() => { const m = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.042, 0.10, 8), pMat(0xccaa77)); return m; })());
      cup.add((() => { const m = new THREE.Mesh(new THREE.TorusGeometry(0.032, 0.008, 6, 8), pMat(0xccaa77)); m.position.set(0.06, 0, 0); return m; })());
      // Rotate cup so opening faces +Z (forward from hand) and sits upright
      cup.rotation.x = -Math.PI / 2;
      cup.position.set(0, -0.08, 0.06);
      cup.visible = false;
      handJoint.add(cup);
      set.cup = cup;

      // BOOK — flat rectangle held in front of hand, spine along Y
      const book = new THREE.Group();
      book.add((() => { const m = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.22, 0.03), pMat(0x882222)); return m; })());
      book.add((() => { const m = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.20, 0.022), pMat(0xeeddcc)); m.position.z = 0.003; return m; })());
      book.position.set(0, -0.05, 0.10);
      book.visible = false;
      handJoint.add(book);
      set.book = book;

      // ORB — floating in palm
      const orb = new THREE.Group();
      orb.add(new THREE.Mesh(new THREE.SphereGeometry(0.08, 12, 8), new THREE.MeshPhongMaterial({color:0x44ddaa, emissive:0x115533, transparent:true, opacity:0.85})));
      orb.position.y = -0.10;
      orb.visible = false;
      handJoint.add(orb);
      set.orb = orb;

      return set;
    };

    const propSets = {
      left: buildHandProps(lHa),
      right: buildHandProps(rHa),
    };

    // ── State object — everything the loop + handlers read/write ──
    const fxGroup = new THREE.Group(); scene.add(fxGroup);
    animRef.current.fxGroup = fxGroup; animRef.current.particles = [];
    const S = {
      scene, camera, renderer, grid, root,
      joints, parts, jMeshes, propSets,
      cam: {theta:0, phi:0.45, dist:5.5, targetY:2.0},
      angles: {...POSE_PRESETS.relaxed.joints},
      drag: {active:false, mode:null, sx:0, sy:0, joint:null},
      selected: null, hovered: null,
      raycaster: new THREE.Raycaster(), mouse: new THREE.Vector2(),
    };
    stateRef.current = S;

    // ── Apply joint angles from S.angles ──
    const applyPose = () => {
      const a = S.angles, j = S.joints;
      if (!j.lShoulder) return;
      j.hips.rotation.set(0, a.hipsY||0, 0);
      j.spine.rotation.set(a.spineX||0, a.spineY||0, a.spineZ||0);
      j.chest.rotation.set(0, 0, 0);
      j.neck.rotation.set(a.neckX||0, a.neckY||0, 0);
      j.head.rotation.set(a.headX||0, a.headY||0, 0);
      j.lShoulder.rotation.set(a.lShoulderX||0, 0, a.lShoulderZ||0);
      j.rShoulder.rotation.set(a.rShoulderX||0, 0, a.rShoulderZ||0);
      j.lElbow.rotation.set(a.lElbowX||0, 0, 0);
      j.rElbow.rotation.set(a.rElbowX||0, 0, 0);
      j.lHip.rotation.set(a.lHipX||0, 0, a.lHipZ||0);
      j.rHip.rotation.set(a.rHipX||0, 0, a.rHipZ||0);
      j.lKnee.rotation.set(a.lKneeX||0, 0, 0);
      j.rKnee.rotation.set(a.rKneeX||0, 0, 0);
      j.lHand.rotation.set(a.lHandX||0, 0, 0);
      j.rHand.rotation.set(a.rHandX||0, 0, 0);
      j.lFoot.rotation.set(a.lFootX||0, 0, 0);
      j.rFoot.rotation.set(a.rFootX||0, 0, 0);
    };
    applyPose();

    // ── Camera from spherical coords ──
    const updateCam = () => {
      const c = S.cam;
      camera.position.set(
        c.dist * Math.sin(c.theta) * Math.cos(c.phi),
        c.targetY + c.dist * Math.sin(c.phi),
        c.dist * Math.cos(c.theta) * Math.cos(c.phi)
      );
      camera.lookAt(0, c.targetY, 0);
    };
    updateCam();

    let raf;
    const clock = new THREE.Clock();
    const tick = () => {
      raf = requestAnimationFrame(tick);
      const dt = clock.getDelta();
      applyPose(); updateCam();
      const ar = animRef.current;
      if (ar.fxGroup && ar.particles) {
        const dead = [];
        ar.particles.forEach((p,i) => {
          const u=p.userData; u.vy+=(u.gr||0)*dt;
          p.position.x+=(u.vx||0)*dt; p.position.y+=(u.vy||0)*dt; p.position.z+=(u.vz||0)*dt;
          u.life-=dt; const lr=Math.max(0,u.life/u.ml); p.material.opacity=lr*.8;
          if(u.sh) p.scale.setScalar(Math.max(.01,lr)); if(u.life<=0) dead.push(i);
        });
        for(let i=dead.length-1;i>=0;i--){const dp=ar.particles[dead[i]];ar.fxGroup.remove(dp);dp.geometry.dispose();dp.material.dispose();ar.particles.splice(dead[i],1);}
      }
      renderer.render(scene, camera);
    };
    tick();

    // ── Hit-test helper ──
    const hitJoint = (cx, cy) => {
      const rect = cvs.getBoundingClientRect();
      S.mouse.set(((cx - rect.left) / rect.width) * 2 - 1, -((cy - rect.top) / rect.height) * 2 + 1);
      S.raycaster.setFromCamera(S.mouse, camera);
      const hits = S.raycaster.intersectObjects(S.jMeshes, false);
      for (const h of hits) { if (h.object.userData.isJoint) return h.object.userData.jointName; }
      return null;
    };

    // ── Native DOM event handlers (no React batching, immediate) ──
    const onDown = (e) => {
      e.preventDefault();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      const hit = hitJoint(cx, cy);
      if (hit) {
        S.drag = {active:true, mode:"joint", sx:cx, sy:cy, joint:hit};
        S.selected = hit;
        setSelectedJoint(hit);
        // Highlight
        S.jMeshes.forEach(m => {
          m.material.color.setHex(m.userData.jointName === hit ? MANNEQUIN_COLORS.selected : MANNEQUIN_COLORS.joint);
        });
      } else {
        S.drag = {active:true, mode:"orbit", sx:cx, sy:cy, joint:null};
      }
    };

    const onMove = (e) => {
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      const d = S.drag;

      if (!d.active) {
        // Hover
        const hit = hitJoint(cx, cy);
        if (hit !== S.hovered) {
          S.hovered = hit;
          setHoveredJoint(hit);
          S.jMeshes.forEach(m => {
            const n = m.userData.jointName;
            m.material.color.setHex(
              n === hit ? MANNEQUIN_COLORS.hover :
              n === S.selected ? MANNEQUIN_COLORS.selected :
              MANNEQUIN_COLORS.joint
            );
          });
        }
        cvs.style.cursor = hit ? "pointer" : "grab";
        return;
      }

      cvs.style.cursor = "grabbing";
      // High sensitivity: ~250px drag = full 360° rotation (2π rad)
      // Formula: 250px * 0.025 = 6.28 rad = 360°
      const dx = (cx - d.sx) * 0.025;
      const dy = (cy - d.sy) * 0.025;
      d.sx = cx;
      d.sy = cy;

      if (d.mode === "orbit") {
        S.cam.theta -= dx * 1.2;
        S.cam.phi = Math.max(-0.5, Math.min(Math.PI/2.05, S.cam.phi + dy * 0.8));
        setCamUI({...S.cam});
      } else if (d.mode === "joint" && d.joint) {
        // Joint drag mapping — NO CLAMPING so full 360° is possible
        // Vertical mouse drag → X rotation (flex/extend) — primary axis
        // Horizontal mouse drag → Z rotation (abduction/spread) or Y (twist)
        // Sensitivity multipliers tuned so ~250px = full revolution
        const jm = {
          lShoulder: [{k:"lShoulderX",d:"y",s:-1.0},{k:"lShoulderZ",d:"x",s:-1.0}],
          rShoulder: [{k:"rShoulderX",d:"y",s:-1.0},{k:"rShoulderZ",d:"x",s:1.0}],
          lElbow:    [{k:"lElbowX",   d:"y",s:-1.0}],
          rElbow:    [{k:"rElbowX",   d:"y",s:-1.0}],
          lHip:      [{k:"lHipX",     d:"y",s:-1.0},{k:"lHipZ",d:"x",s:-1.0}],
          rHip:      [{k:"rHipX",     d:"y",s:-1.0},{k:"rHipZ",d:"x",s:1.0}],
          lKnee:     [{k:"lKneeX",    d:"y",s:-1.0}],
          rKnee:     [{k:"rKneeX",    d:"y",s:-1.0}],
          spine:     [{k:"spineX",    d:"y",s:-0.7},{k:"spineY",d:"x",s:0.7}],
          neck:      [{k:"neckX",     d:"y",s:-0.8},{k:"neckY",d:"x",s:0.8}],
          head:      [{k:"headX",     d:"y",s:-0.8},{k:"headY",d:"x",s:0.8}],
          hips:      [{k:"hipsY",     d:"x",s:1.0}],
          chest:     [{k:"spineX",    d:"y",s:-0.5},{k:"spineZ",d:"x",s:0.5}],
          lHand:     [{k:"lHandX",    d:"y",s:-1.0}],
          rHand:     [{k:"rHandX",    d:"y",s:-1.0}],
          lFoot:     [{k:"lFootX",    d:"y",s:-1.0}],
          rFoot:     [{k:"rFootX",    d:"y",s:-1.0}],
        };
        const maps = jm[d.joint];
        if (maps) {
          maps.forEach(m => {
            const delta = m.d === "x" ? dx * m.s : dy * m.s;
            // Accumulate with NO limits — full 360° and beyond
            S.angles[m.k] = (S.angles[m.k] || 0) + delta;
          });
          setAnglesUI({...S.angles});
        }
      }
    };

    const onUp = () => {
      if (S.drag.active) {
        S.drag = {active:false, mode:null, sx:0, sy:0, joint:null};
        cvs.style.cursor = "grab";
      }
    };

    const onWheel = (e) => {
      e.preventDefault();
      S.cam.dist = Math.max(1.5, Math.min(14, S.cam.dist + e.deltaY * 0.005));

    };

    cvs.addEventListener("mousedown", onDown);
    cvs.addEventListener("touchstart", onDown, {passive:false});
    cvs.addEventListener("touchmove", onMove, {passive:false});
    cvs.addEventListener("touchend", onUp);

    const onCanvasMove = (e) => { if (!S.drag.active) onMove(e); };
    cvs.addEventListener("mousemove", onCanvasMove);
    // CRITICAL: track mouse on WINDOW during drags — lets user rotate past canvas edge
    // This is what enables full 360° rotation without hitting a wall
    const onWindowMove = (e) => { if (S.drag.active) onMove(e); };

      cvs.removeEventListener("touchend", onUp);
      cvs.removeEventListener("wheel", onWheel);

              {capturedImage&&<div style={{fontSize:10,color:T.success}}>✓ Captured!</div>}
            </>}
            {sideTab==="anim"&&<>
              <div style={{background:T.bg,borderRadius:8,padding:8,border:`1px solid ${T.border}`}}>
                <div style={{fontSize:10,color:T.textDim,fontWeight:700,marginBottom:4}}>KEYFRAMES</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>
                  <button onClick={addKf} style={{padding:"5px",borderRadius:6,fontSize:11,border:"none",background:T.accent,color:"#fff",cursor:"pointer"}}>➕ Add KF</button>
                  <button onClick={delKf} style={{padding:"5px",borderRadius:6,fontSize:11,border:`1px solid ${T.border}`,background:"transparent",color:T.textDim,cursor:"pointer"}}>🗑️ Delete</button>
                </div>
                <Slider label="Total Frames" value={totalFrames} min={10} max={999} step={1} onChange={v=>setTotalFrames(v)}/>
                <Slider label="FPS" value={animFps} min={1} max={60} step={1} onChange={v=>setAnimFps(v)}/>
              </div>
              <div style={{background:T.bg,borderRadius:8,padding:8,border:`1px solid ${T.border}`}}>
                <div style={{fontSize:10,color:T.textDim,fontWeight:700,marginBottom:4}}>EASING</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>{["linear","easeIn","easeOut","easeInOut"].map(e=>(<button key={e} onClick={()=>setEaseMode(e)} style={{padding:"4px",borderRadius:5,fontSize:10,border:`1px solid ${easeMode===e?T.accent:T.border}`,background:easeMode===e?T.accent+"22":"transparent",color:easeMode===e?T.accentLight:T.textDim,cursor:"pointer"}}>{e}</button>))}</div>
              </div>

                <div style={{fontSize:10,color:T.textDim,fontWeight:700,marginBottom:4}}>LOOP</div>
                <div style={{display:"flex",gap:3}}>{[{k:"loop",l:"🔁"},{k:"pingpong",l:"🔀"},{k:"once",l:"⏹"}].map(m=>(<button key={m.k} onClick={()=>setLoopMode(m.k)} style={{flex:1,padding:"4px",borderRadius:5,fontSize:12,border:`1px solid ${loopMode===m.k?T.accent:T.border}`,background:loopMode===m.k?T.accent+"22":"transparent",color:loopMode===m.k?T.accentLight:T.textDim,cursor:"pointer"}}>{m.l}</button>))}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>
                <button onClick={exportAnimJSON} style={{padding:"5px",borderRadius:5,fontSize:10,border:`1px solid ${T.border}`,background:"transparent",color:T.textDim,cursor:"pointer"}}>💾 Save</button>
                <button onClick={importAnimJSON} style={{padding:"5px",borderRadius:5,fontSize:10,border:`1px solid ${T.border}`,background:"transparent",color:T.textDim,cursor:"pointer"}}>📂 Load</button>
              </div>
              <div style={{fontSize:9,color:T.textMuted,lineHeight:1.4}}>SPACE play • ←→ step • K add • DEL remove</div>
            </>}
            {sideTab==="fx"&&<>
              <div style={{background:T.bg,borderRadius:8,padding:8,border:`1px solid ${T.border}`}}>
                <div style={{fontSize:10,color:T.textDim,fontWeight:700,marginBottom:4}}>EFFECTS</div>
                <div style={{display:"flex",flexDirection:"column",gap:2}}>{FX_DEFS.map(fx=>(<button key={fx.id} onClick={()=>setActiveFx(fx.id)} style={{padding:"6px 10px",borderRadius:6,fontSize:12,border:`1px solid ${activeFx===fx.id?"#00e5d0":T.border}`,background:activeFx===fx.id?"rgba(0,229,208,.08)":"transparent",color:activeFx===fx.id?"#00e5d0":T.textDim,cursor:"pointer",textAlign:"left"}}>{fx.n}</button>))}</div>
              </div>
              <div style={{background:T.bg,borderRadius:8,padding:8,border:`1px solid ${T.border}`}}>
                <Slider label="Intensity" value={fxIntensity} min={0} max={100} step={1} onChange={v=>setFxIntensity(v)}/>
                <Slider label="Size" value={fxSz} min={5} max={100} step={1} onChange={v=>setFxSz(v)}/>
                <Slider label="Speed" value={fxSpd} min={5} max={100} step={1} onChange={v=>setFxSpd(v)}/>
                <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
                  <span style={{fontSize:10,color:T.textDim}}>Colors</span>
                  <input type="color" value={fxC1} onChange={e=>setFxC1(e.target.value)} style={{width:24,height:24,border:"none",cursor:"pointer",background:"none"}}/>
                  <input type="color" value={fxC2} onChange={e=>setFxC2(e.target.value)} style={{width:24,height:24,border:"none",cursor:"pointer",background:"none"}}/>
                </div>
              </div>
              <div style={{background:T.bg,borderRadius:8,padding:8,border:`1px solid ${T.border}`}}>
                <div style={{fontSize:10,color:T.textDim,fontWeight:700,marginBottom:4}}>ATTACH TO</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>{FX_ATTACH_PTS.map(a=>(<button key={a.k} onClick={()=>setFxAttach(a.k)} style={{padding:"4px",borderRadius:5,fontSize:10,border:`1px solid ${fxAttach===a.k?T.accent:T.border}`,background:fxAttach===a.k?T.accent+"22":"transparent",color:fxAttach===a.k?T.accentLight:T.textDim,cursor:"pointer"}}>{a.l}</button>))}</div>
              </div>
            </>}
          </div>
        </div>
        <div ref={mountRef} style={{flex:1,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:10,left:10,padding:"6px 12px",background:"rgba(12,14,20,.88)",borderRadius:8,fontSize:11,color:T.textDim,border:`1px solid ${T.border}`,pointerEvents:"none",zIndex:1}}>
            {selectedJoint?`✦ ${jLabel(selectedJoint)} — drag to pose`:hoveredJoint?`→ ${jLabel(hoveredJoint)}`:"Click joint • Drag orbit • Scroll zoom"}
          </div>
        </div>
      </div>
      {/* TIMELINE */}
      <div style={{height:90,background:T.bgCard,borderTop:`1px solid ${T.border}`,display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderBottom:`1px solid ${T.border}`}}>
          <button onClick={()=>seekTo(Math.max(0,curFrame-1))} style={{width:26,height:26,borderRadius:5,border:`1px solid ${T.border}`,background:"transparent",color:T.textDim,cursor:"pointer",fontSize:12}}>⏮</button>
          <button onClick={togglePlay} style={{width:26,height:26,borderRadius:5,border:"none",background:T.accent,color:"#fff",cursor:"pointer",fontSize:12}}>{playing?"⏸":"▶"}</button>
          <button onClick={()=>seekTo(Math.min(totalFrames,curFrame+1))} style={{width:26,height:26,borderRadius:5,border:`1px solid ${T.border}`,background:"transparent",color:T.textDim,cursor:"pointer",fontSize:12}}>⏭</button>
          <span style={{fontFamily:"monospace",fontSize:12,color:T.accentLight,minWidth:75,textAlign:"center"}}>{curFrame}/{totalFrames}</span>
          <input type="range" min={0} max={totalFrames} value={curFrame} onChange={e=>seekTo(parseInt(e.target.value))} style={{flex:1,accentColor:T.accent}}/>
        </div>
        <div style={{flex:1,position:"relative",padding:"4px 10px",cursor:"crosshair"}} onClick={e=>{const r=e.currentTarget.getBoundingClientRect();seekTo(Math.round(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*totalFrames));}}>
          <div style={{height:"100%",position:"relative",background:"repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0 1px,transparent 1px 50px)",borderRadius:4}}>
            <div style={{position:"absolute",top:0,left:`${totalFrames>0?curFrame/totalFrames*100:0}%`,width:2,height:"100%",background:"#f06050",zIndex:3,pointerEvents:"none"}}/>
            {keyframes.map((kf,i)=>(<div key={i} style={{position:"absolute",top:"50%",left:`${totalFrames>0?kf.f/totalFrames*100:0}%`,transform:"translate(-50%,-50%)",width:12,height:12,borderRadius:3,border:"2px solid #f0a050",background:kf.f===curFrame?"#f0a050":T.bgCard,cursor:"pointer",zIndex:2}} onClick={e=>{e.stopPropagation();seekTo(kf.f);}} title={`Frame ${kf.f}`}/>))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// DRAWING CANVAS (now with reference overlay support)
// ============================================================
const DrawingCanvas = ({ embedded=false, referenceImage=null }) => {
  const canvasRef = useRef(null);
  const [tool, setTool] = useState("pencil");
  const [color, setColor] = useState("#000000");
  const [brushSize, setBrushSize] = useState(3);
  const [opacity, setOpacity] = useState(1);
  const [isDrawing, setIsDrawing] = useState(false);
  const [showGrid, setShowGrid] = useState(false);
  const [showSymmetry, setShowSymmetry] = useState(false);
  const [activeLayer, setActiveLayer] = useState(1);

  // Frame-by-frame animation system
  const mkLayers = () => [
    { name:"Reference",visible:true,opacity:0.3,strokes:[] },
    { name:"Sketch",visible:true,opacity:0.5,strokes:[] },
    { name:"Line",visible:true,opacity:1,strokes:[] },
    { name:"Shade",visible:true,opacity:0.7,strokes:[] },
  ];
  const [frames, setFrames] = useState([{layers:mkLayers()}]);
  const [curFrameIdx, setCurFrameIdx] = useState(0);
  const [animMode, setAnimMode] = useState(false);
  const [onionSkin, setOnionSkin] = useState(true);
  const [playingAnim, setPlayingAnim] = useState(false);
  const [drawFps, setDrawFps] = useState(8);

  // Current frame's layers
  const layers = frames[curFrameIdx] ? frames[curFrameIdx].layers : mkLayers();
  const setLayers = (fn) => {
    setFrames(prev => {
      const next = [...prev];
      const cur = next[curFrameIdx];
      if (!cur) return prev;
      const newLayers = typeof fn === "function" ? fn([...cur.layers]) : fn;
      next[curFrameIdx] = {...cur, layers: newLayers};
      return next;
    });
  };

  const [currentStroke, setCurrentStroke] = useState(null);
  const [redoStack, setRedoStack] = useState([]);
  const [refOpacity, setRefOpacity] = useState(0.3);
  const [showRef, setShowRef] = useState(true);
  const refImageRef = useRef(null);

  // Animation playback
  useEffect(() => {
    if (!playingAnim || frames.length < 2) return;
    const iv = setInterval(() => {
      setCurFrameIdx(prev => (prev + 1) % frames.length);
    }, 1000 / drawFps);
    return () => clearInterval(iv);
  }, [playingAnim, drawFps, frames.length]);

  const addFrame = () => {
    const newFrame = {layers:mkLayers()};
    setFrames(prev => {
      const next = [...prev];
      next.splice(curFrameIdx + 1, 0, newFrame);
      return next;
    });
    setCurFrameIdx(curFrameIdx + 1);
  };
  const dupFrame = () => {
    const src = frames[curFrameIdx];
    if (!src) return;
    const deep = {layers:src.layers.map(l=>({...l,strokes:[...l.strokes]}))};
    setFrames(prev => {
      const next = [...prev];
      next.splice(curFrameIdx + 1, 0, deep);
      return next;
    });
    setCurFrameIdx(curFrameIdx + 1);
  };
  const deleteFrame = () => {
    if (frames.length <= 1) return;
    setFrames(prev => prev.filter((_,i) => i !== curFrameIdx));
    setCurFrameIdx(Math.min(curFrameIdx, frames.length - 2));
  };
  const goFrame = (i) => { if (!playingAnim) setCurFrameIdx(Math.max(0, Math.min(frames.length-1, i))); };

  useEffect(() => {
    if (referenceImage) {
      const img = new Image();
      img.onload = () => { refImageRef.current = img; };
      img.src = referenceImage;
    }
  }, [referenceImage]);

  const getToolSettings = useCallback(() => {
    const base = { pencil:{size:brushSize,opacity:opacity*0.6,cap:"round"}, pen:{size:brushSize,opacity:opacity*0.95,cap:"round"}, marker:{size:brushSize*3,opacity:opacity*0.35,cap:"square"}, brush:{size:brushSize*2,opacity:opacity*0.5,cap:"round"}, eraser:{size:brushSize*2,opacity:1,cap:"round"} };
    return base[tool] || base.pencil;
  }, [tool, brushSize, opacity]);

  const getPos = useCallback((e) => {
    const canvas = canvasRef.current;
    if (!canvas) return {x:0,y:0};
    const rect = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x:(cx-rect.left)*(canvas.width/rect.width), y:(cy-rect.top)*(canvas.height/rect.height) };
  }, []);

  const startDraw = useCallback((e) => {
    e.preventDefault();
    if (activeLayer === 0 && referenceImage) return; // Can't draw on reference layer
    const pos = getPos(e);
    const s = getToolSettings();
    setCurrentStroke({ tool, color: tool==="eraser"?"#ffffff":color, size:s.size, opacity:s.opacity, cap:s.cap, points:[pos], layer:activeLayer });
    setIsDrawing(true);
  }, [getPos, getToolSettings, tool, color, activeLayer, referenceImage]);

  const draw = useCallback((e) => {
    if (!isDrawing||!currentStroke) return;
    e.preventDefault();
    setCurrentStroke(prev => ({...prev, points:[...prev.points, getPos(e)]}));
  }, [isDrawing, currentStroke, getPos]);

  const endDraw = useCallback(() => {
    if (!isDrawing||!currentStroke) return;
    setIsDrawing(false);
    setLayers(prev => {
      const next = [...prev];
      next[currentStroke.layer] = {...next[currentStroke.layer], strokes:[...next[currentStroke.layer].strokes, currentStroke]};
      return next;
    });
    setRedoStack([]);
    setCurrentStroke(null);
  }, [isDrawing, currentStroke]);

  const undo = useCallback(() => {
    setLayers(prev => {
      const next = prev.map(l => ({...l}));
      for (let i = next.length-1; i >= 1; i--) {
        if (next[i].strokes.length > 0) {
          const removed = next[i].strokes[next[i].strokes.length-1];
          next[i] = {...next[i], strokes:next[i].strokes.slice(0,-1)};
          setRedoStack(p => [...p, removed]);
          break;
        }
      }
      return next;
    });
  }, []);

  const redo = useCallback(() => {
    if (redoStack.length===0) return;
    const stroke = redoStack[redoStack.length-1];
    setRedoStack(p => p.slice(0,-1));
    setLayers(prev => {
      const next = [...prev];
      next[stroke.layer] = {...next[stroke.layer], strokes:[...next[stroke.layer].strokes, stroke]};
      return next;
    });
  }, [redoStack]);

  const clearLayer = useCallback(() => {
    setLayers(prev => { const n=[...prev]; n[activeLayer]={...n[activeLayer],strokes:[]}; return n; });
  }, [activeLayer]);

  const clearAll = useCallback(() => {
    setLayers(prev => prev.map((l,i) => i===0?l:{...l,strokes:[]}));
    setRedoStack([]);
  }, []);

  const renderCanvas = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Reference image on layer 0
    if (referenceImage && refImageRef.current && showRef && layers[0].visible) {
      ctx.save();
      ctx.globalAlpha = refOpacity;
      const img = refImageRef.current;
      const scale = Math.min(canvas.width/img.width, canvas.height/img.height);
      const iw = img.width*scale, ih = img.height*scale;
      ctx.drawImage(img, (canvas.width-iw)/2, (canvas.height-ih)/2, iw, ih);
      ctx.restore();
    }

    if (showGrid) {
      ctx.strokeStyle = "#e0e0e0"; ctx.lineWidth = 0.5;
      for (let x=0;x<canvas.width;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
      for (let y=0;y<canvas.height;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
    }
    if (showSymmetry) {
      ctx.strokeStyle="#6c5ce755";ctx.lineWidth=1;ctx.setLineDash([5,5]);
      ctx.beginPath();ctx.moveTo(canvas.width/2,0);ctx.lineTo(canvas.width/2,canvas.height);ctx.stroke();
      ctx.setLineDash([]);
    }

    const drawStroke = (stroke) => {
      if (stroke.points.length<2) return;
      ctx.save();
      ctx.globalAlpha = stroke.opacity;
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = stroke.size;
      ctx.lineCap = stroke.cap||"round";
      ctx.lineJoin = "round";
      if (stroke.tool==="eraser") ctx.globalCompositeOperation="destination-out";
      ctx.beginPath();
      ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
      for (let i=1;i<stroke.points.length;i++){
        const p=stroke.points[i-1],c=stroke.points[i];
        ctx.quadraticCurveTo(p.x,p.y,(p.x+c.x)/2,(p.y+c.y)/2);
      }
      ctx.stroke();
      ctx.restore();
    };

    // Onion skin: show previous frame ghosted
    if (animMode && onionSkin && curFrameIdx > 0 && frames[curFrameIdx-1]) {
      ctx.save();
      ctx.globalAlpha = 0.18;
      frames[curFrameIdx-1].layers.forEach((layer,i) => {
        if (!layer.visible||i===0) return;
        layer.strokes.forEach(drawStroke);
      });
      ctx.restore();
    }

    layers.forEach((layer,i) => {
      if (!layer.visible||i===0) return;
      ctx.save();
      ctx.globalAlpha = layer.opacity;
      layer.strokes.forEach(drawStroke);
      ctx.restore();
    });
    if (currentStroke) drawStroke(currentStroke);
  }, [layers, currentStroke, showGrid, showSymmetry, referenceImage, refOpacity, showRef, animMode, onionSkin, curFrameIdx, frames]);

  useEffect(() => { renderCanvas(); }, [renderCanvas]);

  useEffect(() => {
    const handleKey = (e) => {
      if (e.ctrlKey||e.metaKey) { if(e.key==="z"){e.preventDefault();e.shiftKey?redo():undo();}}
      if(e.key==="b")setTool("brush");
      if(e.key==="p")setTool("pencil");
      if(e.key==="e")setTool("eraser");
    };
    window.addEventListener("keydown",handleKey);
    return()=>window.removeEventListener("keydown",handleKey);
  }, [undo,redo]);

  const exportPNG = () => {
    const c = canvasRef.current; if(!c)return;
    const link = document.createElement("a");
    link.download = "traevol-drawing.png";
    link.href = c.toDataURL("image/png");
    link.click();
  };

  const exportAllFrames = () => {
    const c = canvasRef.current; if(!c)return;
    const origIdx = curFrameIdx;
    frames.forEach((_,i) => {
      setCurFrameIdx(i);
      setTimeout(() => {
        const link = document.createElement("a");
        link.download = `traevol-frame-${String(i).padStart(3,"0")}.png`;
        link.href = c.toDataURL("image/png");
        link.click();
        if (i === frames.length-1) setCurFrameIdx(origIdx);
      }, i * 100);
    });
  };

  const tools = [{id:"pencil",icon:"✏️",l:"Pencil"},{id:"pen",icon:"🖊️",l:"Pen"},{id:"marker",icon:"🖍️",l:"Marker"},{id:"brush",icon:"🖌️",l:"Brush"},{id:"eraser",icon:"🧹",l:"Eraser"}];

  return (
    <div style={{display:"flex",gap:0,height:embedded?"100%":"auto",background:T.bg,borderRadius:embedded?0:12,overflow:"hidden",border:embedded?"none":`1px solid ${T.border}`}}>
      {/* Tool dock */}
      <div style={{width:52,background:T.bgCard,borderRight:`1px solid ${T.border}`,padding:"6px 4px",display:"flex",flexDirection:"column",gap:3,alignItems:"center"}}>
        {tools.map(t=>(
          <button key={t.id} title={t.l} onClick={()=>setTool(t.id)} style={{width:36,height:36,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${tool===t.id?T.accent:"transparent"}`,background:tool===t.id?T.accent+"22":"transparent",color:tool===t.id?"#fff":T.textDim,cursor:"pointer",fontSize:16}}>{t.icon}</button>
        ))}
        <div style={{height:1,width:"80%",background:T.border,margin:"2px 0"}} />
        <button title="Undo" onClick={undo} style={{width:36,height:36,borderRadius:8,border:"none",background:"transparent",color:T.textDim,cursor:"pointer",fontSize:16}}>↩️</button>
        <button title="Redo" onClick={redo} style={{width:36,height:36,borderRadius:8,border:"none",background:"transparent",color:T.textDim,cursor:"pointer",fontSize:16}}>↪️</button>
        <button title="Clear Layer" onClick={clearLayer} style={{width:36,height:36,borderRadius:8,border:"none",background:"transparent",color:T.textDim,cursor:"pointer",fontSize:16}}>🗑️</button>
        <button title="Clear All" onClick={clearAll} style={{width:36,height:36,borderRadius:8,border:"none",background:"transparent",color:T.danger,cursor:"pointer",fontSize:14}}>💣</button>
        <div style={{height:1,width:"80%",background:T.border,margin:"2px 0"}} />
        <button title="Grid" onClick={()=>setShowGrid(!showGrid)} style={{width:36,height:36,borderRadius:8,border:`1px solid ${showGrid?T.accent:"transparent"}`,background:showGrid?T.accent+"22":"transparent",color:T.textDim,cursor:"pointer",fontSize:16}}>📐</button>
        <button title="Symmetry" onClick={()=>setShowSymmetry(!showSymmetry)} style={{width:36,height:36,borderRadius:8,border:`1px solid ${showSymmetry?T.accent:"transparent"}`,background:showSymmetry?T.accent+"22":"transparent",color:T.textDim,cursor:"pointer",fontSize:16}}>↕️</button>
        <div style={{height:1,width:"80%",background:T.border,margin:"2px 0"}} />
        <button title="Animation Mode" onClick={()=>{setAnimMode(!animMode);setPlayingAnim(false);}} style={{width:36,height:36,borderRadius:8,border:`1px solid ${animMode?"#f0a050":"transparent"}`,background:animMode?"rgba(240,160,80,.15)":"transparent",color:animMode?"#f0a050":T.textDim,cursor:"pointer",fontSize:16}}>🎬</button>
        <div style={{flex:1}} />
        <button title="Export PNG" onClick={exportPNG} style={{width:36,height:36,borderRadius:8,border:"none",background:"transparent",color:T.textDim,cursor:"pointer",fontSize:16}}>💾</button>
      </div>

      {/* Canvas area */}
      <div style={{flex:1,display:"flex",flexDirection:"column"}}>
        {/* Toolbar */}
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",background:T.bgCard,borderBottom:`1px solid ${T.border}`,flexWrap:"wrap"}}>

// ─── Expression Face SVG ───────────────────────────────────
const ExpressionFace = ({sliderValues,size=260}) => {
  const s=sliderValues; const cx=size/2,cy=size/2; const headR=size*0.38;
  const browTilt=(s.browTiltDeg||0)*0.3,browH=(s.browHeight||0)*0.8;
  const eyelid=(s.eyelidOpen||70)/100,squint=(s.eyeSquint||0)/100;
  const mouthC=(s.mouthCorner||0)*0.25,jawDrop=(s.jawDrop||0)*0.35;
  const cheekR=(s.cheekRaise||0)*0.15;
  const eyeY=cy-headR*0.12-browH*0.3,eyeSpacing=headR*0.35;
  const eyeW=headR*0.22,eyeH=eyeW*0.55*eyelid*(1-squint*0.4);
  const browY=eyeY-headR*0.18+browH*0.2;
  const mouthY=cy+headR*0.35+jawDrop*0.5;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <ellipse cx={cx} cy={cy-headR*0.08} rx={headR*0.82} ry={headR*0.88} fill="#fde8d0" stroke="#c4956a" strokeWidth={1.5}/>
      <ellipse cx={cx} cy={cy+headR*0.35+jawDrop*0.2} rx={headR*0.55} ry={headR*0.42+jawDrop*0.15} fill="#fde8d0" stroke="#c4956a" strokeWidth={1.5}/>
      <ellipse cx={cx} cy={cy+headR*0.1} rx={headR*0.78} ry={headR*0.6} fill="#fde8d0"/>
      {cheekR>2&&<>{[-1,1].map(side=><ellipse key={side} cx={cx+side*eyeSpacing*0.8} cy={eyeY+headR*0.35-cheekR*0.5} rx={headR*0.15} ry={headR*0.1} fill={`rgba(255,150,150,${cheekR*0.02})`}/>)}</>}
      {[-1,1].map(side=>{const ex=cx+side*eyeSpacing;return(<g key={side}><ellipse cx={ex} cy={eyeY} rx={eyeW} ry={Math.max(eyeH,2)} fill="#fff" stroke="#6b4423" strokeWidth={1.2}/><circle cx={ex} cy={eyeY+eyeH*0.1} r={Math.max(eyeH*0.6,3)} fill="#3d2914"/><circle cx={ex} cy={eyeY+eyeH*0.1} r={Math.max(eyeH*0.35,2)} fill="#1a0f05"/><circle cx={ex+eyeW*0.2} cy={eyeY-eyeH*0.2} r={Math.max(eyeH*0.2,1)} fill="#fff"/></g>);})}
      {[-1,1].map(side=><line key={`b${side}`} x1={cx+side*eyeSpacing-eyeW*1.1} y1={browY+browTilt*side} x2={cx+side*eyeSpacing+eyeW*1.1} y2={browY-browTilt*side} stroke="#5c3317" strokeWidth={2.5} strokeLinecap="round"/>)}
      <path d={`M${cx-4} ${cy+headR*0.12} Q${cx} ${cy+headR*0.22} ${cx+4} ${cy+headR*0.12}`} fill="none" stroke="#c4956a" strokeWidth={1}/>
      <path d={`M${cx-headR*0.22} ${mouthY+mouthC*0.5} Q${cx-headR*0.1} ${mouthY+jawDrop*0.8-mouthC*0.3} ${cx} ${mouthY+jawDrop*0.6} Q${cx+headR*0.1} ${mouthY+jawDrop*0.8-mouthC*0.3} ${cx+headR*0.22} ${mouthY+mouthC*0.5}`} fill={jawDrop>8?"#8b1a1a":"none"} stroke="#8b4513" strokeWidth={1.8} strokeLinecap="round"/>
    </svg>
  );
};

      <div style={{width:180,flexShrink:0}}>{STYLES_DATA.styles.map(s=>(<button key={s.id} onClick={()=>setSel(s)} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"8px 10px",marginBottom:3,borderRadius:6,border:`1px solid ${sel.id===s.id?T.accent:T.border}`,background:sel.id===s.id?T.accent+"22":T.bgCard,color:sel.id===s.id?T.accentLight:T.text,cursor:"pointer",fontSize:12,textAlign:"left"}}><span style={{fontSize:16}}>{s.icon}</span>{s.name}</button>))}</div>
      <div style={{flex:1}}><div style={{background:T.bgCard,borderRadius:10,padding:16,border:`1px solid ${T.border}`}}><h2 style={{color:T.text,fontSize:18,marginBottom:12,display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:24}}>{sel.icon}</span>{sel.name}</h2><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:6,marginBottom:12}}>{sel.brushPresets.map(bp=>(<div key={bp.name} style={{padding:10,borderRadius:6,background:T.bg,border:`1px solid ${T.border}`}}><div style={{fontWeight:600,color:T.text,fontSize:12,marginBottom:4}}>{bp.name}</div><div style={{fontSize:10,color:T.textDim}}>Tool: {bp.tool} • Size: {bp.size} • {Math.round(bp.opacity*100)}%</div></div>))}</div>{sel.notes.map((n,i)=>(<p key={i} style={{fontSize:12,color:T.textDim,lineHeight:1.5,paddingLeft:10,borderLeft:`2px solid ${T.accent}33`,marginBottom:6}}>{n}</p>))}</div></div>
    </div>
  );
};

const CharacterStudio = ({setPage}) => {
  const [tab,setTab]=useState("expressions");
  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",gap:3,padding:"6px 12px",background:T.bgCard,borderBottom:`1px solid ${T.border}`}}>
        {[{id:"expressions",l:"🎭 Expressions"},{id:"bodies",l:"🧍 Bodies"},{id:"hair",l:"💇 Hair"},{id:"styles",l:"🎨 Styles"}].map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"6px 14px",borderRadius:6,border:`1px solid ${tab===t.id?T.accent:T.border}`,background:tab===t.id?T.accent+"22":"transparent",color:tab===t.id?T.accentLight:T.textDim,cursor:"pointer",fontSize:12,fontWeight:tab===t.id?600:400}}>{t.l}</button>))}
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        {tab==="expressions"&&<ExpressionTrainer onOpenCanvas={()=>setPage("canvas")}/>}
        {tab==="bodies"&&<BodyViewer/>}
        {tab==="hair"&&<HairStudio/>}
        {tab==="styles"&&<StylesViewer/>}
      </div>
    </div>
  );
};

// ─── Lesson, Drill, Dashboard, etc. (compact) ─────────────
const LessonViewer = ({lesson,onBack,onComplete}) => {
  const [cs,setCs]=useState(0);
  const [done,setDone]=useState([]);
  const step=lesson.steps[cs];
  return (
    <div style={{display:"flex",height:"100%"}}>
      <div style={{flex:1}}><DrawingCanvas embedded/></div>
      <div style={{width:300,background:T.bgCard,borderLeft:`1px solid ${T.border}`,display:"flex",flexDirection:"column",overflowY:"auto"}}>
        <div style={{padding:12,borderBottom:`1px solid ${T.border}`}}>
          <button onClick={onBack} style={{background:"none",border:"none",color:T.accentLight,cursor:"pointer",fontSize:11,marginBottom:4}}>← Back</button>
          <h3 style={{color:T.text,fontSize:16,margin:0}}>{lesson.icon} {lesson.title}</h3>
          <div style={{height:3,background:T.border,borderRadius:2,marginTop:6}}><div style={{height:3,background:T.accent,borderRadius:2,width:`${(done.length/lesson.steps.length)*100}%`,transition:"width 0.3s"}}/></div>
        </div>
        <div style={{flex:1,padding:12}}>
          <div style={{display:"flex",gap:3,marginBottom:12}}>{lesson.steps.map((_,i)=>(<button key={i} onClick={()=>setCs(i)} style={{flex:1,height:28,borderRadius:5,border:`1px solid ${cs===i?T.accent:T.border}`,background:done.includes(i)?T.success+"33":cs===i?T.accent+"22":"transparent",color:done.includes(i)?T.success:cs===i?T.accentLight:T.textDim,cursor:"pointer",fontSize:11,fontWeight:700}}>{done.includes(i)?"✓":i+1}</button>))}</div>
          <div style={{background:T.bg,borderRadius:8,padding:12,border:`1px solid ${T.border}`,marginBottom:10}}>
            <h4 style={{color:T.accentLight,fontSize:13,marginBottom:6}}>Step {cs+1}: {step.title}</h4>
            <p style={{color:T.text,fontSize:12,lineHeight:1.5,marginBottom:8}}>{step.instruction}</p>
            <div style={{background:T.success+"11",borderRadius:6,padding:8,border:`1px solid ${T.success}33`}}><span style={{fontSize:10,color:T.success,fontWeight:600}}>✓ Check:</span><p style={{fontSize:11,color:T.textDim,margin:"3px 0 0"}}>{step.check}</p></div>
          </div>
          <button onClick={()=>{if(!done.includes(cs))setDone(p=>[...p,cs]);if(cs<lesson.steps.length-1)setCs(cs+1);}} style={{width:"100%",padding:"8px",borderRadius:6,background:T.accent,color:"#fff",border:"none",cursor:"pointer",fontSize:12,fontWeight:600}}>{done.includes(cs)?"Next →":"Done & Next →"}</button>
          {done.length===lesson.steps.length&&<button onClick={()=>onComplete(lesson.id)} style={{width:"100%",padding:"10px",borderRadius:6,background:T.success,color:"#fff",border:"none",cursor:"pointer",fontSize:13,fontWeight:700,marginTop:8}}>🎉 Complete!</button>}
        </div>
      </div>
    </div>
  );
};

const LessonLibrary = ({completedLessons,setPage,setActiveLesson}) => {
  const chapters=[...new Set(LESSONS_DATA.map(l=>l.chapter))];
  return (<div style={{padding:16}}><h1 style={{color:T.text,fontSize:22,marginBottom:16}}>📖 Lessons</h1>{chapters.map(ch=>(<div key={ch} style={{marginBottom:20}}><h2 style={{color:T.accentLight,fontSize:14,marginBottom:8,paddingBottom:4,borderBottom:`1px solid ${T.border}`}}>{ch}</h2><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>{LESSONS_DATA.filter(l=>l.chapter===ch).map(lesson=>{const d=completedLessons.includes(lesson.id);return(<button key={lesson.id} onClick={()=>{setActiveLesson(lesson);setPage("lessonView");}} style={{padding:14,borderRadius:10,border:`1px solid ${d?T.success:T.border}`,background:T.bgCard,cursor:"pointer",textAlign:"left",position:"relative"}}>{d&&<div style={{position:"absolute",top:6,right:6,background:T.success,color:"#fff",fontSize:9,padding:"1px 6px",borderRadius:999,fontWeight:700}}>✓</div>}<div style={{fontSize:24,marginBottom:6}}>{lesson.icon}</div><h3 style={{color:T.text,fontSize:14,margin:"0 0 3px"}}>{lesson.title}</h3><p style={{color:T.textDim,fontSize:11,margin:"0 0 6px",lineHeight:1.3}}>{lesson.description}</p><span style={{fontSize:10,color:T.accentLight,background:T.accent+"22",padding:"1px 6px",borderRadius:3}}>{lesson.difficulty}</span></button>);})}</div></div>))}</div>);
};

const DrillGym = ({completedDrills,onComplete,setPage}) => {
  const [active,setActive]=useState(null);
  const [timer,setTimer]=useState(0);
  const [running,setRunning]=useState(false);
  const [rep,setRep]=useState(0);
  const [cf,setCf]=useState("All");
  const timerRef=useRef(null);
  const cats=[...new Set(DRILLS_DATA.map(d=>d.category))];
  const filtered=cf==="All"?DRILLS_DATA:DRILLS_DATA.filter(d=>d.category===cf);
  useEffect(()=>{if(running&&timer>0){timerRef.current=setTimeout(()=>setTimer(t=>t-1),1000);}else if(running&&timer<=0){setRunning(false);setRep(r=>r+1);}return()=>clearTimeout(timerRef.current);},[running,timer]);
  if(active){const d=rep>=active.reps;return(
    <div style={{padding:16,display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
      <button onClick={()=>setActive(null)} style={{alignSelf:"flex-start",background:"none",border:"none",color:T.accentLight,cursor:"pointer",fontSize:12}}>← Back</button>
      <h2 style={{color:T.text,fontSize:20}}>{active.name}</h2>
      <p style={{color:T.textDim,fontSize:13,maxWidth:450,textAlign:"center"}}>{active.description}</p>
      <div style={{width:150,height:150,borderRadius:"50%",border:`3px solid ${running?T.accent:T.border}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:T.bgCard}}>
        <span style={{fontSize:40,fontWeight:800,color:timer<=5&&running?T.danger:T.text,fontVariantNumeric:"tabular-nums"}}>{Math.floor(timer/60)}:{String(timer%60).padStart(2,"0")}</span>
        <span style={{fontSize:11,color:T.textDim}}>Rep {Math.min(rep+1,active.reps)}/{active.reps}</span>
      </div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>{setTimer(active.duration);setRunning(true);}} style={{padding:"8px 20px",borderRadius:6,background:T.accent,color:"#fff",border:"none",cursor:"pointer",fontSize:13,fontWeight:600}}>{running?"Reset":rep>0?"Next Rep":"▶ Start"}</button>
        {running&&<button onClick={()=>setRunning(false)} style={{padding:"8px 20px",borderRadius:6,background:T.warning,color:"#000",border:"none",cursor:"pointer",fontSize:13,fontWeight:600}}>⏸</button>}
      </div>
      {d&&<button onClick={()=>{onComplete(active.id);setActive(null);}} style={{padding:"10px 28px",borderRadius:6,background:T.success,color:"#fff",border:"none",cursor:"pointer",fontSize:14,fontWeight:700}}>🎉 Complete!</button>}
      <div style={{width:"100%",maxWidth:700,marginTop:8}}><DrawingCanvas embedded/></div>
    </div>);}
  return (<div style={{padding:16}}><h1 style={{color:T.text,fontSize:22,marginBottom:10}}>🏋️ Drills</h1><div style={{display:"flex",gap:3,marginBottom:12,flexWrap:"wrap"}}><button onClick={()=>setCf("All")} style={{padding:"3px 10px",borderRadius:5,fontSize:11,border:`1px solid ${cf==="All"?T.accent:T.border}`,background:cf==="All"?T.accent+"22":"transparent",color:cf==="All"?T.accentLight:T.textDim,cursor:"pointer"}}>All</button>{cats.map(c=>(<button key={c} onClick={()=>setCf(c)} style={{padding:"3px 10px",borderRadius:5,fontSize:11,border:`1px solid ${cf===c?T.accent:T.border}`,background:cf===c?T.accent+"22":"transparent",color:cf===c?T.accentLight:T.textDim,cursor:"pointer"}}>{c}</button>))}</div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:8}}>{filtered.map(drill=>{const d=completedDrills.includes(drill.id);return(<button key={drill.id} onClick={()=>{setActive(drill);setTimer(drill.duration);setRep(0);setRunning(false);}} style={{padding:12,borderRadius:8,border:`1px solid ${d?T.success:T.border}`,background:T.bgCard,cursor:"pointer",textAlign:"left",position:"relative"}}>{d&&<span style={{position:"absolute",top:6,right:6,background:T.success,color:"#fff",fontSize:9,padding:"1px 6px",borderRadius:999,fontWeight:700}}>✓</span>}<h3 style={{color:T.text,fontSize:13,margin:"0 0 3px"}}>{drill.name}</h3><p style={{color:T.textDim,fontSize:10,margin:"0 0 6px",lineHeight:1.3}}>{drill.description}</p><span style={{fontSize:10,color:T.accentLight,background:T.accent+"22",padding:"1px 6px",borderRadius:3}}>{drill.category}</span></button>);})}</div></div>);
};

const SkillTreeView = ({completedLessons}) => {
  const isUnlocked=s=>s.requires.every(r=>{const rs=SKILL_TREE.find(x=>x.id===r);return rs&&rs.lessons.every(l=>completedLessons.includes(l));});
  const isComplete=s=>s.lessons.length>0&&s.lessons.every(l=>completedLessons.includes(l));
  return (<div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",padding:12}}>{SKILL_TREE.map(skill=>{const u=isUnlocked(skill),c=isComplete(skill),p=skill.lessons.length>0?skill.lessons.filter(l=>completedLessons.includes(l)).length/skill.lessons.length:0;return(<div key={skill.id} style={{width:100,padding:10,borderRadius:10,textAlign:"center",border:`2px solid ${c?T.success:u?T.accent:T.border}`,background:c?T.success+"15":u?T.accent+"11":T.bgCard,opacity:u?1:0.5}}><div style={{fontSize:24,marginBottom:2}}>{skill.icon}</div><div style={{fontSize:11,fontWeight:700,color:c?T.success:u?T.accentLight:T.textMuted}}>{skill.name}</div>{skill.lessons.length>0&&<div style={{height:3,background:T.border,borderRadius:2,marginTop:4}}><div style={{height:3,background:c?T.success:T.accent,borderRadius:2,width:`${p*100}%`}}/></div>}<div style={{fontSize:9,color:T.textMuted,marginTop:2}}>{c?"Complete!":u?`${Math.round(p*100)}%`:"🔒"}</div></div>);})}</div>);
};

const Dashboard = ({completedLessons,completedDrills,streak,setPage}) => {
  const next=LESSONS_DATA.find(l=>!completedLessons.includes(l.id));
  return (
    <div style={{padding:16,maxWidth:860,margin:"0 auto"}}>
      <div style={{background:`linear-gradient(135deg,${T.accent}33,${T.success}22)`,borderRadius:14,padding:24,marginBottom:16,border:`1px solid ${T.accent}44`}}>
        <h1 style={{color:T.text,fontSize:24,margin:"0 0 2px",fontWeight:800}}>Welcome back! 🎨</h1>
        <p style={{color:T.textDim,fontSize:13,margin:0}}>Ready to level up?</p>
        <div style={{display:"flex",gap:12,marginTop:12}}>
          {[{v:`🔥 ${streak}`,l:"Streak",c:T.warning},{v:`${completedLessons.length}/${LESSONS_DATA.length}`,l:"Lessons",c:T.accentLight},{v:`${completedDrills.length}/${DRILLS_DATA.length}`,l:"Drills",c:T.success}].map(s=>(<div key={s.l} style={{background:T.bgCard+"cc",borderRadius:8,padding:"10px 16px",flex:1,textAlign:"center"}}><div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div><div style={{fontSize:10,color:T.textDim}}>{s.l}</div></div>))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8,marginBottom:16}}>
        {[{l:"Free Draw",i:"🖌️",p:"canvas",c:T.accent},{l:"Lessons",i:"📖",p:"lessons",c:T.success},{l:"Drills",i:"🏋️",p:"drills",c:T.warning},{l:"Character Studio",i:"🎭",p:"studio",c:"#e17055"},{l:"3D Pose Studio",i:"🧍",p:"pose3d",c:"#00cec9"}].map(q=>(<button key={q.l} onClick={()=>setPage(q.p)} style={{padding:14,borderRadius:10,border:`1px solid ${q.c}44`,background:T.bgCard,cursor:"pointer",textAlign:"center"}}><div style={{fontSize:28,marginBottom:4}}>{q.i}</div><div style={{fontSize:12,fontWeight:600,color:T.text}}>{q.l}</div></button>))}
      </div>
      {next&&<div style={{background:T.bgCard,borderRadius:10,padding:14,border:`1px solid ${T.border}`,marginBottom:16}}><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:32}}>{next.icon}</span><div style={{flex:1}}><h3 style={{color:T.text,fontSize:15,margin:0}}>{next.title}</h3><p style={{color:T.textDim,fontSize:11,margin:"2px 0"}}>{next.description}</p></div><button onClick={()=>setPage("lessons")} style={{padding:"7px 16px",borderRadius:6,background:T.accent,color:"#fff",border:"none",cursor:"pointer",fontSize:12,fontWeight:600}}>Start →</button></div></div>}
      <div style={{background:T.bgCard,borderRadius:10,padding:14,border:`1px solid ${T.border}`}}><div style={{fontSize:11,color:T.textDim,marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Skill Tree</div><SkillTreeView completedLessons={completedLessons}/></div>
    </div>
  );
};

const Gallery = () => (<div style={{padding:16,textAlign:"center"}}><h1 style={{color:T.text,fontSize:22}}>🖼️ Gallery</h1><p style={{color:T.textDim,fontSize:13}}>Saved drawings appear here. Use Export in canvas!</p><div style={{marginTop:30,padding:30,borderRadius:10,border:`2px dashed ${T.border}`,color:T.textMuted,fontSize:13}}>No saved drawings yet.</div></div>);

const Settings = ({dailyGoal,setDailyGoal}) => (<div style={{padding:16,maxWidth:460}}><h1 style={{color:T.text,fontSize:22,marginBottom:16}}>⚙️ Settings</h1><div style={{background:T.bgCard,borderRadius:10,padding:16,border:`1px solid ${T.border}`,marginBottom:12}}><h3 style={{color:T.text,fontSize:13,marginBottom:8}}>Daily Goal</h3><div style={{display:"flex",gap:6}}>{[5,10,15,20,30].map(m=>(<button key={m} onClick={()=>setDailyGoal(m)} style={{padding:"6px 14px",borderRadius:6,border:`1px solid ${dailyGoal===m?T.accent:T.border}`,background:dailyGoal===m?T.accent+"22":"transparent",color:dailyGoal===m?T.accentLight:T.textDim,cursor:"pointer",fontSize:12}}>{m}m</button>))}</div></div><div style={{background:T.bgCard,borderRadius:10,padding:16,border:`1px solid ${T.border}`}}><h3 style={{color:T.text,fontSize:13,marginBottom:8}}>Shortcuts</h3>{[["B","Brush"],["P","Pencil"],["E","Eraser"],["Ctrl+Z","Undo"],["Ctrl+Shift+Z","Redo"]].map(([k,d])=>(<div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:T.textDim,fontSize:11}}>{d}</span><kbd style={{background:T.bg,color:T.accentLight,padding:"1px 6px",borderRadius:3,fontSize:10,border:`1px solid ${T.border}`}}>{k}</kbd></div>))}</div></div>);

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [page, setPage] = useState("dashboard");
  const [completedLessons, setCL] = useState(() => loadS("cl", []));
  const [completedDrills, setCD] = useState(() => loadS("cd", []));
  const [streak, setStreak] = useState(() => loadS("streak", 0));
  const [lastActive, setLA] = useState(() => loadS("la", ""));
  const [dailyGoal, setDG] = useState(() => loadS("dg", 10));
  const [activeLesson, setAL] = useState(null);
  const [capturedRef, setCapturedRef] = useState(null);

  useEffect(() => {
    const today = getToday();
    if (lastActive !== today) {
      const y = new Date(Date.now()-86400000).toISOString().split("T")[0];
      if (lastActive===y) setStreak(s=>s+1);
      else if (lastActive) setStreak(1);
      else setStreak(1);
      setLA(today);
    }
  }, []);

  useEffect(()=>{saveS("cl",completedLessons);},[completedLessons]);
  useEffect(()=>{saveS("cd",completedDrills);},[completedDrills]);
  useEffect(()=>{saveS("streak",streak);},[streak]);
  useEffect(()=>{saveS("la",lastActive);},[lastActive]);
  useEffect(()=>{saveS("dg",dailyGoal);},[dailyGoal]);

  const completeLesson = (id) => { if(!completedLessons.includes(id)) setCL(p=>[...p,id]); setPage("lessons"); };
  const completeDrill = (id) => { if(!completedDrills.includes(id)) setCD(p=>[...p,id]); };

  const renderPage = () => {
    switch(page) {
      case "dashboard": return <Dashboard completedLessons={completedLessons} completedDrills={completedDrills} streak={streak} setPage={setPage} />;
      case "lessons": return <LessonLibrary completedLessons={completedLessons} setPage={setPage} setActiveLesson={setAL} />;
      case "lessonView": return activeLesson ? <LessonViewer lesson={activeLesson} onBack={()=>setPage("lessons")} onComplete={completeLesson} /> : null;
      case "drills": return <DrillGym completedDrills={completedDrills} onComplete={completeDrill} setPage={setPage} />;
      case "studio": return <CharacterStudio setPage={setPage} />;
      case "pose3d": return <PoseStudio onCaptureRef={setCapturedRef} />;
      case "canvas": return <div style={{height:"calc(100vh - 46px)"}}><DrawingCanvas embedded referenceImage={capturedRef} /></div>;
      case "gallery": return <Gallery />;
      case "settings": return <Settings dailyGoal={dailyGoal} setDailyGoal={setDG} />;
      default: return <Dashboard completedLessons={completedLessons} completedDrills={completedDrills} streak={streak} setPage={setPage} />;
    }
  };

  return (
    <div style={{ minHeight:"100vh", background:T.bg, color:T.text, fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif" }}>
      <NavBar page={page} setPage={setPage} streak={streak} />
      <main style={{ height:"calc(100vh - 46px)", overflowY:"auto" }}>{renderPage()}</main>
    </div>
  );
}


ReactDOM.render(React.createElement(App), document.getElementById("root"));

</script>
</body>
</html>
