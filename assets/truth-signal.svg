<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8a04a;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#a07830;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#c8a04a" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="50" x2="300" y2="50" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="100" x2="300" y2="100" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="150" x2="300" y2="150" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="75" y1="0" x2="75" y2="200" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="150" y1="0" x2="150" y2="200" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="225" y1="0" x2="225" y2="200" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Magnifying glass -->
  <circle cx="120" cy="88" r="36" fill="none" stroke="url(#glow)" stroke-width="6" filter="url(#shadow)"/>
  <circle cx="120" cy="88" r="28" fill="#0d0d1a" fill-opacity="0.7"/>
  <line x1="148" y1="116" x2="168" y2="140" stroke="url(#glow)" stroke-width="6" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Question mark inside magnifier -->
  <text x="120" y="100" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="#c8a04a" text-anchor="middle" filter="url(#shadow)">?</text>

  <!-- Three suspect dots -->
  <circle cx="54" cy="155" r="10" fill="#c8a04a" fill-opacity="0.85" filter="url(#shadow)"/>
  <circle cx="150" cy="155" r="10" fill="#4a6fa8" fill-opacity="0.85"/>
  <circle cx="246" cy="155" r="10" fill="#4a6fa8" fill-opacity="0.85"/>
  <line x1="64" y1="155" x2="140" y2="155" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="160" y1="155" x2="236" y2="155" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Title -->
  <text x="150" y="30" font-family="'Arial Black', Arial, sans-serif" font-size="18" font-weight="900" fill="#c8a04a" text-anchor="middle" letter-spacing="3" filter="url(#shadow)">TRUTH SIGNAL</text>
  <text x="150" y="48" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" fill-opacity="0.5" text-anchor="middle" letter-spacing="2">THREE SUSPECTS · ONE LIAR</text>
</svg>
