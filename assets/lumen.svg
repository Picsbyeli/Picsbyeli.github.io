<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2310;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6c5226;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#caa86a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fde9c8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#fde9c8;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="radGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#e7d6a6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#e7d6a6;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" />
  <rect width="400" height="300" fill="url(#glow)" />
  <ellipse cx="200" cy="120" rx="180" ry="130" fill="url(#radGlow)" />

  <!-- Decorative lines -->
  <line x1="30" y1="220" x2="370" y2="220" stroke="#c2a14d" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="30" y1="225" x2="370" y2="225" stroke="#c2a14d" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Book shape -->
  <rect x="148" y="90" width="46" height="60" rx="3" fill="#1a1408" stroke="#c2a14d" stroke-width="1.5" opacity="0.9"/>
  <rect x="206" y="90" width="46" height="60" rx="3" fill="#1a1408" stroke="#c2a14d" stroke-width="1.5" opacity="0.9"/>
  <line x1="194" y1="90" x2="206" y2="90" stroke="#c2a14d" stroke-width="2"/>
  <line x1="194" y1="150" x2="206" y2="150" stroke="#c2a14d" stroke-width="2"/>
  <!-- Book spine -->
  <rect x="193" y="88" width="14" height="64" rx="2" fill="#c2a14d" opacity="0.7"/>
  <!-- Book pages lines -->
  <line x1="156" y1="105" x2="188" y2="105" stroke="#c2a14d" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="156" y1="113" x2="188" y2="113" stroke="#c2a14d" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="156" y1="121" x2="188" y2="121" stroke="#c2a14d" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="156" y1="129" x2="188" y2="129" stroke="#c2a14d" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="212" y1="105" x2="244" y2="105" stroke="#c2a14d" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="212" y1="113" x2="244" y2="113" stroke="#c2a14d" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="212" y1="121" x2="244" y2="121" stroke="#c2a14d" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="212" y1="129" x2="244" y2="129" stroke="#c2a14d" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Star symbol above -->
  <text x="200" y="82" text-anchor="middle" font-size="22" fill="#e7d6a6" opacity="0.9">✦</text>

  <!-- Title -->
  <text x="200" y="182" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-weight="600" fill="#f6f3ec" letter-spacing="3">LUMEN</text>

  <!-- Subtitle -->
  <text x="200" y="202" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#c2a14d" letter-spacing="5">BIBLE STUDY</text>

  <!-- Bottom tagline -->
  <text x="200" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e7d6a6" opacity="0.7" letter-spacing="1">Read · Reflect · Grow</text>

  <!-- Corner decorations -->
  <text x="22" y="32" font-size="12" fill="#c2a14d" opacity="0.5">✦</text>
  <text x="366" y="32" font-size="12" fill="#c2a14d" opacity="0.5">✦</text>
  <text x="22" y="282" font-size="12" fill="#c2a14d" opacity="0.5">✦</text>
  <text x="366" y="282" font-size="12" fill="#c2a14d" opacity="0.5">✦</text>
</svg>
